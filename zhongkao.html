<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课本默写</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #E8F0F8; color: #2c3e50; display: flex; justify-content: center; min-height: 100vh; }
#app { width: 100%; max-width: 520px; margin: 20px auto; padding: 0 15px; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 2px solid rgba(44,62,80,0.1); margin-bottom: 15px; }
.header h1 { font-size: 18px; font-weight: 600; }
.tb-selector { display: flex; gap: 8px; margin-bottom: 12px; }
.tb-btn { flex: 1; padding: 10px; border: 2px solid rgba(44,62,80,0.15); background: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; text-align: center; }
.tb-btn.active { background: #2c3e50; color: #fff; border-color: #2c3e50; }
.tb-btn:hover:not(.active) { border-color: #2c3e50; }
.mode-selector { display: flex; gap: 8px; margin-bottom: 15px; }
.mode-btn { flex: 1; padding: 10px; border: 2px solid rgba(44,62,80,0.15); background: #fff; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
.mode-btn.active { background: #27AE60; color: #fff; border-color: #27AE60; }
.mode-btn:hover:not(.active) { border-color: #27AE60; }
select { width: 100%; padding: 12px; border: 2px solid rgba(44,62,80,0.15); border-radius: 8px; font-size: 15px; background: #fff; margin-bottom: 15px; cursor: pointer; }
.btn-row { display: flex; gap: 10px; justify-content: center; }
.btn-start { padding: 14px 40px; background: #27AE60; color: #fff; border: none; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.btn-start:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(39,174,96,0.3); }
.btn-error { padding: 14px 20px; background: #e74c3c; color: #fff; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; }
.btn-error:hover { opacity: 0.9; }
#quiz-area { display: none; }
.stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 14px; color: #555; }
.progress-bar { height: 4px; background: rgba(44,62,80,0.1); border-radius: 2px; margin-bottom: 20px; }
.progress-fill { height: 100%; background: #27AE60; border-radius: 2px; transition: width 0.3s; }
.word-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 15px; }
.syl-box-row { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 8px; }
.syl-box { padding: 10px 16px; background: #E8F0F8; border: 1px solid #D0DCE8; border-radius: 8px; cursor: pointer; font-size: 32px; font-weight: 900; color: #2c3e50; font-family: 'Inter', sans-serif; transition: all 0.2s; letter-spacing: 1px; }
.syl-box:hover { background: #D0DCE8; transform: scale(1.05); }
.syl-box.highlight { background: #27AE60; color: #fff; border-color: #27AE60; transform: scale(1.15); }
.audio-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 4px 8px; transition: transform 0.2s; }
.audio-btn:hover { transform: scale(1.2); }
.phon-word { display: block; text-align: center; font-size: 17px; color: #888; margin: 6px 0; font-family: 'Inter', sans-serif; }
.cn-word { display: block; text-align: center; font-size: 20px; color: #2c3e50; font-weight: 700; margin: 4px 0; font-family: 'Inter', 'PingFang SC', sans-serif; }
.rich-field { margin-top: 10px; padding: 10px 12px; background: #f8fafb; border-radius: 8px; border-left: 3px solid #27AE60; }
.rich-field .label { font-size: 12px; color: #27AE60; font-weight: 600; margin-bottom: 3px; }
.rich-field .value { font-size: 14px; color: #444; line-height: 1.5; }
.rich-field-example { margin-top: 12px; padding: 12px; background: #f0f7fc; border-radius: 8px; border-left: 3px solid #3498db; }
.rich-field-example .ex-en { font-size: 14px; color: #2c3e50; margin-bottom: 4px; }
.rich-field-example .ex-cn { font-size: 13px; color: #888; }
.syllable-inputs { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 15px; }
.syl-inp { width: 60px; padding: 8px 4px; border: none; border-bottom: 2px solid rgba(44,62,80,0.2); background: transparent; text-align: center; font-size: 16px; outline: none; transition: border-color 0.15s, background 0.15s; }
.syl-inp:focus { border-bottom-color: #27AE60; }
.syl-inp.correct { border-bottom-color: #27AE60 !important; background: rgba(39,174,96,0.05); }
.syl-inp.wrong { border-bottom-color: #e74c3c !important; background: rgba(231,76,60,0.08); animation: shake 0.3s; }
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
.input-row { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
#answer-input { width: 80%; padding: 12px; border: none; border-bottom: 2px solid rgba(44,62,80,0.2); background: transparent; font-size: 18px; text-align: center; outline: none; }
#answer-input:focus { border-bottom-color: #27AE60; }
.sound-btn { background: none; border: none; font-size: 24px; cursor: pointer; }
.buttons { text-align: center; margin-top: 15px; }
.btn-confirm { padding: 12px 36px; background: #27AE60; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.review-reminder { margin-top: 15px; padding: 12px 14px; background: #fff8e1; border: 1px solid #ffe082; border-radius: 10px; font-size: 13px; line-height: 1.6; display: none; }
.review-reminder .reminder-title { font-weight: 600; color: #f57f17; margin-bottom: 6px; }
.review-reminder .reminder-unit { display: inline-block; margin: 2px 4px; padding: 2px 8px; background: #fff3cd; border-radius: 4px; cursor: pointer; }
.review-reminder .reminder-unit:hover { background: #ffe082; }
.btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(39,174,96,0.3); }
.feedback { text-align: center; margin-top: 12px; font-size: 16px; min-height: 24px; }
#result-area { display: none; text-align: center; padding: 40px 20px; }
.emoji { font-size: 48px; margin-bottom: 16px; }
.score { font-size: 24px; font-weight: 600; margin-bottom: 20px; }
.btn-group { display: flex; gap: 10px; justify-content: center; }
.btn-retry, .btn-menu { padding: 12px 24px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
.btn-retry { background: #27AE60; color: #fff; }
.btn-menu { background: #2c3e50; color: #fff; }
#error-area { display: none; }
.back-btn { margin-bottom: 15px; }
.back-btn button { padding: 8px 16px; background: none; border: 1px solid rgba(44,62,80,0.2); border-radius: 6px; cursor: pointer; }
#error-list { margin-top: 10px; }
.error-item { padding: 10px; background: #fff; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; }
.error-del { color: #e74c3c; cursor: pointer; }
.error-clear { text-align: center; margin-top: 15px; }
.error-clear button { padding: 8px 16px; background: #e74c3c; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
#chinese { text-align: center; font-size: 20px; font-weight: 600; margin: 20px 0; }
#type-label { text-align: center; font-size: 13px; color: #888; margin-bottom: 5px; }

/* Flip card */
.card-flip { perspective: 1000px; min-height: 200px; position: relative; }
.card-inner { position: relative; width: 100%; min-height: 200px; transition: transform 0.5s; transform-style: preserve-3d; }
.card-flip.flipped .card-inner { transform: rotateY(180deg); }
.card-front, .card-back { position: absolute; top: 0; left: 0; width: 100%; min-height: 200px; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.card-front { background: #fff; z-index: 2; }
.card-back { background: #fff; transform: rotateY(180deg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
.card-back .cn-word { font-size: 24px; font-weight: 800; margin-bottom: 16px; font-family: 'Inter', 'PingFang SC', sans-serif; }

/* Unit status colors in dropdown */
.opt-mastered { color: #27AE60; font-weight: 600; }

/* Celebration overlay */
#celebration-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); z-index: 9999; justify-content: center; align-items: center;
}
#celebration-box {
  background: #fff; border-radius: 20px; padding: 40px; text-align: center;
  max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: popIn 0.4s ease;
}
@keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
#celebration-box .emoji { font-size: 64px; }
#celebration-box h2 { font-size: 24px; margin: 16px 0 8px; }
#celebration-box p { font-size: 16px; color: #666; margin: 8px 0; }
#celebration-box .sub { color: #999; font-size: 14px; }
#celebration-box .btn {
  display: inline-block; margin-top: 20px; padding: 12px 32px;
  background: #27AE60; color: #fff; border: none; border-radius: 10px;
  font-size: 16px; cursor: pointer;
}
#celebration-box .btn:hover { background: #219a52; }

/* Reminder overdue colors */
.reminder-unit.red-1 { color: #ffcccc; }
.reminder-unit.red-2 { color: #ff9999; }
.reminder-unit.red-3 { color: #ff6666; }
.reminder-unit.red-4 { color: #ff3333; }
.reminder-unit.red-5 { color: #e74c3c; }

/* Review mode styles */
.review-mode-label { text-align: center; font-size: 14px; color: #888; margin-bottom: 12px; }
.review-cn-big { text-align: center; font-size: 28px; font-weight: 700; color: #2c3e50; margin: 20px 0; padding: 20px; }
.review-word-big { text-align: center; font-size: 32px; font-weight: 700; color: #1a1a2e; letter-spacing: 2px; margin: 20px 0; }
.review-cn-medium { text-align: center; font-size: 18px; color: #e67e22; margin-bottom: 16px; }
.choice-grid { display: flex; flex-direction: column; gap: 10px; max-width: 320px; margin: 0 auto; }
.choice-btn { padding: 14px 20px; font-size: 18px; font-weight: 500; border: 2px solid #ddd; border-radius: 12px; background: #fff; cursor: pointer; transition: all 0.2s; }
.choice-btn:hover { border-color: #27AE60; background: rgba(39,174,96,0.05); }
.choice-btn.correct { border-color: #27AE60; background: rgba(39,174,96,0.1); color: #27AE60; }
.choice-btn.wrong { border-color: #e74c3c; background: rgba(231,76,60,0.1); color: #e74c3c; text-decoration: line-through; }
.choice-btn:disabled { cursor: default; opacity: 0.8; }
.fill-sentence { font-size: 18px; line-height: 1.8; text-align: center; padding: 20px; margin: 10px 0; }
.fill-sentence .ex-cn { font-size: 14px; color: #888; margin-top: 8px; }
.fill-input-row { text-align: center; margin: 10px 0; }
.review-input { padding: 12px 20px; font-size: 20px; border: none; border-bottom: 2px solid #ddd; outline: none; text-align: center; width: 200px; background: transparent; transition: border-color 0.2s; }
.review-input:focus { border-bottom-color: #27AE60; }
.review-textarea { width: 100%; max-width: 400px; min-height: 100px; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 12px; outline: none; resize: vertical; display: block; margin: 10px auto; font-family: 'Inter', sans-serif; }
.review-textarea:focus { border-color: #27AE60; }
.sentence-actions { text-align: center; margin: 10px 0; }
.review-area { margin: 16px 0; }

.btn-relearn { padding: 10px 24px; background: #D0DCE8; color: #2c3e50; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.btn-relearn:hover { background: #B0C4D8; transform: translateY(-1px); }

/* Compact rich fields - side by side with example */
.card-front .rich-layout { display: flex; gap: 8px; margin-top: 8px; align-items: stretch; }
.card-front .rich-layout .ex-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.card-front .rich-layout .ex-main .rich-field-example { margin-top: 0; padding: 8px 10px; background: #f0f7fc; border-radius: 8px; border-left: 3px solid #3498db; flex: 1; display: flex; flex-direction: column; justify-content: center; }
.card-front .rich-layout .ex-main .rich-field-example .ex-en { font-size: 13px; color: #2c3e50; margin-bottom: 2px; }
.card-front .rich-layout .ex-main .rich-field-example .ex-cn { font-size: 12px; color: #888; }
.card-front .rich-layout .tags-side { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; max-width: 160px; justify-content: center; }
.card-front .rich-layout .tags-side .rich-tag { padding: 4px 8px; border-radius: 4px; font-size: 11px; line-height: 1.4; border-left: 2px solid; white-space: normal; word-break: break-word; }
.card-front .rich-layout .tags-side .rich-tag .tag-label { font-weight: 600; margin-right: 3px; }
.card-front .rich-layout .tags-side .rich-tag.forms { background: #eefaf3; border-left-color: #27AE60; color: #1a7a42; }
.card-front .rich-layout .tags-side .rich-tag.syns { background: #fef9ee; border-left-color: #e67e22; color: #a85d14; }
.card-front .rich-layout .tags-side .rich-tag.ants { background: #fdeeec; border-left-color: #e74c3c; color: #a93226; }
.card-front .rich-layout .tags-side .rich-tag.phrases { background: #f4effa; border-left-color: #8e44ad; color: #5e2d7a; }
.card-front .rich-layout .tags-side .rich-tag.prov { background: #eef2f5; border-left-color: #2c3e50; color: #1a252f; }
.card-front .rich-layout .tags-side .rich-tag.tips { background: #eef5fa; border-left-color: #3498db; color: #1f6fa5; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1><span id="header-icon">🔨</span> <span id="header-title">铸剑者</span></h1>
    <span id="tb-score-display" style="font-weight:600;font-size:18px;">0</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="tb-progress-fill" style="width:0%"></div></div>

  <div id="unit-select">
    <div class="mode-selector">
      <button id="mode-full" class="mode-btn active" onclick="setMode('full')">🏫 默写</button>
      <button id="mode-word" class="mode-btn" onclick="setMode('word')">🔤 背读</button>
      <button class="btn-error" id="tb-error-btn2" onclick="showErrors()" style="flex:0.6;padding:8px;background:#e74c3c;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer">📕错词本 <span id="error-count-badge2" style="background:#fff;color:#e74c3c;border-radius:10px;padding:0 5px;font-size:11px;margin-left:3px">0</span></button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <select id="tb-book-sel" style="flex:1;"><option value="">— 选择课本 —</option></select>
      <select id="tb-unit-sel" style="flex:1;"><option value="">— 选择单元 —</option></select>
    </div>
    <div class="btn-row">
      <button class="btn-start" id="tb-start" onclick="startQuiz()" style="display:none">开始默写</button>
      <button class="btn-error" id="tb-review-btn" onclick="startReview()" style="display:none">📅 复习 <span id="review-count-badge" style="background:#27AE60;color:#fff;border-radius:10px;padding:0 6px;font-size:11px;margin-left:4px">0</span></button>
    </div>
    <p style="font-size:12px;color:#888;text-align:center;margin-top:8px;">💡 完成默写后自动加入复习计划</p>
    <div class="review-reminder" id="review-reminder">
      <div class="reminder-title">📋 待复习单元</div>
      <div id="reminder-unit-list"></div>
    </div>
    <div style="margin-top:10px;text-align:center"><button class="btn-relearn" onclick="showStats()">📊 统计</button></div>
  </div>

  <div id="quiz-area">
    <div class="back-btn"><button onclick="backToMenu()">← 返回</button></div>
    <div class="stats">
      <span id="type-label"></span>
      <span id="tb-round-display"></span>
    </div>
    <div id="chinese"></div>

    <!-- Word practice mode -->
    <div id="syllable-input-area" style="display:none">
      <div class="word-card card-flip">
        <div class="card-inner">
          <div class="card-front">
            <div id="word-syllable-display"></div>
            <div id="rich-fields-area"></div>
          </div>
          <div class="card-back" id="card-back">
            <div class="cn-word" id="back-cn"></div>
            <button class="btn-relearn" id="btn-relearn" onclick="flipToFront()">🔙 再学一遍</button>
          </div>
        </div>
      </div>
      <div class="syllable-inputs" id="syllable-inputs"></div>
      <div class="buttons" style="margin-top:10px">
        <button class="btn-confirm" id="syl-done-btn" onclick="sylAllDone()" style="display:none">✓ 完成</button>
      </div>
    </div>

    <!-- Dictation mode input -->
    <div class="input-row" id="normal-input-row">
      <input type="text" id="answer-input" autocomplete="off">
      <button class="sound-btn" id="sound-btn" onclick="playSound()">🔊</button>
    </div>

    <div class="buttons">
      <button class="btn-confirm" onclick="checkAnswer()" id="confirm-btn">确认</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div id="result-area">
    <div class="back-btn"><button onclick="backToMenu()">← 返回</button></div>
    <div class="emoji" id="result-emoji"></div>
    <div class="score" id="result-score"></div>
    <div class="btn-group">
      <button class="btn-retry" onclick="retryQuiz()">再来一次</button>
      <button class="btn-menu" onclick="backToMenu()">换单元</button>
    </div>
  </div>

  <div id="error-area">
    <div class="back-btn"><button onclick="backToMenu()">← 返回</button></div>
    <h3>📕 错词本</h3>
    <div id="error-list"></div>
    <div class="error-clear"><button onclick="clearErrors()">🗑 清空错词本</button></div>
  </div>
</div>

<!-- Celebration overlay -->
<div id="celebration-overlay" onclick="closeCelebration()">
  <div id="celebration-box" onclick="event.stopPropagation()">
    <div class="emoji">🎉</div>
    <h2>恭喜完成！</h2>
    <p><span id="celebration-unit"></span></p>
    <p class="sub">全对 <span id="celebration-count"></span> 个单词 ✨</p>
    <p class="sub">已加入复习计划，明天记得来复习哦 📅</p>
    <button class="btn" onclick="closeCelebration()">继续</button>
  </div>
</div>

<script>

var currentTb = 0; // textbook index
var words = [], idx = 0, score = 0, answered = false;
var activeMode = 'full';

// ===== Textbook & Unit selector =====
function initTextbooks() {
  var bookSel = document.getElementById('tb-book-sel');
  bookSel.innerHTML = '<option value="">— 选择课本 —</option>';
  TEXTBOOKS.forEach(function(tb, i) {
    var opt = document.createElement('option');
    opt.value = i; opt.textContent = tb.textbook;
    bookSel.appendChild(opt);
  });
  bookSel.onchange = function() {
    var idx = parseInt(this.value);
    if (!isNaN(idx)) {
      selectTextbook(idx);
    } else {
      document.getElementById('tb-unit-sel').innerHTML = '<option value="">— 选择单元 —</option>';
      document.getElementById('tb-start').style.display = 'none';
      document.getElementById('tb-review-btn').style.display = 'none';
    }
  };
  document.getElementById('tb-unit-sel').innerHTML = '<option value="">— 选择单元 —</option>';
  updateReviewReminder();
}

function selectTextbook(idx) {
  currentTb = idx;
  populateUnits();
  updateReviewBadge();
  updateReviewReminder();
}

function populateUnits() {
  var tb = TEXTBOOKS[currentTb];
  var sel = document.getElementById('tb-unit-sel');
  sel.innerHTML = '<option value="">— 请选择 —</option>';
  var db = getReviewDB();
  tb.units.forEach(function(u, i) {
    var mastered = 0;
    u.entries.forEach(function(e) {
      var key = e.en.toLowerCase().trim();
      var r = db[key];
      if (r && r.stage >= 7) mastered++;
    });
    var opt = document.createElement('option');
    opt.value = i;
    var total = u.entries.length;
    if (mastered === total && total > 0) {
      opt.textContent = u.name + ' (' + total + '/' + total + ') ✅';
      opt.className = 'opt-mastered';
    } else {
      opt.textContent = u.name + ' (' + (total - mastered) + '/' + total + ')';
    }
    sel.appendChild(opt);
  });
  document.getElementById('tb-start').style.display = 'none';
}

sel = document.getElementById('tb-unit-sel');
sel.onchange = function() {
  document.getElementById('tb-start').style.display = this.value !== '' ? 'inline-block' : 'none';
};

function getEnriched(en) {
  var key = en.toLowerCase().trim();
  return ENRICHED[key] || null;
}

function shuffle(a) { var arr = [...a]; for (var i = arr.length-1; i>0; i--) { var j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function setMode(mode) {
  stopAutoPlay();
  activeMode = mode;
  document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById(mode === 'full' ? 'mode-full' : 'mode-word').classList.add('active');
  document.getElementById('tb-start').textContent = mode === 'full' ? '开始默写' : '开始练习';
}

// ===== Start Quiz =====
function startQuiz() {
  var idx2 = parseInt(document.getElementById('tb-unit-sel').value);
  var unit = TEXTBOOKS[currentTb].units[idx2];
  if (!unit) return;
  var entries = unit.entries;
  if (activeMode === 'word') entries = entries.filter(function(e) { return e.type === 'word'; });
  // Skip mastered words (stage >= 7)
  var db = getReviewDB();
  entries = entries.filter(function(e) {
    var key = e.en.toLowerCase().trim();
    return !db[key] || db[key].stage < 7;
  });
  words = shuffle(entries);
  idx = 0; score = 0; answered = false;
  document.getElementById('unit-select').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('result-area').style.display = 'none';
  document.getElementById('error-area').style.display = 'none';
  document.getElementById('tb-score-display').textContent = '0';
  document.getElementById('confirm-btn').style.display = 'inline-block';
  showQ();
}

// ===== Show Question =====
var sylAnswered = 0; // syllables answered correctly this round
var sylCorrectCount = 0; // how many times this word was fully typed correctly
var firstFocus = false; // track if card has been flipped

function showQ() {
  if (idx >= words.length) { finish(); return; }
  var e = words[idx];
  answered = false; sylAnswered = 0; sylCorrectCount = 0;
  document.getElementById('chinese').textContent = e.cn;
  document.getElementById('feedback').innerHTML = '';
  document.getElementById('confirm-btn').style.display = 'inline-block';
  document.getElementById('sound-btn').style.display = 'none';
  var tl = e.type === 'word' ? '单词' : e.type === 'phrase' ? '词组' : '句子';
  document.getElementById('type-label').textContent = tl;
  document.getElementById('tb-round-display').textContent = (idx+1) + '/' + words.length;
  document.getElementById('tb-progress-fill').style.width = (idx/words.length*100) + '%';

  if (activeMode === 'word' && e.type === 'word') {
    // === SYLLABLE MODE with per-syllable validation ===
    document.getElementById('normal-input-row').style.display = 'none';
    document.getElementById('syllable-input-area').style.display = 'block';
    document.getElementById('syl-done-btn').style.display = 'none';
    var enr = getEnriched(e.en);
    var sylParts = enr && enr.syllables ? enr.syllables.split('•') : [e.en];
    sylParts = sylParts.map(function(s) { return s.trim(); }).filter(function(s) { return s; });
    if (sylParts.length === 0) sylParts = [e.en];

    // Display word info
    var phon = enr && enr.phonetic ? '/' + enr.phonetic + '/' : '';
    var sylBoxesHtml = '';
    for (var s = 0; s < sylParts.length; s++) {
      sylBoxesHtml += '<button class="syl-box" onclick="playSyllable(this)">' + sylParts[s] + '</button>';
    }
    document.getElementById('word-syllable-display').innerHTML =
      '<div class="syl-box-row">' + sylBoxesHtml +
      '<button class="audio-btn" onclick="playWordAudio()" title="整词发音">🔊</button></div>' +
      (phon ? '<div class="phon-word">' + phon + '</div>' : '') +
      '<div class="cn-word">' + e.cn + '</div>';
    document.getElementById('chinese').style.display = 'none';
    
    // Set back card content
    document.getElementById('back-cn').textContent = e.cn;

    // Rich fields - example left, tags right
    var richHtml = '';
    if (enr) {
      // Example
      var exHtml = '';
      if (enr.examples && enr.examples.length > 0) {
        // Find the first real example (skip POS-only lines like "n. 公众")
        var ex = null;
        for (var ei = 0; ei < enr.examples.length; ei++) {
          var candidate = enr.examples[ei];
          var txt = typeof candidate === 'string' ? candidate : (candidate.en || '');
          // Skip if it looks like just a POS/definition (short, starts with n./adj./v./pron., etc.)
          if (/^(n\.|adj\.|v\.|adv\.|pron\.|prep\.|conj\.|int\.|art\.|num\.|aux\.|det\.)/i.test(txt.trim())) continue;
          // Skip if it's just a single word or very short
          if (txt.trim().length < 10 && !/[.!?]/.test(txt)) continue;
          ex = candidate;
          break;
        }
        if (!ex && enr.examples.length > 0) ex = enr.examples[0]; // fallback
        if (ex) {
          if (typeof ex === 'string') {
            exHtml += '<div class="rich-field-example"><div class="ex-en">' + ex + '</div></div>';
          } else if (ex.en) {
            exHtml += '<div class="rich-field-example"><div class="ex-en">' + ex.en + '</div>' + (ex.cn ? '<div class="ex-cn">' + ex.cn + '</div>' : '') + '</div>';
          }
        }
      }
      // Tags side
      var tagsHtml = '';
      if (enr.forms) tagsHtml += '<div class="rich-tag forms"><span class="tag-label">📝</span>' + enr.forms + '</div>';
      if (enr.syns) tagsHtml += '<div class="rich-tag syns"><span class="tag-label">✅</span>' + enr.syns + '</div>';
      if (enr.ants) tagsHtml += '<div class="rich-tag ants"><span class="tag-label">❌</span>' + enr.ants + '</div>';
      if (enr.phrases) tagsHtml += '<div class="rich-tag phrases"><span class="tag-label">📖</span>' + enr.phrases + '</div>';
      if (enr.prov) tagsHtml += '<div class="rich-tag prov"><span class="tag-label">💡</span>' + enr.prov + '</div>';
      if (enr.tips) tagsHtml += '<div class="rich-tag tips"><span class="tag-label">🎯</span>' + enr.tips + '</div>';
      
      if (exHtml || tagsHtml) {
        richHtml = '<div class="rich-layout">';
        richHtml += '<div class="ex-main">' + exHtml + '</div>';
        if (tagsHtml) richHtml += '<div class="tags-side">' + tagsHtml + '</div>';
        richHtml += '</div>';
      }
    }
    document.getElementById('rich-fields-area').innerHTML = richHtml;

    // Create syllable input boxes - ONE PER SYLLABLE with per-syllable validation
    var inpHtml = '';
    for (var i = 0; i < sylParts.length; i++) {{
      inpHtml += '<input type="text" class="syl-inp" data-idx="' + i + '" data-expected="' + sylParts[i].toLowerCase() + '" autocomplete="off">';
    }}
    document.getElementById('syllable-inputs').innerHTML = inpHtml;

    // Initially show word card (front), will flip to back on first focus
    var wordCard = document.querySelector('.word-card');
    // Reset firstFocus for this new word
    firstFocus = false;
    // Ensure card is in front position
    wordCard.classList.remove('flipped');

    // Bind per-syllable validation
    var inputs = document.querySelectorAll('.syl-inp');
    inputs.forEach(function(inp, i) {{
      inp.onfocus = function(ev) {{
        if (!firstFocus) {{
          firstFocus = true;
          // Flip card to back (show only Chinese)
          wordCard.classList.add('flipped');
          // Start auto-play
          startAutoPlay(e.en);
        }}
      }};
      inp.onkeydown = function(ev) {{
        if (ev.key === 'Enter') {{
          checkSyllable(inp);
        }}
        // Stop auto-play on any keypress
        if (firstFocus) stopAutoPlay();
      }};
      inp.oninput = function(ev) {{
        var expected = inp.dataset.expected;
        if (inp.value.length >= expected.length) {{
          checkSyllable(inp);
        }}
        // Stop auto-play on any input
        if (firstFocus) stopAutoPlay();
      }};
    }});
    // Don't auto-focus - wait for user to click
    // User clicks input → triggers flip + auto-play
  } else {
    // Dictation mode
    document.getElementById('chinese').style.display = 'block';
    document.getElementById('normal-input-row').style.display = 'flex';
    document.getElementById('syllable-input-area').style.display = 'none';
    document.getElementById('answer-input').value = '';
    document.getElementById('answer-input').style.borderBottomColor = 'rgba(44,62,80,0.2)';
    document.getElementById('answer-input').disabled = false;
    document.getElementById('answer-input').onkeydown = function(ev) {
      if (ev.key === 'Enter' && !answered) checkAnswer();
      else if (ev.key === 'Enter' && answered) nextQ();
    };
    setTimeout(function() { document.getElementById('answer-input').focus(); }, 50);
  }
}

var autoPlayTimer = null;

function startAutoPlay(text) {
  stopAutoPlay();
  speak2(text);
  autoPlayTimer = setInterval(function() { speak2(text); }, 3000);
}

function stopAutoPlay() {
  if (autoPlayTimer) { clearInterval(autoPlayTimer); autoPlayTimer = null; }
  speechSynthesis.cancel();
}

function checkSyllable(inp) {
  if (answered) return;
  var user = inp.value.trim().toLowerCase();
  var expected = inp.dataset.expected.toLowerCase();
  var idx = parseInt(inp.dataset.idx);
  var inputs = document.querySelectorAll('.syl-inp');

  if (user === expected) {
    // Correct!
    inp.className = 'syl-inp correct';
    inp.disabled = true;
    sylAnswered++;
    // Move to next input
    if (idx + 1 < inputs.length) {
      inputs[idx + 1].focus();
    } else {
      // All syllables done this round!
      sylCorrectCount++;
      if (sylCorrectCount >= 3) {
        // 3rd time — allow moving on
        document.getElementById('syl-done-btn').style.display = 'inline-block';
        document.getElementById('syl-done-btn').focus();
        document.getElementById('feedback').innerHTML = '<span style="color:#27AE60;font-weight:600">✓ 第3/3次正确！点击完成继续</span>';
      } else {
        // Need more practice — reset all inputs
        document.getElementById('feedback').innerHTML = '<span style="color:#e67e22;font-weight:600">✓ 第' + sylCorrectCount + '/3次正确，再来一次！</span>';
        setTimeout(function() {
          // Reset all syllable inputs
          var allInps = document.querySelectorAll('.syl-inp');
          allInps.forEach(function(si) {
            si.className = 'syl-inp';
            si.value = '';
            si.disabled = false;
          });
          sylAnswered = 0;
          // Focus back on the first input
          if (allInps.length > 0) allInps[0].focus();
        }, 1000);
      }
    }
    // Play subtle success blip
    playBeep(800, 0.08);
  } else {
    // Wrong
    inp.className = 'syl-inp wrong';
    playBeep(200, 0.15);
    inp.value = '';
    var self = inp;
    setTimeout(function() {
      self.className = 'syl-inp';
      self.focus();
    }, 350);
  }
}

function playBeep(freq, dur) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.value = 0.3;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + dur);
  } catch(e) {}
}

// Syllable pronunciation with carrier phrases + phonetic mapping
function speakSyllable(syllable) {
  if (!syllable) return;
  var raw = syllable.trim();
  // CRITICAL: force lowercase to prevent letter-by-letter reading
  var s = raw.toLowerCase();
  if (!s) return;
  
  // Fix common English spelling patterns that TTS mispronounces in isolation
  var PRONUNCIATION_MAP = {
    'tion': 'shun',   'sion': 'zhun',    'ture': 'cher',
    'tial': 'shul',   'tious': 'shus',   'cious': 'shus',
    'cian': 'shun',   'cial': 'shul',    'geous': 'jus',
    'gue': 'g',       'que': 'k',        'ph': 'f',
    'fes': 'fess',    'ough': 'uff',     'augh': 'aw',
    'eigh': 'ay',     'dge': 'j',        'sci': 'shy',
    'sci': 'shy',     'cei': 'see',      'ough': 'uff',
    // Silent letter patterns
    'mb': 'm',        'bt': 't',         'gn': 'n',
    'kn': 'n',        'wr': 'r',         'wh': 'w',
    // Common clusters
    'ck': 'k',        'ng': 'ng',        'qu': 'kw',
    'x': 'ks',        'ea': 'e',         // when at end: "sea" → "se"
  };
  
  var speakText = s;
  for (var pattern in PRONUNCIATION_MAP) {
    if (s.endsWith(pattern)) {
      speakText = s.slice(0, -pattern.length) + PRONUNCIATION_MAP[pattern];
      break;
    }
  }
  
  // Add vowel context: "ah-SYLLABLE-ah" makes TTS pronounce naturally
  var vowels = 'aeiouy';
  var hasVowel = false;
  for (var c = 0; c < speakText.length; c++) {
    if (vowels.indexOf(speakText[c]) >= 0) { hasVowel = true; break; }
  }
  
  var utter = new SpeechSynthesisUtterance();
  utter.lang = 'en-US';
  utter.rate = 1.0;
  
  if (hasVowel) {
    // Carrier phrase: ah-{syllable}-ah gives context
    utter.text = 'ah ' + speakText + ' ah';
  } else {
    // No vowel: add schwa sound
    utter.text = speakText + 'uh';
  }
  
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function checkAnswer() {
  if (answered) return;
  answered = true;
  var e = words[idx];
  var input = document.getElementById('answer-input');

  document.getElementById('confirm-btn').style.display = 'none';

function todayStr() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function addDays(dateStr, days) { var d = new Date(dateStr); d.setDate(d.getDate() + days); return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }

function addToReview(wl) {
  var db = getReviewDB();
  var today = todayStr();
  wl.forEach(function(e) {
    var key = e.en.toLowerCase().trim();
    if (!db[key]) {
      db[key] = {word: e.en, cn: e.cn, stage: 0, learned: today, last_review: today, next_review: addDays(today, 1)};
    }
  });
  saveReviewDB(db);
}

function getReviewDueCount() {
  var db = getReviewDB(); var today = todayStr(); var c = 0;
  for (var k in db) { if (db[k].next_review <= today && db[k].stage < 7) c++; }
  return c;
}

var reviewWords = [];
function startReview() {
  var db = getReviewDB(); var today = todayStr(); reviewWords = [];
  for (var k in db) {
    if (db[k].next_review <= today && db[k].stage < 7) {
      reviewWords.push({cn: db[k].cn, en: db[k].word, type: 'word', _key: k, _stage: db[k].stage});
    }
  }
  if (reviewWords.length === 0) { alert('🎉 今日无待复习单词！'); return; }
  reviewWords = shuffle(reviewWords);
  idx = 0; score = 0; answered = false;
  activeMode = 'full';
  document.getElementById('unit-select').style.display = 'none';
  document.getElementById('quiz-area').style.display = 'block';
  document.getElementById('result-area').style.display = 'none';

  document.getElementById('header-title').innerHTML = '📅 复习 (' + reviewWords.length + '词)';
  document.getElementById('header-icon').textContent = '📅';
  showReviewQ();
}

function getReviewMode(e) {
  // stage 0-1: choice (四选一)
  // stage 2-3: dictation (默写) + fill (例句填空) + inflection (变形)
  // stage 4-6: sentence (造句) + confusable (词义辨析) + inflection
  if (e._stage >= 4) {
    var r = Math.random();
    if (r < 0.4) return 'sentence';       // 40% 造句
    if (r < 0.7) return 'confusable';      // 30% 词义辨析
    return 'inflection';                    // 30% 变形
  }
  if (e._stage >= 2) {
    var r = Math.random();
    if (r < 0.4) return 'dictation';       // 40% 默写
    if (r < 0.7) {
      var enr = getEnriched(e.en);
      if (enr && enr.examples && enr.examples.length > 0) return 'fill';  // 30% 例句填空
      return 'dictation';
    }
    return 'inflection';                    // 30% 变形
  }
  return 'choice';                          // 100% 四选一
}

function getDistractors(word, count) {
  var all = Object.keys(ENRICHED);
  var filtered = all.filter(function(k) { return k !== word.toLowerCase() && k.length > 2; });
  var shuffled = shuffle(filtered);
  return shuffled.slice(0, count);
}

var IRREGULAR_VERBS = {
  "be":{past:"was/were",pp:"been",ing:"being"},
  "become":{past:"became",pp:"become",ing:"becoming"},
  "begin":{past:"began",pp:"begun",ing:"beginning"},
  "break":{past:"broke",pp:"broken",ing:"breaking"},
  "bring":{past:"brought",pp:"brought",ing:"bringing"},

    setTimeout(function() { document.getElementById('answer-input').focus(); }, 50);
  }
  
  // Announce mode
  document.getElementById('header-title').innerHTML = '📅 ' + (mode === 'choice' ? '四选一' : mode === 'fill' ? '填空' : mode === 'sentence' ? '造句' : '默写') + ' (' + reviewWords.length + '词)';
}

  if (answered) return; answered = true;

  buttons.forEach(function(b) { b.disabled = true; });
  if (selected === correct) {
    btn.className = 'choice-btn correct';
    document.getElementById('feedback').innerHTML = '<span style="color:#27AE60;font-weight:600">✓ 正确！</span>';
    submitReviewAnswer(true);
  } else {
    btn.className = 'choice-btn wrong';
    buttons.forEach(function(b) { if (b.textContent === correct) b.className = 'choice-btn correct'; });
    document.getElementById('feedback').innerHTML = '<span style="color:#e74c3c;font-weight:600">✗ 正确答案: ' + correct + '</span>';
    submitReviewAnswer(false);
  }
  setTimeout(function() { nextReviewQ(); }, 1500);
}

function submitReviewAnswer(correct) {
  var e = reviewWords[idx];
  var mode = e._mode || 'dictation';
  updateStats(mode, correct);
  var db = getReviewDB(); var key = e._key; var today = todayStr();
  if (db[key]) {
    if (correct) {
      db[key].stage = Math.min(db[key].stage + 1, 7);
      if (db[key].stage >= 7) { delete db[key];
        var err = getErrors(); if (err[key]) delete err[key]; saveErrors(err);
      } else { db[key].last_review = today; db[key].next_review = addDays(today, REVIEW_INTERVALS[db[key].stage] || 30); }
      score++;
    } else { db[key].stage = 0; db[key].next_review = addDays(today, 1); addError(e.cn, e.en); }
  }
  saveReviewDB(db);
}

function checkReviewAnswerDictation() {
  if (answered) return; answered = true;
  var e = reviewWords[idx]; var input = document.getElementById('answer-input');
  var user = input.value.trim().toLowerCase().replace(/\s+/g,' ').replace(/['\u2019]/g,"'");
  var acceptable = [e.en].concat(e.alt || []).map(function(a) { return a.toLowerCase().replace(/\s+/g,' ').replace(/['\u2019]/g,"'"); });
  var correct = acceptable.indexOf(user) >= 0;
  submitReviewAnswer(correct);
  if (correct) { input.style.borderBottomColor = '#27AE60'; document.getElementById('feedback').innerHTML = '<span style="color:#27AE60;font-weight:600">✓ ' + e.en + '</span>'; }
  else { input.style.borderBottomColor = '#e74c3c'; document.getElementById('feedback').innerHTML = '<span style="color:#e74c3c;font-weight:600">✗ ' + e.en + '</span>'; }
  document.getElementById('answer-input').disabled = true; document.getElementById('confirm-btn').style.display = 'none';
  document.getElementById('sound-btn').style.display = 'inline-block'; speak2(e.en);
  setTimeout(function() { nextReviewQ(); }, 1200);
}

  updateReviewReminder();
}

function updateReviewReminder() {
  var db = getReviewDB(); var today = todayStr();
  var reminderEl = document.getElementById('review-reminder');
  var listEl = document.getElementById('reminder-unit-list');
  // Build a map: word → {tb_name, unit_name}
  var wordMap = {};
  TEXTBOOKS.forEach(function(tb, ti) {
    tb.units.forEach(function(u, ui) {
      u.entries.forEach(function(e) {
        var key = e.en.toLowerCase().trim();
        if (!wordMap[key]) wordMap[key] = [];
        wordMap[key].push({tb: tb.textbook, unit: u.name});
      });
    });
  });
  // Collect due words grouped by textbook+unit
  var dueUnits = {};
  for (var k in db) {
    if (db[k].next_review <= today && db[k].stage < 7) {
      var sources = wordMap[k] || [{tb: '?', unit: '?'}];
      sources.forEach(function(s) {
        var ukey = s.tb + '|' + s.unit;
        if (!dueUnits[ukey]) dueUnits[ukey] = {tb: s.tb, unit: s.unit, count: 0};
        dueUnits[ukey].count++;
      });
    }
  }
  var keys = Object.keys(dueUnits);
  if (keys.length === 0) { reminderEl.style.display = 'none'; return; }
  var html = '';
  // Calculate max overdue days per unit
  var todayMs = new Date(today).getTime();
  keys.forEach(function(ukey) {
    var du = dueUnits[ukey];
    var maxOverdue = 0;
    for (var k in db) {
      if (db[k].next_review < today && db[k].stage < 7) {
        var sources = wordMap[k] || [];
        var inThisUnit = sources.some(function(s) { return (s.tb + '|' + s.unit) === ukey; });
        if (inThisUnit) {
          var nextMs = new Date(db[k].next_review).getTime();
          var diff = Math.floor((todayMs - nextMs) / 86400000);
          if (diff > maxOverdue) maxOverdue = diff;
        }
      }
    }
    var colorClass = '';
    if (maxOverdue > 0) {
      var lvl = Math.min(maxOverdue, 5);
      colorClass = ' red-' + lvl;
    }
    html += '<span class="reminder-unit' + colorClass + '" onclick="quickReview(\'' + du.unit.replace(/'/g, "\\'") + '\')">' + du.unit + ' (' + du.count + ')' + (maxOverdue > 0 ? ' +' + maxOverdue + 'd' : '') + '</span> ';
  });
  listEl.innerHTML = html;
  reminderEl.style.display = 'block';
}

function quickReview(unitName) {
  // Find and select the unit, then start quiz
  for (var ti = 0; ti < TEXTBOOKS.length; ti++) {
    for (var ui = 0; ui < TEXTBOOKS[ti].units.length; ui++) {
      if (TEXTBOOKS[ti].units[ui].name === unitName) {
        document.getElementById('tb-book-sel').value = ti;
        selectTextbook(ti);
        document.getElementById('tb-unit-sel').value = ui;
        document.getElementById('tb-start').style.display = 'inline-block';
        setTimeout(function() { startQuiz(); }, 100);
        return;
      }
    }
  }
}

// ===== Error book display =====
function showErrors() {
  document.getElementById('unit-select').style.display = 'none'; document.getElementById('error-area').style.display = 'block';
  var err = getErrors(); var keys = Object.keys(err); var html = '';
  keys.forEach(function(k) { html += '<div class="error-item"><span>' + err[k].cn + ' — <strong>' + err[k].en + '</strong> (x' + err[k].count + ')</span><span class="error-del" onclick="removeError(\'' + k + '\')">✕</span></div>'; });
  document.getElementById('error-list').innerHTML = html || '<p style="text-align:center;color:#888">暂无错词 🎉</p>';
}
function removeError(key) { var err = getErrors(); delete err[key]; saveErrors(err); showErrors(); updateErrorBadge(); }
function clearErrors() { saveErrors({}); showErrors(); updateErrorBadge(); }

// ===== Init =====
function closeCelebration() { document.getElementById('celebration-overlay').style.display = 'none'; }
function closeStats() { var el = document.getElementById('stats-overlay'); if (el) el.remove(); }
initTextbooks();
updateErrorBadge();
updateReviewBadge();
updateReviewReminder();
</script>
