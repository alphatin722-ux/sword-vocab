
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铸剑者 - 单词记忆系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif; background-color: #F4F8FA; color: #1A2530; min-height: 100vh; }
        
        /* 扩展宽度的终极布局 */
        #app { display: grid; grid-template-columns: 280px 1fr; gap: 32px; max-width: 1200px; margin: 40px auto; align-items: start; padding: 0 32px; }
        
        .left-col { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 40px; }
        .main-logo { font-size: 28px; font-weight: 800; color: #1A2530; cursor: pointer; letter-spacing: 1px; margin-bottom: 4px; padding-left: 4px; }
        .main-logo:hover { color: #0A56D0; }
        
        #sidebar-box { background: #FFFFFF; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(26,37,48,0.04); display: flex; flex-direction: column; gap: 12px; border: 1px solid rgba(0,0,0,0.03); }
        .mode-tabs { display: flex; gap: 6px; }
        .mode-btn { flex: 1; padding: 10px 0; border-radius: 10px; font-size: 13px; font-weight: 600; border: 1px solid #E3E8EE; background: #FAFAFA; color: #5F6368; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { background: #0A56D0; color: #FFF; border-color: #0A56D0; box-shadow: 0 2px 8px rgba(10,86,208,0.15); }
        
        /* 防溢出的下拉框 */
        .select-row { display: flex; gap: 8px; width: 100%; }
        .select-row select { flex: 1; min-width: 0; padding: 10px; border-radius: 10px; border: 1px solid #E3E8EE; background: #FAFAFA; font-size: 13px; font-weight: 500; cursor: pointer; outline: none; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
        .select-row select:focus { border-color: #0A56D0; background: #FFF; }
        
        .btn-start { width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 15px; background: #0A56D0; color: #FFF; border: none; cursor: pointer; transition: 0.2s; display: none; }
        .btn-start:hover { background: #0848B0; }
        
        /* 卡片被加大，双列布局更宽敞 */
        #right-content { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .card-area { width: 100%; max-width: 820px; background: #FFFFFF; border-radius: 20px; padding: 32px 48px; box-shadow: 0 8px 32px rgba(26,37,48,0.03); display: none; border: 1px solid rgba(0,0,0,0.03); transition: min-height 0.3s; }
        
        #welcome-area { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 480px; cursor: pointer; }
        #quote-text { font-family: 'Ma Shan Zheng', cursive; font-size: 56px; color: #1A2530; line-height: 1.4; text-align: center; margin-bottom: 24px; letter-spacing: 4px; }
        #quote-author { font-size: 18px; color: #5F6368; font-weight: 600; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .back-btn { font-size: 14px; font-weight: bold; color: #5F6368; cursor: pointer; padding: 6px 12px; border-radius: 8px; background: #F4F8FA; transition: 0.2s; }
        .back-btn:hover { background: #E8F0FE; color: #1A73E8; }
        
        .progress-bar { height: 4px; background: #F4F8FA; border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
        .progress-fill { height: 100%; background: #0A56D0; border-radius: 2px; transition: width 0.3s; }
        
        .word-en { font-size: 56px; font-weight: 800; color: #1A2530; text-align: center; margin-bottom: 6px; letter-spacing: 0.5px; }
        .word-phon { font-size: 18px; color: #5F6368; text-align: center; margin-bottom: 18px; font-family: monospace; }
        .phon-play { cursor: pointer; display: inline-block; margin-left: 8px; font-size: 20px; transition: transform 0.15s; vertical-align: middle; }
        .phon-play:hover { transform: scale(1.2); }
        .word-cn { font-size: 32px; font-weight: 600; color: #1A2530; text-align: center; margin-bottom: 24px; line-height: 1.4; }
        
        .insight-deck { display: flex; flex-direction: row; gap: 6px; margin-bottom: 24px; min-height: 80px; align-items: stretch; overflow: hidden; }
        .insight-card { border-radius: 8px; overflow: hidden; flex-shrink: 0; cursor: default; transition: all 0.45s cubic-bezier(0.4, 0, 0.2, 1); }
        .insight-card.active { flex: 1; min-width: 0; display: flex; flex-direction: row; padding: 0; }
        .insight-card.seen { width: 10px; padding: 0; }
        .insight-card.pending { width: 10px; padding: 0; }
        .insight-card .ic-title { display: none; }
        .insight-card.active .ic-title { display: flex; align-items: center; justify-content: center; writing-mode: vertical-rl; width: 38px; flex-shrink: 0; color: #fff; font-size: 14px; font-weight: 700; letter-spacing: 2px; padding: 10px 0; }
        .insight-card .ic-body { display: none; }
        .insight-card.active .ic-body { display: block; flex: 1; padding: 16px 20px; background: #F8F9FA; white-space: pre-line; line-height: 1.6; }
        .ic-example .ic-title { background: #5E81AC; }
        .ic-example.seen, .ic-example.pending { background: #5E81AC; }
        .ic-forms .ic-title { background: #1A73E8; }
        .ic-forms.seen, .ic-forms.pending { background: #1A73E8; }
        .ic-phrases .ic-title { background: #D93025; }
        .ic-phrases.seen, .ic-phrases.pending { background: #D93025; }
        .ic-prov .ic-title { background: #137333; }
        .ic-prov.seen, .ic-prov.pending { background: #137333; }
        .ic-tips .ic-title { background: #E65100; }
        .ic-tips.seen, .ic-tips.pending { background: #E65100; }
        .ic-grammar .ic-title { background: #8B5CF6; }
        .ic-grammar.seen, .ic-grammar.pending { background: #8B5CF6; }
        .ic-prep .ic-title { background: #06B6D4; }
        .ic-prep.seen, .ic-prep.pending { background: #06B6D4; }
        .ic-phrase .ic-title { background: #F59E0B; }
        .ic-phrase.seen, .ic-phrase.pending { background: #F59E0B; }
        .ex-en { font-size: 18px; color: #2E3440; margin-bottom: 4px; line-height: 1.5; font-weight: 500; }
        .ex-cn { font-size: 15px; color: #4C566A; }
        .pos-tag { font-size: 14px; font-weight: 600; color: #5E81AC; }
        
        .dict-input { width: 100%; padding: 18px; border: 2px solid #E3E8EE; border-radius: 12px; font-size: 22px; text-align: center; font-weight: bold; color: #1A2530; margin-bottom: 20px; outline: none; transition: 0.2s; background: #FAFAFA; }
        .dict-input:focus { border-color: #0A56D0; background: #FFF; box-shadow: 0 0 0 3px rgba(10,86,208,0.1); }
        .btn-action { width: 100%; padding: 14px; background: #0A56D0; color: #FFF; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { background: #0848B0; }
        
        .streak-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
        .dot { width: 16px; height: 16px; border-radius: 50%; background: #E3E8EE; transition: 0.3s; }
        .dot.filled { background: #34A853; box-shadow: 0 0 10px rgba(52,168,83,0.4); }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 50% { transform: translateX(6px); } 75% { transform: translateX(-6px); } }
        .shake { animation: shake 0.3s; }
        
        .subject-tabs { display: flex; gap: 8px; border-bottom: 1px solid #E8ECF0; padding-bottom: 12px; margin-bottom: 20px; }
        .subj-tab { flex: 1; padding: 10px; border: none; background: #FAFAFA; border-radius: 10px; font-weight: bold; color: #5F6368; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .subj-tab.active { background: #E8F0FE; color: #1A73E8; }
        .error-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: #FAFAFA; border: 1px solid #E8ECF0; border-radius: 10px; margin-bottom: 8px; }
        /* ── 短文阅读板块 ── */
        .passage-container { padding: 8px 0; }
        .passage-title { font-size: 24px; font-weight: 700; color: #1A2530; text-align: center; margin-bottom: 4px; }
        .passage-subtitle { font-size: 14px; color: #5F6368; text-align: center; margin-bottom: 28px; }
        .passage-text { font-size: 18px; line-height: 2.1; color: #2E3440; letter-spacing: 0.3px; }
        .passage-text b { color: #0A56D0; font-weight: 700; }
        .passage-text b.gs { color: #D93025; font-weight: 700; }
        .passage-divider { border: none; border-top: 2px dashed #E3E8EE; margin: 28px 0 20px; }
        .passage-word-tag { display: inline-block; background: #E8F0FE; color: #1A73E8; padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; margin: 0 6px 8px 0; }
        .passage-play { display: inline-block; margin-left: 8px; font-size: 16px; cursor: pointer; opacity: 0.4; transition: opacity 0.2s, transform 0.15s; vertical-align: middle; user-select: none; }
        .passage-play:hover { opacity: 1; transform: scale(1.2); }

        .unit-opt.completed { color: #34A853 !important; font-weight: 700; }
        .unit-opt.completed::after { content: " ✓"; }
        #review-section { background: #F8F9FA; border-radius: 12px; padding: 14px; border: 1px solid #E3E8EE; margin-top: 4px; }
        .review-header { font-size: 13px; font-weight: bold; color: #3C4043; margin-bottom: 10px; }
        .reminder-unit { display: inline-block; font-size: 12px; background: #FFF; border: 1px solid #D2E3FC; border-radius: 6px; padding: 4px 10px; margin: 0 4px 4px 0; cursor: pointer; color: #1A73E8; font-weight: 600; }
        .reminder-unit:hover { background: #1A73E8; color: #FFF; }
        .reminder-unit.overdue { border-color: #EA4335; color: #EA4335; }
        .review-empty { font-size: 12px; color: #9AA0A6; text-align: center; }
        .review-btn { text-align: center; padding: 12px; background: #E8F0FE; border-radius: 10px; cursor: pointer; color: #1A73E8; font-size: 14px; font-weight: 600; transition: 0.2s; }
        .review-btn:hover { background: #D2E3FC; }
        .review-btn b { font-size: 18px; color: #0A56D0; }
        .dict-input.hint-mode { letter-spacing: 3px; font-family: monospace; color: #5F6368; }
        .strike-info { text-align: center; font-size: 13px; color: #5F6368; margin-bottom: 8px; }
        .strike-info .s-box { display: inline-block; padding: 2px 8px; background: #E8F0FE; border-radius: 4px; margin: 0 2px; font-weight: 600; }
        .strike-info .s-box.wrong { background: #FCE8E6; color: #D93025; }
        /* 延迟判分结果页 */
        .dr-container { padding: 10px 0; }
        .dr-title { font-size: 20px; font-weight: 700; color: #1A2530; text-align: center; margin-bottom: 24px; }
        .dr-title b { color: #0A56D0; }
        .dr-list { display: flex; flex-direction: column; gap: 8px; }
        .dr-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: #FAFAFA; border-radius: 8px; font-size: 16px; flex-wrap: wrap; }
        .dr-mark { font-size: 18px; flex-shrink: 0; }
        .dr-mark.dr-ok { color: #34A853; }
        .dr-mark.dr-bad { color: #D93025; }
        .dr-cn { font-size: 13px; color: #5F6368; }
        .dr-retry { padding: 4px 12px; background: #FFF; border: 1px solid #0A56D0; color: #0A56D0; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600; margin-left: auto; }
        .dr-retry:hover { background: #E8F0FE; }
        .dr-retry-input { padding: 6px 10px; border: 1px solid #E3E8EE; border-radius: 6px; font-size: 15px; width: 140px; outline: none; }
        .dr-retry-input:focus { border-color: #0A56D0; }
        .dr-retry-go { padding: 6px 10px; background: #0A56D0; color: #FFF; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600; }
        .dr-detail-btn { padding: 4px 10px; background: #FFF; border: 1px solid #E3E8EE; color: #5F6368; border-radius: 6px; font-size: 13px; cursor: pointer; margin-left: 4px; }
        .dr-detail-btn:hover { background: #F4F8FA; }
        .dr-detail { padding: 12px 16px; margin: -4px 0 8px 28px; background: #FFF; border-left: 3px solid #0A56D0; border-radius: 0 8px 8px 0; font-size: 14px; line-height: 1.6; }
        .dr-ex { margin-bottom: 6px; }
        .dr-ex .ex-en { font-size: 15px; color: #2E3440; font-weight: 500; }
        .dr-ex .ex-cn { font-size: 13px; color: #5F6368; }
        .dr-ph { font-size: 13px; color: #1A73E8; margin-bottom: 4px; }
        .dr-tip { font-size: 13px; color: #E65100; }
        /* 听音模式 */
        .listen-mode .word-cn { visibility: hidden; }
        .listen-icon { font-size: 40px; text-align: center; margin: 16px 0; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
        /* 提示按钮 + 变位词 */
        .btn-hint { padding: 14px 20px; background: #FFF3E0; color: #E65100; border: 1px solid #FFCC80; border-radius: 12px; font-size: 14px; font-weight: bold; cursor: pointer; margin-left: 8px; transition: 0.2s; }
        .btn-hint:hover { background: #FFE0B2; }
        .anagram-box { text-align: center; font-size: 28px; font-weight: 700; color: #1A73E8; letter-spacing: 6px; margin: 12px 0; padding: 12px; background: #E8F0FE; border-radius: 10px; }
        /* 选择题 */
        .choice-q { font-size: 18px; line-height: 1.8; color: #2E3440; text-align: center; margin: 16px 0; padding: 16px; background: #F8F9FA; border-radius: 10px; }
        .choice-q u { color: #0A56D0; font-weight: 700; text-decoration-style: dotted; }
        .choice-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
        .choice-opt { padding: 14px; background: #FFF; border: 2px solid #E3E8EE; border-radius: 10px; font-size: 16px; font-weight: 500; text-align: center; cursor: pointer; transition: 0.2s; }
        .choice-opt:hover { border-color: #0A56D0; background: #E8F0FE; }
        .choice-opt.selected { border-color: #0A56D0; background: #D2E3FC; }
        .choice-opt.correct { border-color: #34A853; background: #E6F4EA; color: #34A853; }
        .choice-opt.wrong { border-color: #D93025; background: #FCE8E6; color: #D93025; }
        .choice-opt.disabled { pointer-events: none; opacity: 0.7; }
        .choice-fb { text-align: center; font-size: 16px; font-weight: bold; min-height: 30px; margin-top: 8px; }
        select option.unit-opt.completed { color: #34A853; font-weight: 700; }

        /* === 练字板块 === */
        @font-face {
            font-family: 'Hengshui';
            src: local('舒窈英文衡水体'), local('Hengshui'),
                 url('file:///C:/Users/Administrator/AppData/Local/Microsoft/Windows/Fonts/舒窈英文衡水体.ttf') format('truetype');
            font-display: swap;
        }

        .mode-tabs.wide { display: grid; grid-template-columns: 1fr 1fr; }
        .mode-btn.writing-tab { grid-column: 1 / -1; }

        #writing-area { max-width: 100%; padding: 24px 32px; }
        .writing-toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #E8ECF0; }
        .writing-toolbar select { padding: 10px 14px; border-radius: 10px; border: 1px solid #E3E8EE; background: #FAFAFA; font-size: 13px; font-weight: 500; cursor: pointer; outline: none; min-width: 140px; }
        .writing-toolbar select:focus { border-color: #0A56D0; }
        .btn-gen-sheet { padding: 10px 24px; background: #0A56D0; color: #FFF; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-gen-sheet:hover { background: #0848B0; }
        .btn-print { padding: 10px 24px; background: #34A853; color: #FFF; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-left: auto; }
        .btn-print:hover { background: #2D8E47; }

        /* ── A4 字帖页 ── */
        #sheet-container { background: #FFF; border: 1px solid #E3E8EE; border-radius: 12px; overflow-y: auto; max-height: 75vh; }
        .sheet-page { width: 210mm; min-height: 297mm; margin: 0 auto; padding: 20mm 26mm 25mm 24mm; box-sizing: border-box; background: #FFF; }
        .sheet-title { text-align: center; font-size: 15px; font-weight: 700; color: #1A2530; margin-bottom: 1.5mm; letter-spacing: 2px; }
        .sheet-subtitle { text-align: center; font-size: 10px; color: #9AA0A6; margin-bottom: 6mm; }
        .sheet-section-label { font-size: 11px; color: #4CAF50; font-weight: 600; margin: 5mm 0 2mm 0; padding-bottom: 1mm; border-bottom: 1px solid rgba(76,175,80,0.2); }

        /* ── 词条块 ── */
        .entry-block {
            padding-bottom: 3mm; margin-bottom: 3mm;
            border-bottom: 1.5px solid #4CAF50;
        }
        .entry-block:last-child { border-bottom: none; }

        /* ── 全宽四线格行: 固定8.1mm, 1:1:1 ── */
        .trace-row {
            position: relative;
            width: 100%; height: 8.1mm;
            display: flex; align-items: flex-end;
            border-top: 0.7px solid rgba(76,175,80,0.7);
            border-bottom: 0.7px solid rgba(76,175,80,0.5);
            box-sizing: border-box;
            padding: 0 0 1.7mm 0;
            overflow: hidden;
        }
        .trace-row::before {
            content: '';
            position: absolute; top: 2.7mm; left: 0; right: 0;
            border-top: 0.7px solid rgba(76,175,80,0.55);
            pointer-events: none;
        }
        .trace-row::after {
            content: '';
            position: absolute; top: 5.4mm; left: 0; right: 0;
            border-top: 1.2px solid #E53935;
            pointer-events: none;
        }

        /* ── 文本: flex子元素, gap控制间距 ── */
        .tr-word, .tr-sentence {
            position: static;
            flex-shrink: 0;
            font-family: 'Hengshui', 'Calibri', sans-serif;
            font-size: 5mm; font-weight: 600;
            line-height: 1; white-space: nowrap; letter-spacing: 0.3px;
            color: rgba(0,0,0,0.22);
        }
        .tr-word.trace-light { color: rgba(0,0,0,0.12); }
        .tr-sentence { white-space: nowrap; color: rgba(0,0,0,0.22); flex-shrink: 1; }

        /* ── 中文释义 (每条一次) ── */
        .entry-cn {
            font-size: 9px; color: #1A2530; font-weight: 600;
            margin: 1mm 0 1.5mm 2mm; line-height: 1.4;
        }
        .entry-ex-cn {
            font-size: 9px; color: #1A2530; font-weight: 600;
            margin: 1mm 0 0 2mm; line-height: 1.4;
        }
        .entry-tips {
            font-size: 8px; color: #E65100;
            margin: 2mm 0 0 2mm; line-height: 1.4;
            padding: 1mm 2mm;
            background: rgba(230,81,0,0.05);
            border-left: 2px solid rgba(230,81,0,0.3);
            border-radius: 0 4px 4px 0;
        }
        .entry-prov {
            font-size: 8px; color: #137333;
            margin: 1.5mm 0 0 2mm; line-height: 1.4;
            font-style: italic;
        }

        /* ── 分页 ── */
        .page-break {
            page-break-before: always;
            break-before: page;
            border-top: 2px dashed #E53935;
            margin: 8mm 0 6mm 0;
            padding-top: 4mm;
            text-align: center;
            font-size: 9px; color: #E53935;
        }
        .page-break::before { content: '— 第 ' attr(data-page) ' 页 —'; }
        .page-num {
            text-align: center; font-size: 9px; color: #9AA0A6;
            margin-top: 6mm;
        }

        /* 打印样式 */
        @media screen {
            .page-break { page-break-before: auto; break-before: auto; }
        }
        @media print {
            body { background: #FFF !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            #app { display: block !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .left-col, .card-header, .progress-bar, .writing-toolbar, .back-btn, 
            .mode-tabs, .select-row, .btn-start, #review-section, .main-logo { display: none !important; }
            #right-content { width: 100% !important; }
            .card-area { box-shadow: none !important; border: none !important; border-radius: 0 !important; padding: 0 !important; max-width: 100% !important; }
            #writing-area { display: block !important; }
            #sheet-container { border: none !important; border-radius: 0 !important; max-height: none !important; overflow: visible !important; }
            .sheet-page { box-shadow: none !important; margin: 0 !important; width: 100% !important; min-height: auto !important; padding: 0 !important; }
            .page-break { page-break-before: always; break-before: page; border-top: none; margin: 0; padding: 0; }
            .page-break::before { content: none; }
            .page-num { display: none; }
            @page { size: A4; margin: 20mm 26mm 25mm 24mm; }
        }
    </style>
</head>
<body>
<div id="app">
    <div class="left-col">
        <div class="main-logo" onclick="backToMenu()">🔨 铸剑者</div>
        <div id="sidebar-box">
            <div class="mode-tabs">
                <button class="mode-btn active" id="tab-dictation" onclick="setMode('dictation')">✍️ 默写</button>
                <button class="mode-btn" id="tab-recite" onclick="setMode('recite')">📖 背读</button>
                <button class="mode-btn" onclick="showErrors()">📓 错题 <span id="badge-total" style="color:#D93025; margin-left:2px;">0</span></button>
            </div>
            <div class="mode-tabs" style="margin-top:0;">

function playErrorBeep() {
    try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(250, ctx.currentTime);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3); osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
}

function generateSheet() {
    var tbIdx = document.getElementById('writing-tb-sel').value;
    var unitIdx = document.getElementById('writing-unit-sel').value;
    if (tbIdx === '' || unitIdx === '') return;
    
    var tb = TEXTBOOKS[parseInt(tbIdx)];
    var unit = tb.units[parseInt(unitIdx)];
    var entries = unit.entries;
    
    // ── 收集数据 ──
    var words = [];      // {en, cn, _examples, _tips, _prov}
    var phrases = [];    // {en, cn} from ENRICHED
    
    for (var i = 0; i < entries.length; i++) {
        var e = entries[i];
        var key = e.en.toLowerCase().replace(/[^a-z0-9]/g, '');
        var enr = ENRICHED[key] || {};
        var wordEn = enr.word || e.en;
        var cn = enr.cn || e.cn || '';
        
        // 收集例句（每个词自己的例句）
        var myExamples = [];
        if (enr.examples) {
            for (var x = 0; x < enr.examples.length; x++) {
                var ex = enr.examples[x];
                var exEn = ex.en || '';
                var exCn = ex.cn || '';
                // 如果 cn 为空但 en 里混了中文，拆分出来
                if (!exCn && exEn && /[\u4e00-\u9fff]/.test(exEn)) {
                    var cnIdx = exEn.search(/[\u4e00-\u9fff]/);
                    exCn = exEn.substring(cnIdx).trim();
                    exEn = exEn.substring(0, cnIdx).trim().replace(/[.,;，。；]+$/, '');
                }
                if (exEn) myExamples.push({ en: exEn, cn: exCn });
            }
        }
        
        words.push({
            en: wordEn, cn: cn,
            _examples: myExamples,
            _tips: enr.tips || '',
            _prov: enr.prov || ''
        });
        
        // 收集词组
        if (enr.phrases) {
            var phList = enr.phrases.split('\n');
            for (var p = 0; p < phList.length; p++) {
                var ph = phList[p].trim();
                if (!ph) continue;
                var phEn = ph, phCn = '';
                var cnMatch = ph.match(/[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]+/);
                if (cnMatch) {
                    phCn = cnMatch[0];
                    phEn = ph.substring(0, ph.indexOf(phCn)).trim();
                }
                phrases.push({ en: phEn, cn: phCn });
            }
        }
    }
    
    // ── 构建 HTML ──
    var PAGE_H = 252; // A4可用高度 mm (297-20-25)
    var pageH = 0;    // 当前页累计高度
    var pageNum = 1;
    
    function addPageBreak() {
        var s = '';
        if (pageNum > 1) {
            s += '<div class="page-num">— 第 ' + (pageNum-1) + ' 页 —</div>';
        }
        s += '<div class="page-break" data-page="' + pageNum + '"></div>';
        pageNum++;
        pageH = 0;
        return s;
    }
    
    // 估算词条高度
    function entryH(hasSentence) {
        return hasSentence ? 18 : 10; // mm: 实际更紧凑
    }
    
    var html = '<div class="sheet-page">';
    html += '<div class="sheet-title">' + tb.textbook + ' · ' + unit.name + '</div>';
    html += '<div class="sheet-subtitle">衡水体英文练字帖 — ' + words.length + '词</div>';
    pageH = 28; // 标题+副标题+顶部padding约28mm
    
    // ═══ 单词区 ═══
    if (words.length > 0) {
        html += '<div class="sheet-section-label">📝 单词临摹</div>';
        pageH += 8;
        
        for (var w = 0; w < words.length; w++) {
            var word = words[w];
            // 取第一个例句
            var sEn = '', sCn = '';
            if (word._examples && word._examples.length > 0) {
                sEn = word._examples[0].en;
                sCn = word._examples[0].cn;
            }
            var hasEx = !!(sEn);
            var eh = entryH(hasEx);
            
            // 检查是否需要分页
            if (pageH + eh > PAGE_H && w > 0) {
                html += addPageBreak();
                html += '<div class="sheet-section-label">📝 单词临摹 (续)</div>';
                pageH += 8;
            }
            
            // 能放几个完整词组就放几个
            var isPhrase = (e.type === 'phrase');
            var len = word.en.length;
            var estW = len * 2.5; // 估算字宽 mm
            var maxCols = Math.floor((152 + 4) / (estW + 4)); // 152mm宽, 4mm gap
            if (maxCols < 1) maxCols = 1;
            if (maxCols > 5) maxCols = 5;
            var cols = isPhrase ? Math.min(maxCols, 3) : ((len > 10) ? 3 : 5);
            var gap = 4; // mm
            
            html += '<div class="entry-block">';
            html += '<div class="trace-row" style="gap:' + gap + 'mm">';
            for (var col = 0; col < cols; col++) {
                var cls = (isPhrase ? (col <= 1 ? 'tr-word' : 'tr-word trace-light') : (col <= 2 ? 'tr-word' : 'tr-word trace-light'));
                html += '<span class="' + cls + '">' + word.en + '</span>';
            }
            html += '</div>';
            html += '<div class="entry-cn">' + word.cn + '</div>';
            if (sEn) {
                html += '<div class="trace-row"><span class="tr-sentence">' + sEn + '</span></div>';
                html += '<div class="entry-ex-cn">' + sCn + '</div>';
            }
            html += '</div>';
            pageH += eh;
        }
    }
    
    // ═══ 词组区 ═══
    if (phrases.length > 0) {
        if (pageH + 30 > PAGE_H) { html += addPageBreak(); }
        html += '<div class="sheet-section-label">📎 词组临摹</div>';
        pageH += 8;
        
        for (var p = 0; p < phrases.length; p++) {
            var phr = phrases[p];
            var eh = 14; // 词组条高度
            
            if (pageH + eh > PAGE_H) {
                html += addPageBreak();
                html += '<div class="sheet-section-label">📎 词组临摹 (续)</div>';
                pageH += 8;
            }
            
            // 词组: 3份, flex自然换行
            html += '<div class="entry-block">';
            html += '<div class="trace-row" style="gap:4mm">';
            html += '<span class="tr-word">' + phr.en + '</span>';
            html += '<span class="tr-word">' + phr.en + '</span>';
            html += '<span class="tr-word trace-light">' + phr.en + '</span>';
            html += '</div>';
            if (phr.cn) html += '<div class="entry-cn">' + phr.cn + '</div>';
            html += '</div>';
            pageH += eh;
        }
    }
    
    // 末页页码
    html += '<div class="page-num">— 第 ' + pageNum + ' 页 —</div>';
    html += '</div>';
    
    document.getElementById('sheet-container').innerHTML = html;
    document.getElementById('sheet-container').style.display = 'block';
    document.getElementById('writing-placeholder').style.display = 'none';
    document.getElementById('btn-print').style.display = 'inline-block';
}

    var phonetic = enr.phonetic || '';
    var posTag = enr.pos || '';
    var cn = enr.cn || e.cn || '暂无释义';

    var cascadeCards = [];

    if(enr.gf_pattern) cascadeCards.push({cls:'ic-grammar', title:'语法', body:enr.gf_pattern});
    if(enr.gf_prep) cascadeCards.push({cls:'ic-prep', title:'介词', body:enr.gf_prep});
    if(enr.gf_phrase) cascadeCards.push({cls:'ic-phrase', title:'短语', body:enr.gf_phrase});
    if(enr.forms) cascadeCards.push({cls:'ic-forms', title:'拓展', body:enr.forms});
    if(enr.phrases) cascadeCards.push({cls:'ic-phrases', title:'搭配', body:enr.phrases});
    if(enr.prov) cascadeCards.push({cls:'ic-prov', title:'谚语', body:enr.prov});
    if(enr.tips) cascadeCards.push({cls:'ic-tips', title:'提示', body:enr.tips});
    totalCascadeCards = cascadeCards.length; cascadeIndex = 0; cascadeDone = false;
    var blocksHtml = '<div class="insight-deck" id="insight-deck">';
    for (var ci = 0; ci < cascadeCards.length; ci++) {
        var c = cascadeCards[ci]; var state = ci === 0 ? 'active' : 'pending';
        blocksHtml += '<div class="insight-card ' + c.cls + ' ' + state + '" data-idx="' + ci + '"><div class="ic-title">' + c.title + '</div><div class="ic-body">' + c.body + '</div></div>';

                <div class="word-en">${displayWord}</div>
                ${phonetic || posTag ? `<div class="word-phon">${posTag ? `<span class="pos-tag">[${posTag}]</span> ` : ''}${phonetic} <span class="phon-play" onclick="event.stopPropagation();speakWord('${wordEn}')" title="播放发音">🔊</span></div>` : ''}
                </div>
            <div id="btn-relearn" style="display:none; text-align:center; margin-bottom: 24px;">
                <button onclick="flipCard(false)" style="background:#F0F4FF; color:#1A73E8; border:none; padding:10px 20px; border-radius:10px; font-weight:bold; font-size:16px; cursor:pointer;">👀 忘了？再学习一遍</button>
            </div>
            <div class="word-cn">${cn}</div>
            ${blocksHtml}
            <div class="streak-dots" id="recite-dots">
                <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </div>
            <div class="input-row" style="margin-top:12px;">
                <input type="text" id="qw-input" class="dict-input" placeholder="光标点击此处，屏蔽英文盲打..." autocomplete="off" onfocus="speakWord('${wordEn}');flipCard(true);startReciteAudioLoop('${wordEn}')" onkeypress="if(event.key === 'Enter') checkReciteAnswer()">
                <button class="btn-action" style="width:120px;" onclick="checkReciteAnswer()">确认</button>
            </div>

    } else {

        if (isAnagram) currentQuizEntry._hintUsed = true;
        choiceAnswered = false; // 重置选择题点击锁
    }
    if(activeMode !== 'recite') setTimeout(() => { const inp = document.getElementById('qw-input'); if(inp) inp.focus(); }, 50);
}

// 累计连击，打错不清零
function useHint() {
    if (delayMode || answered) return;
    currentQuizEntry._hintUsed = true;
    var hint = generateHint(currentQuizEntry.en);
    var inp = document.getElementById('qw-input');
    var fb = document.getElementById('qw-feedback');
    inp.placeholder = hint;
    inp.value = '';
    inp.classList.add('hint-mode');
    fb.innerHTML = '<span style="color:#E65100;">💡 提示：' + hint + '</span>';
    inp.focus();
}
function shuffleWord(word) {
    var arr = word.split('');
    do {
        for (var i = arr.length - 1; i > 0; i--) {
            var j = Math.floor(Math.random() * (i + 1));
            var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
        }
    } while (arr.join('') === word && word.length > 3);
    return arr.join('');
}
function skipRecite() {
    stopReciteAudioLoop();
    saveError(currentQuizEntry.cn, currentQuizEntry.en);
    idx++;
    showWord();
}
function forceNext() {
    stopReciteAudioLoop();
    idx++;
    showWord();
}

function startReciteAudioLoop(word) {
    if (reciteAudioTimer) clearInterval(reciteAudioTimer);
    reciteAudioTimer = setInterval(function() { speakWord(word); }, 3000);
}
function stopReciteAudioLoop() {
    if (reciteAudioTimer) { clearInterval(reciteAudioTimer); reciteAudioTimer = null; }
}

function advanceCascade() {
    if (cascadeDone) return true;
    if (cascadeIndex >= totalCascadeCards - 1) {
        cascadeDone = true;
        return true;
    }
    var deck = document.getElementById('insight-deck');
    if (!deck) return false;
    var cards = deck.querySelectorAll('.insight-card');
    if (cards[cascadeIndex]) cards[cascadeIndex].classList.replace('active', 'seen');
    cascadeIndex++;
    if (cards[cascadeIndex]) cards[cascadeIndex].classList.replace('pending', 'active');
    return false;
}

function checkReciteAnswer() {
    stopReciteAudioLoop();
    var inp = document.getElementById('qw-input');
    if(!inp || inp.value.trim() === '') return;
    var userAns = inp.value.trim().toLowerCase();
    var target = currentQuizEntry.en.toLowerCase();
    
    if (userAns === target) {
        score++;
        var allRevealed = advanceCascade();
        speakWord(target);
        inp.style.borderColor = '#34A853';
        inp.value = '';
        if (allRevealed || totalCascadeCards <= 1) {
            inp.disabled = true;
            setTimeout(() => { forceNext(); }, 600);
        }
    } else {
        inp.style.borderColor = '#EA4335';
        playErrorBeep();
        inp.classList.add('shake');
        saveError(currentQuizEntry.cn, currentQuizEntry.en);
        setTimeout(() => { inp.classList.remove('shake'); inp.style.borderColor = '#E3E8EE'; inp.value = ''; }, 400);
    }
}

function checkDictAnswer() {
    if(answered) return;
    var inp = document.getElementById('qw-input');
    if(!inp || inp.value.trim() === '') return;
    var userAns = inp.value.trim().toLowerCase();
    var target = currentQuizEntry.en.toLowerCase();
    var fb = document.getElementById('qw-feedback');
    
    // === 延迟反馈模式（每日复习）===
    if (delayMode) {
        var correct = (userAns === target);
        reviewLog.push({
            word: target, cn: currentQuizEntry.cn, correct: correct,
            userAns: userAns, box: currentQuizEntry._box
        });
        if (correct) score++;
        answered = true;
        inp.disabled = true;
        idx++;
        
        // 每 N 题或全部答完 → 显示结果
        var batchEnd = (reviewLog.length % delayBatchSize === 0);
        var allDone = (idx >= words.length);
        if (batchEnd || allDone) {
            setTimeout(function() { showDelayResults(allDone); }, 300);
        } else {
            setTimeout(function() { showWord(); }, 200);
        }
        return;
    }
    
    // === 正常模式（单元学习，3击缓冲）===
    if (userAns === target) {
        // 正确 → 升盒（除非用了提示）
        score++;
        var hinted = currentQuizEntry._hintUsed;
        if (currentQuizEntry._box && !hinted) upgradeBox(target);
        inp.style.borderColor = '#34A853'; inp.style.color = '#34A853';
        fb.innerHTML = '<span style="color:#34A853;">✅ 正确！' + (hinted ? '（提示后答对，不升盒）' : '（Box' + (currentQuizEntry._box || '?') + '→升盒）') + '</span>';
        speakWord(target);
        answered = true;
        setTimeout(() => { idx++; showWord(); }, 800);
    } else {
        // 3击缓冲
        if (!currentQuizEntry._strikes) currentQuizEntry._strikes = 0;
        currentQuizEntry._strikes++;
        var s = currentQuizEntry._strikes;
        
        if (s < 3) {
            // 前两次：清空重试
            inp.style.borderColor = '#EA4335';
            fb.innerHTML = '<span style="color:#EA4335;">❌ 再试一次（' + s + '/3）</span>';
            playErrorBeep();
            inp.classList.add('shake');
            setTimeout(() => { inp.classList.remove('shake'); inp.style.borderColor = '#E3E8EE'; inp.value = ''; inp.focus(); }, 300);
        } else {
            // 第3次：给提示
            var hint = generateHint(target);
            inp.value = '';
            inp.placeholder = hint;
            inp.classList.add('hint-mode');
            fb.innerHTML = '<span style="color:#E65100;">💡 提示：' + hint + '（最后机会）</span>';
            inp.style.borderColor = '#E65100';
            inp.focus();
        }
        
        if (s > 3) {
            // 提示后还是错 → 降盒
            saveError(currentQuizEntry.cn, currentQuizEntry.en);
            if (currentQuizEntry._box) downgradeBox(target);
            fb.innerHTML = '<span style="color:#D93025;">❌ 答错，正确答案：<b>' + target + '</b>（降盒）</span>';
            speakWord(target);
            answered = true;
            inp.disabled = true;
            setTimeout(() => { idx++; showWord(); }, 1500);
        }
    }
    updateReviewStrikes();
}

function updateReviewStrikes() {
    var si = document.getElementById('strike-info');
    if (!si || !currentQuizEntry._strikes && !currentQuizEntry._box) return;
    var html = '';
    if (currentQuizEntry._box) html += '<span class="s-box">Box' + currentQuizEntry._box + '</span> ';
    for (var i = 1; i <= 3; i++) {
        html += '<span class="s-box' + (i <= (currentQuizEntry._strikes||0) ? ' wrong' : '') + '">' + (i <= (currentQuizEntry._strikes||0) ? '✗' : '○') + '</span>';
    }
    si.innerHTML = html;
}

// 选择题点击
var choiceAnswered = false;
function selectChoice(el) {
    if (choiceAnswered) return;
    choiceAnswered = true;
    var oidx = parseInt(el.getAttribute('data-oidx'));
    var answer = el.getAttribute('data-answer');
    var opts = el.parentElement.querySelectorAll('.choice-opt');
    var fb = document.getElementById('choice-feedback');
    
    // 禁用所有选项
    for (var i = 0; i < opts.length; i++) opts[i].classList.add('disabled');
    
    // 标记正确选项
    var correctIdx = answer.charCodeAt(0) - 65; // A=0, B=1, C=2, D=3
    if (opts[correctIdx]) {
        opts[correctIdx].classList.add('correct');
        opts[correctIdx].textContent = '✅ ' + opts[correctIdx].textContent.substring(3);
    }
    
    var isCorrect = (oidx === correctIdx);
    if (isCorrect) {
        el.classList.add('correct');
        fb.innerHTML = '<span style="color:#34A853;">✅ 正确！</span>';
    } else {
        el.classList.add('wrong');
        fb.innerHTML = '<span style="color:#D93025;">❌ 选错了</span>';
    }
    
    // 记录到reviewLog
    reviewLog.push({
        word: currentQuizEntry.en, cn: currentQuizEntry.cn, correct: isCorrect,
        userAns: String.fromCharCode(65 + oidx), box: currentQuizEntry._box
    });
    
    if (isCorrect) {
        score++;
        upgradeBox(currentQuizEntry.en.toLowerCase());
    } else {
        downgradeBox(currentQuizEntry.en.toLowerCase());
    }
    
    answered = true; idx++;
    var batchEnd = (reviewLog.length % delayBatchSize === 0);
    var allDone = (idx >= words.length);
    setTimeout(function() {
        if (batchEnd || allDone) showDelayResults(allDone);
        else showWord();
    }, 1200);
}

function finishQuiz() {
    document.getElementById('quiz-area').style.display = 'none'; 
    document.getElementById('result-area').style.display = 'block';
    var pct = score / words.length;
    document.getElementById('result-score').textContent = '得分: ' + score + ' / ' + words.length;
    document.getElementById('result-emoji').textContent = pct >= 0.9 ? '🏆' : (pct >= 0.7 ? '✅' : '🔥');
    
    if (pct >= 0.7 && !delayMode) {
        var unitIdx = document.getElementById('unit-select').value;
        if (unitIdx !== '') markCompleted(currentTb, parseInt(unitIdx));
    }
    reviewTarget = null;
    delayMode = false;
    reviewLog = [];
    dailyReviewWords = [];
    updateReviewList();
}

// === 延迟反馈：结果页 ===
function showDelayResults(allDone) {
    stopReciteAudioLoop();
    var body = document.getElementById('card-body');
    var batchLog = reviewLog.slice(-Math.min(reviewLog.length, delayBatchSize));
    if (allDone) batchLog = reviewLog;
    
    var correctCount = batchLog.filter(function(r){ return r.correct; }).length;
    
    var rows = '';
    for (var i = 0; i < batchLog.length; i++) {
        var r = batchLog[i];
        var key = r.word.toLowerCase().replace(/[^a-z0-9]/g, '');
        var enr = ENRICHED[key] || {};
        var phonetic = enr.phonetic || '';
        var exEn = (enr.examples && enr.examples[0]) ? enr.examples[0].en : '';
        var exCn = (enr.examples && enr.examples[0]) ? enr.examples[0].cn : '';
        var phrases = enr.phrases || '';
        var tips = enr.tips || '';
        
        if (r.correct) {
            rows += '<div class="dr-row"><span class="dr-mark dr-ok">✅</span> <b>' + r.word + '</b> <span class="dr-cn">' + r.cn + '</span></div>';
        } else {
            var detailId = 'dr-detail-' + i;
            rows += '<div class="dr-row dr-row-wrong" id="dr-row-' + i + '">' +
                '<span class="dr-mark dr-bad">❌</span>' +
                '<span style="text-decoration:line-through;color:#D93025;">' + r.userAns + '</span> → <b>' + r.word + '</b>' +
                (phonetic ? ' <span style="color:#5F6368;font-size:13px;">' + phonetic + '</span>' : '') +
                ' <span class="dr-cn">' + r.cn + '</span>' +
                '<span style="flex:1;"></span>' +
                '<button class="dr-retry" data-retry-idx="' + i + '" data-retry-word="' + r.word + '">🔁 再试</button>' +
                '<button class="dr-detail-btn" data-detail-id="' + detailId + '">📖 详情</button>' +
                '</div>' +
                '<div class="dr-detail" id="' + detailId + '" style="display:none;">' +
                (exEn ? '<div class="dr-ex"><div class="ex-en">' + exEn + '</div><div class="ex-cn">' + exCn + '</div></div>' : '') +
                (phrases ? '<div class="dr-ph">📎 ' + phrases.replace(/\n/g, '<br>') + '</div>' : '') +
                (tips ? '<div class="dr-tip">💡 ' + tips + '</div>' : '') +
                '</div>';
        }
    }
    
    var nextLabel = allDone ? '✅ 完成复习' : '▶️ 下一组（' + Math.min(words.length - idx, delayBatchSize) + '题）';
    var nextAction = allDone ? 'finishDelayReview()' : 'continueDelayReview()';
    
    body.innerHTML = 
        '<div class="dr-container">' +
        '<div class="dr-title">📊 本轮结果：<b>' + correctCount + '</b>/' + batchLog.length + ' 正确</div>' +
        '<div class="dr-list">' + rows + '</div>' +
        '<div style="text-align:center;margin-top:20px;">' +
        '<button class="btn-action" onclick="' + nextAction + '">' + nextLabel + '</button>' +
        '</div></div>';
}

        if (!isNaN(idx) && word) submitRetry(idx, word);
    }
});

function submitRetry(logIdx, word) {
    var inp = document.getElementById('dr-inp-' + logIdx);
    if (!inp) return;
    var ans = inp.value.trim().toLowerCase();
    var row = document.getElementById('dr-row-' + logIdx);
    if (!row) return;
    
    if (ans === word.toLowerCase()) {
        upgradeBox(word);
        row.innerHTML = '<span class="dr-mark dr-ok">✅</span> <b>' + word + '</b> <span style="color:#34A853;font-size:13px;">挽回成功！升盒</span>';
        // Update reviewLog
        var r = reviewLog[logIdx];
        if (r) { r.correct = true; score++; }
    } else {
        downgradeBox(word);
        row.innerHTML = '<span class="dr-mark dr-bad">❌</span> <span style="text-decoration:line-through;color:#D93025;">' + ans + '</span> → <b>' + word + '</b> <span style="color:#D93025;font-size:13px;">降盒</span>';
    }
}

// === 莱特纳复习系统 ===
var LEITNER_BOXES = [1, 3, 7, 14, 30]; // 5盒：间隔天数
var DAILY_LIMIT = 60; // 每日复习上限

function getLeitner() {
    try { return JSON.parse(localStorage.getItem('zk_leitner') || '{}'); } catch(e) { return {}; }
}
function saveLeitner(data) { localStorage.setItem('zk_leitner', JSON.stringify(data)); }

function getCompleted() {
    try { return JSON.parse(localStorage.getItem('zk_completed') || '{}'); } catch(e) { return {}; }
}

// 单元完成 → 所有词进Box1
function markCompleted(tbIdx, unitIdx) {
    var key = tbIdx + '|' + unitIdx;
    var completed = getCompleted();
    var today = new Date().toISOString().slice(0, 10);
    completed[key] = today;
    localStorage.setItem('zk_completed', JSON.stringify(completed));
    
    // 单元里所有词进 Box1
    var unit = TEXTBOOKS[tbIdx].units[unitIdx];
    var leitner = getLeitner();
    var tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + LEITNER_BOXES[0]);
    var next = tomorrow.toISOString().slice(0, 10);
    
    for (var i = 0; i < unit.entries.length; i++) {
        var w = unit.entries[i].en.toLowerCase();
        if (!leitner[w] || leitner[w].box === undefined) {
            leitner[w] = { box: 1, next: next, strikes: 0 };
        }
    }
    saveLeitner(leitner);
    
    if (currentTb === tbIdx) populateUnits();
}

// 答对 → 升盒（Box5毕业）
function upgradeBox(word) {
    var leitner = getLeitner();
    var entry = leitner[word];
    if (!entry) return;
    
    if (entry.box >= LEITNER_BOXES.length) {
        entry.box = 0; // 0 = 已毕业
        entry.next = null;
    } else {
        entry.box++;
        var d = new Date();
        d.setDate(d.getDate() + LEITNER_BOXES[entry.box - 1]);
        entry.next = d.toISOString().slice(0, 10);
    }
    entry.strikes = 0;
    saveLeitner(leitner);
}

// 3次拼错 → 降一级
function downgradeBox(word) {
    var leitner = getLeitner();
    var entry = leitner[word];
    if (!entry) {
        // 新词，直接进 Box1
        var d = new Date();
        d.setDate(d.getDate() + LEITNER_BOXES[0]);
        leitner[word] = { box: 1, next: d.toISOString().slice(0, 10), strikes: 0 };
    } else if (entry.box > 1) {
        entry.box--;
        var d2 = new Date();
        d2.setDate(d2.getDate() + LEITNER_BOXES[entry.box - 1]);
        entry.next = d2.toISOString().slice(0, 10);
    } else {
        // Box1 → 保持Box1，明天再来
        var d3 = new Date();
        d3.setDate(d3.getDate() + LEITNER_BOXES[0]);
        entry.next = d3.toISOString().slice(0, 10);
    }
    entry.strikes = 0;
    saveLeitner(leitner);
}

// 生成提示字母（≤30%）
function generateHint(word) {
    var len = word.length;
    var maxHints = Math.max(1, Math.floor(len * 0.3));
    var positions = [0]; // 首字母必给
    while (positions.length < maxHints) {
        var p = Math.floor(Math.random() * (len - 1)) + 1;
        if (positions.indexOf(p) === -1) positions.push(p);
    }
    var hint = '';
    for (var i = 0; i < len; i++) {
        hint += positions.indexOf(i) >= 0 ? word[i] : '_';
    }
    return hint;
}

// 获取今日复习词（按盒优先级，上限60）
function getDailyReviewWords() {
    var leitner = getLeitner();
    var today = new Date().toISOString().slice(0, 10);
    
    // 按盒分组收集到期词
    var boxes = [[], [], [], [], []];
    for (var w in leitner) {
        var e = leitner[w];
        if (e.box > 0 && e.box <= 5 && e.next && e.next <= today) {
            boxes[e.box - 1].push(w);
        }
    }
    
    // 按优先级收集：Box1 → Box5，每盒内随机打乱
    var result = [];
    for (var b = 0; b < 5 && result.length < DAILY_LIMIT; b++) {
        boxes[b].sort(function() { return Math.random() - 0.5; });
        for (var j = 0; j < boxes[b].length && result.length < DAILY_LIMIT; j++) {
            result.push({ word: boxes[b][j], box: b + 1 });
        }
    }
    return result;
}

// 启动每日复习（全局混搭，延迟反馈）
var delayMode = false;
var reviewLog = [];      // {word, correct, userAns, box}
var delayBatchSize = 10;

function startDailyReview() {
    dailyReviewWords = getDailyReviewWords();
    if (dailyReviewWords.length === 0) return;
    dailyReviewIdx = 0;
    dailyReviewScore = 0;
    reviewTarget = null;
    delayMode = true;
    reviewLog = [];
    
    var entries = [];
    for (var i = 0; i < dailyReviewWords.length; i++) {
        var w = dailyReviewWords[i].word;
        var enr = ENRICHED[w] || {};
        var cn = enr.cn || w;
        var rnd = Math.random();
        var qtype;
        if (dailyReviewWords[i].box >= 4) {
            qtype = 'choice';  // Box4: 选择题
        } else {
            qtype = rnd < 0.1 ? 'anagram' : (rnd < 0.4 ? 'listen' : 'spell');
        }
        entries.push({ en: w, cn: cn, type: 'word', _box: dailyReviewWords[i].box, _qtype: qtype });
    }
    
    words = entries;
    idx = 0; score = 0; answered = false; reciteStreak = 0;
    activeMode = 'dictation';
    document.querySelectorAll('.card-area').forEach(function(el) { el.style.display = 'none'; });
    document.getElementById('quiz-area').style.display = 'block';
    document.getElementById('progress-text').textContent = '🔄 每日复习 · 延迟判分';
    showWord();
}

function updateReviewList() {
    var container = document.getElementById('reminder-unit-list');
    var words = getDailyReviewWords();
    var count = words.length;
    var boxCounts = {};
    for (var i = 0; i < words.length; i++) {
        var b = words[i].box;
        boxCounts[b] = (boxCounts[b] || 0) + 1;
    }
    var boxInfo = [];
    for (var b = 1; b <= 5; b++) {
        if (boxCounts[b]) boxInfo.push('B' + b + ':' + boxCounts[b]);
    }
    
    if (count > 0) {
        container.innerHTML = '<div class="review-btn" onclick="startDailyReview()">🔄 今日复习 <b>' + count + '</b> 词 <span style="font-size:11px;color:#5F6368;">(' + boxInfo.join(' ') + ')</span></div>';
    } else {
        container.innerHTML = '<div class="review-empty">🎉 暂无复习任务</div>';
    }
}

// 复习模式（从提醒区点单元复习的旧逻辑——现在保留但引导到每日复习）
var reviewTarget = null;
function startReview(tbIdx, unitIdx) {
    // 保留兼容：直接启动该单元的默认学习模式
    currentTb = tbIdx;
    reviewTarget = { tb: tbIdx, unit: unitIdx };
    document.getElementById('tb-selector-sel').value = tbIdx;
    populateUnits();
    document.getElementById('unit-select').value = unitIdx;
    document.getElementById('start-btn').style.display = 'block';
    startQuiz();
}

// Init review list on page load
var _origOnload = window.onload;
window.onload = function() {
    // 先注入初中考纲课本（83篇短文，排在最前）
    if (typeof ZHONGKAO_DATA !== 'undefined') {
        if (ZHONGKAO_DATA.units) {
            for (var ui = 0; ui < ZHONGKAO_DATA.units.length; ui++) {
                var unit = ZHONGKAO_DATA.units[ui];
                for (var ei = 0; ei < unit.entries.length; ei++) {
                    var entry = unit.entries[ei];
                    if (entry._enriched) {
                        var key = entry.en.toLowerCase().replace(/[^a-z0-9]/g, '');
                        if (!ENRICHED[key]) ENRICHED[key] = entry._enriched;
                    }
                    delete entry._enriched;
                }
            }
        }
        TEXTBOOKS.unshift(ZHONGKAO_DATA);
    }
    // 再注入中考组词课本
    if (typeof ZHONGKAO_PHRASES !== 'undefined') {
        if (ZHONGKAO_PHRASES.units) {
            for (var ui = 0; ui < ZHONGKAO_PHRASES.units.length; ui++) {
                var unit = ZHONGKAO_PHRASES.units[ui];
                for (var ei = 0; ei < unit.entries.length; ei++) {
                    var entry = unit.entries[ei];
                    if (entry._enriched) {
                        var key = entry.en.toLowerCase().replace(/[^a-z0-9]/g, '');
                        if (!ENRICHED[key]) ENRICHED[key] = entry._enriched;
                    }
                    delete entry._enriched;
                }
            }
        }
        TEXTBOOKS.push(ZHONGKAO_PHRASES);
    }
    // 然后执行原始初始化
    if (_origOnload) _origOnload();
    updateReviewList();
};

</script>
