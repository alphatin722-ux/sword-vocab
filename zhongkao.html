
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铸剑者 - 单词记忆系统</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif; background-color: #F4F8FA; color: #1A2530; min-height: 100vh; }
        
        #app { display: grid; grid-template-columns: 280px 1fr; gap: 32px; max-width: 1200px; margin: 40px auto; align-items: start; padding: 0 32px; }
        
        .left-col { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 40px; }
        .main-logo { font-size: 28px; font-weight: 800; color: #1A2530; cursor: pointer; letter-spacing: 1px; margin-bottom: 4px; padding-left: 4px; }
        .main-logo:hover { color: #0A56D0; }
        
        #sidebar-box { background: #FFFFFF; border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(26,37,48,0.04); display: flex; flex-direction: column; gap: 12px; border: 1px solid rgba(0,0,0,0.03); }
        .mode-tabs { display: flex; gap: 6px; }
        .mode-btn { flex: 1; padding: 10px 0; border-radius: 10px; font-size: 13px; font-weight: 600; border: 1px solid #E3E8EE; background: #FAFAFA; color: #5F6368; cursor: pointer; transition: 0.2s; }
        .mode-btn.active { background: #0A56D0; color: #FFF; border-color: #0A56D0; box-shadow: 0 2px 8px rgba(10,86,208,0.15); }
        
        .select-row { display: flex; gap: 8px; width: 100%; }
        .select-row select { flex: 1; min-width: 0; padding: 10px; border-radius: 10px; border: 1px solid #E3E8EE; background: #FAFAFA; font-size: 13px; font-weight: 500; cursor: pointer; outline: none; }
        .select-row select:focus { border-color: #0A56D0; background: #FFF; }
        
        .btn-start { width: 100%; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 15px; background: #0A56D0; color: #FFF; border: none; cursor: pointer; transition: 0.2s; display: none; }
        .btn-start:hover { background: #0848B0; }
        
        #review-section { background: #F8F9FA; border-radius: 12px; padding: 14px; border: 1px solid #E3E8EE; margin-top: 4px; }
        .review-header { font-size: 13px; font-weight: bold; color: #3C4043; margin-bottom: 10px; }
        .reminder-unit { display: inline-block; font-size: 12px; background: #FFF; border: 1px solid #D2E3FC; border-radius: 6px; padding: 4px 10px; margin: 0 4px 4px 0; cursor: pointer; color: #1A73E8; font-weight: 600; }
        .reminder-unit:hover { background: #1A73E8; color: #FFF; }
        .review-empty { font-size: 12px; color: #9AA0A6; text-align: center; }

        #right-content { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .card-area { width: 100%; max-width: 820px; background: #FFFFFF; border-radius: 20px; padding: 32px 48px; box-shadow: 0 8px 32px rgba(26,37,48,0.03); display: none; border: 1px solid rgba(0,0,0,0.03); transition: min-height 0.3s; }
        
        #welcome-area { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 480px; cursor: pointer; }
        #quote-text { font-family: 'Ma Shan Zheng', cursive; font-size: 56px; color: #1A2530; line-height: 1.4; text-align: center; margin-bottom: 24px; letter-spacing: 4px; }
        #quote-author { font-size: 18px; color: #5F6368; font-weight: 600; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .back-btn { font-size: 14px; font-weight: bold; color: #5F6368; cursor: pointer; padding: 6px 12px; border-radius: 8px; background: #F4F8FA; transition: 0.2s; }
        .back-btn:hover { background: #E8F0FE; color: #1A73E8; }
        
        .progress-bar { height: 4px; background: #F4F8FA; border-radius: 2px; margin-bottom: 32px; overflow: hidden; }
        .progress-fill { height: 100%; background: #0A56D0; border-radius: 2px; transition: width 0.3s; }
        
        .word-en { font-size: 56px; font-weight: 800; color: #1A2530; text-align: center; margin-bottom: 6px; letter-spacing: 0.5px; }
        .word-phon { font-size: 18px; color: #5F6368; text-align: center; margin-bottom: 24px; font-family: monospace; }
        .word-cn { font-size: 32px; font-weight: 600; color: #1A2530; text-align: center; margin-bottom: 28px; line-height: 1.4; }
        
        /* 单列铺满，消除留白 */
        .block-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; width: 100%; }
        .info-box { background: #F8F9FA; border-radius: 12px; padding: 18px 24px; border-left: 4px solid #0A56D0; text-align: left; }
        .ex-en { font-size: 18px; color: #1A2530; margin-bottom: 8px; line-height: 1.5; font-weight: 500; }
        .ex-cn { font-size: 15px; color: #5F6368; }
        
        .ext-box { background: #F8F9FA; border-radius: 12px; padding: 16px 20px; display: flex; flex-direction: column; gap: 6px; text-align: left; }
        .ext-title { font-size: 13px; font-weight: bold; opacity: 0.8; }
        .ext-content { font-size: 15px; font-weight: 500; line-height: 1.5; }
        .ext-forms { background: #F0F4FF; border-left: 4px solid #1A73E8; color: #1A73E8; }
        .ext-phrases { background: #FFF0F0; border-left: 4px solid #D93025; color: #D93025; }
        .ext-prov { background: #E6F4EA; border-left: 4px solid #137333; color: #137333; }
        .ext-tips { background: #FEF7E0; border-left: 4px solid #E65100; color: #E65100; }
        
        .input-row { display: flex; gap: 12px; width: 100%; margin-bottom: 20px; }
        .dict-input { flex: 1; padding: 18px; border: 2px solid #E3E8EE; border-radius: 12px; font-size: 22px; text-align: center; font-weight: bold; color: #1A2530; outline: none; transition: 0.2s; background: #FAFAFA; }
        .dict-input:focus { border-color: #0A56D0; background: #FFF; box-shadow: 0 0 0 3px rgba(10,86,208,0.1); }
        .btn-action { padding: 14px 24px; background: #0A56D0; color: #FFF; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-action:hover { background: #0848B0; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 50% { transform: translateX(6px); } 75% { transform: translateX(-6px); } }
        .shake { animation: shake 0.3s; }
        
        .error-item { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: #FAFAFA; border: 1px solid #E8ECF0; border-radius: 10px; margin-bottom: 8px; }
        .err-subj-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1) !important; }

        /* ================================================== */
        /* 🧊 NORDIC FROST THEME & FOCUS UI OVERRIDES */
        /* ================================================== */

        /* 1. 全局背景与卡片 (北欧霜晨) */
        body { background-color: #ECEFF4 !important; }
        .card-area, #sidebar-box { 
            background: #FFFFFF !important; 
            box-shadow: 0 8px 24px rgba(46, 52, 64, 0.06) !important; 
            border: 1px solid rgba(46, 52, 64, 0.05) !important; 
        }

        /* 2. 文字层级与冷色调 */
        .word-en { color: #2E3440 !important; }
        .word-cn { color: #3B4252 !important; }
        .ex-en { color: #2E3440 !important; }
        .ex-cn, .phon-word, .ext-title { color: #4C566A !important; }

        /* 3. 核心按钮与交互 (莫兰迪灰蓝) */
        .btn-action, .btn-start, .mode-btn.active { 
            background-color: #5E81AC !important; 
            color: #FFFFFF !important; 
            border: none !important; 
        }
        .btn-action:hover, .btn-start:hover { 
            background-color: #4C6A8D !important; 
        }
        .mode-btn { border-color: #D8DEE9 !important; color: #4C566A !important; }

        /* 4. 输入框焦点与主题色同步 */
        .dict-input { border-color: #D8DEE9 !important; color: #2E3440 !important; background: #FAFBFC !important; }
        .dict-input:focus { 
            border-color: #5E81AC !important; 
            box-shadow: 0 0 0 3px rgba(94, 129, 172, 0.15) !important; 
            background: #FFFFFF !important;
        }

        /* 5. 扩展框边框同步 */
        .info-box { border-left-color: #5E81AC !important; }

        /* ================================================== */
        /* 🛠️ UI 专注感细节提升 */
        /* ================================================== */

        /* 细节A: 大幅增加行高，提升文字呼吸感 */
        .ex-en, .ex-cn, .ext-content, .word-cn { line-height: 1.7 !important; }

        /* 细节B: 左侧导航栏渐隐设计 (鼠标移出时变淡，减少视觉干扰) */
        #sidebar-box {
            opacity: 0.55 !important;
            transition: opacity 0.35s ease-in-out !important;
        }
        #sidebar-box:hover {
            opacity: 1.0 !important;
        }

        /* 细节C: 克制且专业的圆角规范 */
        .card-area, #sidebar-box { border-radius: 16px !important; }
        .ext-box, .info-box { border-radius: 12px !important; }
        .btn-action, .btn-start, .mode-btn, select, .dict-input { border-radius: 10px !important; }

        /* ================================================== */
        /* 🚀 全屏通栏布局重构 (Split-Pane Architecture) */
       ...[truncated]

        /* ================================================== */
        /* 🧊 终极淡冷蓝通栏主题 (Clear Cool Blue Split-Pane) */
     ...[truncated]
        /* ================================================== */
        /* 🧊 终极淡冷蓝通栏主题 (Clear Cool Blue Split-Pane) */
        /* ================================================== */

        /* 1. 强制全屏双栏布局，消除外部留白 */
        body { 
            margin: 0 !important; 
            padding: 0 !important; 
            height: 100vh !important; 
            overflow: hidden !important; 
            background-color: #F8FAFD !important; /* 右侧主区域：极浅的透气蓝白 */
        }
        #app { 
            display: flex !important; 
            max-width: 100% !important; 
            margin: 0 !important; 
            padding: 0 !important; 
            height: 100vh !important; 
            gap: 0 !important; 
        }

        /* 2. 左侧边栏：核心的"淡冷蓝"实体色块 */
        .left-col { 
            width: 280px !important; 
            min-width: 280px !important; 
            height: 100vh !important; 
            background-color: #EBF3FA !important; /* 🌟 纯正清爽的淡冷蓝 */
            border-right: 1px solid #D6E4F0 !important; /* 柔和的冷蓝色分割线 */
            padding: 32px 24px !important; 
            position: static !important; 
            margin: 0 !important;
            box-sizing: border-box !important;
            overflow-y: auto !important;
        }

        /* 3. 彻底剥离左侧菜单的白色外壳，融入冷蓝底色 */
        #sidebar-box { 
            background: transparent !important; 
            box-shadow: none !important; 
            border: none !important; 
            padding: 0 !important; 
            opacity: 1.0 !important; 
        }
        #sidebar-box:hover { opacity: 1.0 !important; }

        /* 4. 右侧主工作区：纯净通透 */
        #right-content { 
            flex: 1 !important; 
            height: 100vh !important; 
            overflow-y: auto !important; 
            background-color: #F8FAFD !important; 
            padding: 60px 40px !important; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 5. 卡片与文字色彩层级 */
        .card-area { 
            background: #FFFFFF !important; 
            border: 1px solid #E2E8F0 !important; 
            box-shadow: 0 12px 32px rgba(59, 130, 246, 0.06) !important; /* 淡淡的冷蓝色阴影 */
            margin-top: 0 !important;
        }
        .word-en { color: #1E293B !important; } /* 深冷石板灰，比纯黑更透气 */
        .word-cn { color: #334155 !important; }
        .ex-en { color: #1E293B !important; }
        .ex-cn, .phon-word, .ext-title { color: #64748B !important; }

        /* 6. 核心交互按钮 (清脆亮冷蓝) */
        .btn-action, .btn-start, .mode-btn.active { 
            background-color: #3B82F6 !important; /* 极其清脆的亮蓝色 */
            color: #FFFFFF !important; 
            border: none !important; 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25) !important;
        }
        .btn-action:hover, .btn-start:hover { 
            background-color: #2563EB !important; 
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3) !important;
        }
        .mode-btn { border-color: transparent !important; color: #64748B !important; background: transparent !important; }
        .mode-btn:hover { color: #3B82F6 !important; background: rgba(59, 130, 246, 0.05) !important; }

        /* 7. 下拉框与输入框适配冷蓝底色 */
        .select-row select { 
            background: rgba(255, 255, 255, 0.7) !important; 
            border: 1px solid #D6E4F0 !important; 
            color: #1E293B !important;
        }
        .select-row select:focus { border-color: #3B82F6 !important; background: #FFFFFF !important; }

        .dict-input { border-color: #E2E8F0 !important; color: #1E293B !important; background: #F8FAFD !important; }
        .dict-input:focus { 
            border-color: #3B82F6 !important; 
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15) !important; 
            background: #FFFFFF !important;
        }
        .info-box { border-left-color: #3B82F6 !important; background: #F1F5F9 !important; }
        #review-section { background: transparent !important; border: none !important; padding: 0 !important; margin-top: 16px !important; }
    </style>
</head>
<body>
<div id="app">
    <div class="left-col">
        <div class="main-logo" onclick="backToMenu()">🔨 铸剑者</div>
        <div id="sidebar-box">
            <div class="mode-tabs">
                <button class="mode-btn active" id="tab-dictation" onclick="setMode('dictation')">✍️ 默写</button>
                <button class="mode-btn" id="tab-recite" onclick="setMode('recite')">📖 背读</button>
                <button class="mode-btn" onclick="showErrors()">📓 错题 <span id="badge-total" style="color:#D93025; margin-left:2px;">0</span></button>
            </div>
            <div class="select-row">
                <select id="tb-selector-sel"></select>
                <select id="unit-select"></select>
            </div>
            <button class="btn-start" id="start-btn" onclick="startQuiz()">开始默写</button>
            <div id="review-section">
                <div class="review-header">⏰ 待复习单元</div>
                <div id="reminder-unit-list"><div class="review-empty">🎉 暂无任务</div></div>
            </div>
        </div>
    </div>

    <div id="right-content">
        <div id="welcome-area" class="card-area" style="display:flex;" onclick="showRandomQuote()">
            <div id="quote-text">浩然天下，剑气长城。</div>
            <div id="quote-author">—— 陈平安</div>
        </div>

        <div id="quiz-area" class="card-area">
            <div class="card-header">
                <div class="back-btn" onclick="backToMenu()">🔙 返回</div>
                <div style="font-weight:600; color:#0A56D0; font-size: 14px;" id="progress-text">0 / 0</div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
            <div id="card-body"></div>
        </div>

        <div id="error-area" class="card-area">
            <div id="error-subject-select" style="text-align:center; padding:40px 0;">
                <h2 style="margin-bottom: 32px; color:#1A2530;">📓 错题本</h2>
                <div style="display:flex; flex-direction:column; gap:16px; max-width:360px; margin:0 auto;">
                    <button class="err-subj-btn" onclick="selectErrorSubject('math')" style="width:100%; padding:20px; border:none; border-radius:14px; font-size:20px; font-weight:bold; cursor:pointer; transition:0.2s; background:#EEF2FF; color:#4F46E5; box-shadow:0 2px 8px rgba(79,70,229,0.1);">🧮 数学</button>
                    <button class="err-subj-btn" onclick="selectErrorSubject('eng')" style="width:100%; padding:20px; border:none; border-radius:14px; font-size:20px; font-weight:bold; cursor:pointer; transition:0.2s; background:#EFF6FF; color:#2563EB; box-shadow:0 2px 8px rgba(37,99,235,0.1);">📖 英语</button>
                    <button class="err-subj-btn" onclick="selectErrorSubject('chi')" style="width:100%; padding:20px; border:none; border-radius:14px; font-size:20px; font-weight:bold; cursor:pointer; transition:0.2s; background:#FFF7ED; color:#EA580C; box-shadow:0 2px 8px rgba(234,88,12,0.1);">📝 语文</button>
                </div>
            </div>
            <div id="error-subject-list" style="display:none;">
                <div class="card-header">
                    <div class="back-btn" onclick="showErrorSubjects()">🔙 返回</div>
                    <h2 id="error-subj-title" style="font-size:18px; color:#1A2530;">📓 错题本</h2>
                </div>
                <div id="error-list"></div>
                <div style="text-align: center; margin-top: 24px;">
                    <button onclick="clearSubjectErrors()" style="padding: 10px 20px; background: #FFF; border: 1px solid #D93025; color: #D93025; border-radius: 10px; font-weight: bold; cursor: pointer;">🗑️ 清空当前学科</button>
                </div>
            </div>
        </div>

        <div id="result-area" class="card-area" style="text-align:center; padding: 60px 40px;">
            <div style="font-size: 64px; margin-bottom: 20px;" id="result-emoji">🎉</div>
            <div style="font-size: 28px; font-weight: bold; margin-bottom: 32px; color:#1A2530;" id="result-score">得分: 0/0</div>
            <div style="display:flex; gap: 12px; justify-content: center;">
                <button class="btn-action" style="padding: 14px 32px;" onclick="retryQuiz()">再来一次</button>
                <button class="btn-action" style="padding: 14px 32px; background:#F4F8FA; color:#1A2530;" onclick="backToMenu()">返回首页</button>
            </div>
        </div>
    </div>
</div>

 "syllables": "wind•y", "phonetic": "ˈwɪndi", "cn": "风大的﹔多风的", "examples": [{"en": "It's too windy for a picnic.", "cn": "风太大﹐不适合野餐。"}]}, "fog": {"word": "fog", "syllables": "fog", "phonetic": "fɒɡ", "cn": "雾", "examples": [{"en": "We got lost in the thick fog.", "cn": "我们在浓雾中迷路了。"}]}, "foggy": {"word": "foggy", "syllables": "fog•gy", "phonetic": "ˈfɒɡi", "cn": "有雾的", "examples": [{"en": "a foggy day in November 11", "cn": "月的一个雾天"}]}, "weather": {"word": "weather", "syllables": "weath•er", "phonetic": "ˈweðə", "cn": "天气﹔气象", "examples": [{"en": "What's the weather like today?", "cn": "今天天气如何？"}]}, "cleaner": {"word": "cleaner", "syllables": "clean•er", "phonetic": "ˈkliːnə", "cn": "清洁工人", "examples": [{"en": "a vacuum cleaner", "cn": "吸尘器"}]}, "receptionist": {"word": "receptionist", "syllables": "re•cep•tion•ist", "phonetic": "rɪˈsepʃənɪst", "cn": "接待员"}, "waiter/ waitress": {"word": "waiter/ waitress"}, "staff": {"word": "staff", "syllables": "staff", "phonetic": "stɑːf", "cn": "全体职员﹐员工", "examples": [{"en": "Our department has a staff of seven.", "cn": "我们部门有7名员工。"}]}, "earn": {"word": "earn", "syllables": "earn", "phonetic": "ɜːn", "cn": "挣得；挣钱", "examples": [{"en": "He earns nearly £20,000 a year.", "cn": "他每年挣近20,000英镑。"}]}, "businesswoman": {"word": "businesswoman", "syllables": "busi•ness•wom•an", "phonetic": "ˈbɪznəsˌwʊmən", "cn": "女商人﹔女企业家"}, "footballer": {"word": "footballer", "syllables": "foot•bal•ler", "phonetic": "ˈfʊtbɔːlə", "cn": "〔尤指职业的〕足球运动员"}, "worker": {"word": "worker", "syllables": "work•er", "phonetic": "ˈwɜːkə", "cn": "工作者﹔工作人员", "examples": [{"en": "workers in the tourist industry", "cn": "旅游行业工作者"}]}, "writer": {"word": "writer", "syllables": "writ•er", "phonetic": "ˈraɪtə", "cn": "〔尤指职业〕作家﹔作者", "examples": [{"en": "She's one of my favourite writers.", "cn": "她是我最喜欢的作家之一。"}]}, "police officer": {"word": "police officer", "syllables": "poˈlice ˌofficer", "cn": "警察﹐警官"}};

var currentTb = 0;
var words = [], idx = 0, score = 0, answered = false;
var activeMode = 'dictation'; 
var currentQuizEntry = null;
var currentErrorSubject = null;
var reciteAudioTimer = null;

function playErrorBeep() {
    try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(250, ctx.currentTime);
        gain.gain.setValueAtTime(0.2, ctx.currentTime);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3); osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
}

function initTextbooks() {
    var sel = document.getElementById('tb-selector-sel');
    sel.innerHTML = '<option value="">选择课本</option>';
    TEXTBOOKS.forEach((tb, i) => {
        let title = tb.textbook;
        let display = title.length > 15 ? title.substring(0, 15) + '...' : title;
        sel.innerHTML += `<option value="${i}" title="${title}">${display}</option>`;
    });
    sel.onchange = function() { if(this.value==="") return; currentTb = parseInt(this.value); populateUnits(); };
}

function populateUnits() {
    var tb = TEXTBOOKS[currentTb];
    var completed = getCompletedUnits();
    var sel = document.getElementById('unit-select');
    sel.innerHTML = '<option value="">选择单元</option>';
    tb.units.forEach((u, i) => {
        let name = u.name;
        let display = name.length > 15 ? name.substring(0, 15) + '...' : name;
        let isDone = completed[currentTb + '-' + i];
        let prefix = isDone ? '✅ ' : '';
        let style = isDone ? ' style="color:#34A853;font-weight:bold;"' : '';
        sel.innerHTML += `<option value="${i}" title="${name}"${style}>${prefix}${display}</option>`;
    });
    document.getElementById('start-btn').style.display = 'none';
    sel.onchange = function() { document.getElementById('start-btn').style.display = this.value !== '' ? 'block' : 'none'; };
}

function setMode(mode) {
    activeMode = mode;
    document.getElementById('tab-dictation').classList.remove('active');
    document.getElementById('tab-recite').classList.remove('active');
    document.getElementById('tab-' + mode).classList.add('active');
    document.getElementById('start-btn').textContent = mode === 'dictation' ? '开始默写' : '开始背读';
    if (document.getElementById('quiz-area').style.display === 'block' && currentQuizEntry) {
        answered = false; renderCard(currentQuizEntry);
    }
}

function backToMenu() {
    document.querySelectorAll('.card-area').forEach(el => el.style.display = 'none');
    document.getElementById('welcome-area').style.display = 'flex';
    currentQuizEntry = null; showRandomQuote(); updateErrorBadge();
}

function startQuiz() {
    var unitIdx = document.getElementById('unit-select').value;
    if (unitIdx === '') return;
    words = [...TEXTBOOKS[currentTb].units[unitIdx].entries].sort(() => Math.random() - 0.5);
    idx = 0; score = 0; answered = false;
    document.querySelectorAll('.card-area').forEach(el => el.style.display = 'none');
    document.getElementById('quiz-area').style.display = 'block';
    showWord();
}

function showWord() {
    if (idx >= words.length) { finishQuiz(); return; }
    currentQuizEntry = words[idx];
    answered = false;
    renderCard(currentQuizEntry);
}

function flipCard(toBack) {
    var front = document.getElementById('recite-front');
    var btn = document.getElementById('btn-relearn');
    if (front && btn) {
        if (toBack) {
            front.style.display = 'none';
            btn.style.display = 'block';
        } else {
            front.style.display = 'block';
            btn.style.display = 'none';
            document.getElementById('qw-input').blur();
        }
    }
}

function forceNext() {
    stopReciteAudioLoop();
    idx++;
    showWord();
}

function startReciteAudioLoop(word) {
    if (reciteAudioTimer) clearInterval(reciteAudioTimer);
    reciteAudioTimer = setInterval(function() { speakWord(word); }, 3000);
}
function stopReciteAudioLoop() {
    if (reciteAudioTimer) { clearInterval(reciteAudioTimer); reciteAudioTimer = null; }
}

function renderCard(e) {
    var body = document.getElementById('card-body');
    body.innerHTML = ''; 
    document.getElementById('progress-text').textContent = `${idx + 1} / ${words.length}`;
    document.getElementById('progress-fill').style.width = `${(idx / words.length) * 100}%`;
    
    var key = e.en.toLowerCase().trim();
    var enr = ENRICHED[key] || {};
    var wordEn = enr.word || e.en;
    var displayWord = enr.syllables ? enr.syllables.replace(/•/g, '·') : wordEn;
    var phonetic = enr.phonetic ? `/${enr.phonetic}/` : '';
    var cn = enr.cn || e.cn || '暂无释义';
    
    var exEn = '', exCn = '';
    if (enr.examples && enr.examples.length > 0) { exEn = enr.examples[0].en || ''; exCn = enr.examples[0].cn || ''; }
    
    // 强制单列 Flex 铺满宽度
    var blocksHtml = '<div class="block-group">';
    if(exEn) blocksHtml += `<div class="info-box"><div class="ex-en">${exEn}</div><div class="ex-cn">${exCn}</div></div>`;
    if(enr.forms) blocksHtml += `<div class="ext-box ext-forms"><div class="ext-title">拓展</div><div class="ext-content">${enr.forms}</div></div>`;
    if(enr.phrases) blocksHtml += `<div class="ext-box ext-phrases"><div class="ext-title">搭配</div><div class="ext-content">${enr.phrases}</div></div>`;
    if(enr.prov) blocksHtml += `<div class="ext-box ext-prov"><div class="ext-title">谚语</div><div class="ext-content">${enr.prov}</div></div>`;
    if(enr.tips) blocksHtml += `<div class="ext-box ext-tips"><div class="ext-title">提示</div><div class="ext-content">${enr.tips}</div></div>`;
    blocksHtml += '</div>';

    if (activeMode === 'recite') {
        body.innerHTML = `
            <div id="recite-front">
                <div class="word-en">${displayWord}</div>
                ${phonetic ? `<div class="word-phon">${phonetic}</div>` : ''}
                <div class="word-cn" style="margin-bottom: 20px;">${cn}</div>
                ${blocksHtml}
            </div>
            <div id="btn-relearn" style="display:none; text-align:center; margin-bottom: 24px;">
                <button onclick="flipCard(false)" style="background:#F0F4FF; color:#1A73E8; border:none; padding:10px 20px; border-radius:10px; font-weight:bold; font-size:16px; cursor:pointer;">👀 忘了？再学习一遍</button>
            </div>
            <div class="input-row">
                <input type="text" id="qw-input" class="dict-input" placeholder="光标点击此处屏蔽英文，输入1次即可过关..." autocomplete="off" onfocus="speakWord('${wordEn}');flipCard(true);startReciteAudioLoop('${wordEn}')" onblur="stopReciteAudioLoop()" onkeydown="stopReciteAudioLoop()" onkeypress="if(event.key === 'Enter') checkReciteAnswer()">
                <button class="btn-action" style="width: 120px;" onclick="checkReciteAnswer()">确认</button>
            </div>
        `;
    } else {
        var blankedEx = exEn;
        if (exEn) {
            var escaped = wordEn.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            blankedEx = exEn.replace(new RegExp(`\\b${escaped}\\b`, 'gi'), '______');
            blocksHtml = blocksHtml.replace(exEn, blankedEx);
        }
        body.innerHTML = `
            <div class="word-cn" style="font-size: 36px;">${cn}</div>
            ${blocksHtml}
            <div class="input-row">
                <input type="text" id="qw-input" class="dict-input" placeholder="拼写英文单词..." autocomplete="off" onfocus="speakWord('${wordEn}');startReciteAudioLoop('${wordEn}')" onblur="stopReciteAudioLoop()" onkeydown="stopReciteAudioLoop()" onkeypress="if(event.key === 'Enter') checkDictAnswer()">
                <button class="btn-action" style="width: 140px;" onclick="checkDictAnswer()">确认提交</button>
            </div>
            <div id="qw-feedback" style="text-align:center; min-height:24px; font-size:16px; font-weight:bold;"></div>
        `;
    }
    if(activeMode !== 'recite') setTimeout(() => { const inp = document.getElementById('qw-input'); if(inp) inp.focus(); }, 50);
}

function checkReciteAnswer() {
    stopReciteAudioLoop();
    var inp = document.getElementById('qw-input');
    if(!inp || inp.value.trim() === '') return;
    var userAns = inp.value.trim().toLowerCase();
    var target = currentQuizEntry.en.toLowerCase();
    
    if (userAns === target) {
        score++; // 答对计分
        speakWord(target);
        inp.style.borderColor = '#34A853';
        inp.disabled = true;
        setTimeout(() => { forceNext(); }, 400); // 1次即过
    } else {
        inp.style.borderColor = '#EA4335';
        playErrorBeep();
        inp.classList.add('shake');
        saveError(currentQuizEntry.cn, currentQuizEntry.en);
        setTimeout(() => { inp.classList.remove('shake'); inp.style.borderColor = '#E3E8EE'; inp.value = ''; }, 400);
    }
}

function checkDictAnswer() {
    if(answered) return;
    var inp = document.getElementById('qw-input');
    if(!inp || inp.value.trim() === '') return;
    answered = true;
    var userAns = inp.value.trim().toLowerCase();
    var target = currentQuizEntry.en.toLowerCase();
    var fb = document.getElementById('qw-feedback');
    
    if (userAns === target) {
        score++; 
        inp.style.borderColor = '#34A853'; inp.style.color = '#34A853';
        fb.innerHTML = '<span style="color:#34A853;">✅ 正确！</span>';
        speakWord(target);
    } else {
        inp.style.borderColor = '#EA4335';
        fb.innerHTML = `<span style="color:#EA4335;">❌ 正确答案：${target}</span>`;
        saveError(currentQuizEntry.cn, currentQuizEntry.en);
        playErrorBeep();
        speakWord(target);
    }
    setTimeout(() => { forceNext(); }, 1200);
}

function finishQuiz() {
    document.getElementById('quiz-area').style.display = 'none'; document.getElementById('result-area').style.display = 'block';
    document.getElementById('result-score').textContent = `得分: ${score} / ${words.length}`;
    document.getElementById('result-emoji').textContent = (score / words.length) >= 0.9 ? '🏆' : '🔥';
    if ((score / words.length) >= 0.9) {
        var unitIdx = document.getElementById('unit-select').value;
        markUnitComplete(currentTb, parseInt(unitIdx));
        populateUnits();
    }
}
function retryQuiz() { words = words.sort(() => Math.random() - 0.5); idx = 0; score = 0; document.getElementById('result-area').style.display = 'none'; document.getElementById('quiz-area').style.display = 'block'; showWord(); }

const QUOTES = [{text:"遇事不决，可问春风。春风不语，即随本心。", author:"齐静春"},{text:"真正的强者，愿意以弱者的自由为边界。", author:"阿良"},{text:"浩然天下，剑气长城。", author:"陈平安"}];
function showRandomQuote() { var q = QUOTES[Math.floor(Math.random() * QUOTES.length)]; document.getElementById('quote-text').innerText = q.text; document.getElementById('quote-author').innerText = "—— " + q.author; }

function getErrors() { try { return JSON.parse(localStorage.getItem('zk_errors') || '{}'); } catch(e){return {};} }
function saveError(cn, en) { var err = getErrors(); var k = en.toLowerCase(); if(!err[k]) err[k] = {cn: cn, en: en, subj: 'eng', count: 0}; err[k].count++; localStorage.setItem('zk_errors', JSON.stringify(err)); updateErrorBadge(); }
function updateErrorBadge() { document.getElementById('badge-total').textContent = Object.keys(getErrors()).length; }
function getCompletedUnits() { try { return JSON.parse(localStorage.getItem('zk_completed') || '{}'); } catch(e){return {};} }
function markUnitComplete(tbIdx, unitIdx) {
    var c = getCompletedUnits();
    c[tbIdx + '-' + unitIdx] = true;
    localStorage.setItem('zk_completed', JSON.stringify(c));
}
function showErrors() {
    document.querySelectorAll('.card-area').forEach(el => el.style.display = 'none');
    document.getElementById('error-area').style.display = 'block';
    document.getElementById('error-subject-select').style.display = 'block';
    document.getElementById('error-subject-list').style.display = 'none';
    currentErrorSubject = null;
}
function selectErrorSubject(subj) {
    currentErrorSubject = subj;
    document.getElementById('error-subject-select').style.display = 'none';
    document.getElementById('error-subject-list').style.display = 'block';
    var titleMap = {math:'数学', eng:'英语', chi:'语文'};
    document.getElementById('error-subj-title').textContent = '📓 错题本 - ' + (titleMap[subj] || subj);
    showSubjectErrors(subj);
}
function showErrorSubjects() {
    currentErrorSubject = null;
    document.getElementById('error-subject-select').style.display = 'block';
    document.getElementById('error-subject-list').style.display = 'none';
}
function showSubjectErrors(subj) {
    var err = getErrors(), html = '';
    for(var k in err) { if((err[k].subj || 'eng') === subj) html += '<div class="error-item"><span style="font-size:16px; color:#1A2530; font-weight:500;">' + err[k].cn + ' — <strong style="color:#0A56D0;">' + err[k].en + '</strong> (错 ' + err[k].count + ' 次)</span><span class="error-del" onclick="delError(\'' + k + '\')">❌</span></div>'; }
    document.getElementById('error-list').innerHTML = html || '<div style="text-align:center; padding: 30px; color:#9AA0A6;">当前学科暂无错题 🎉</div>';
}
function delError(k) {
    var err = getErrors(); delete err[k]; localStorage.setItem('zk_errors', JSON.stringify(err));
    updateErrorBadge(); showSubjectErrors(currentErrorSubject);
}
function clearSubjectErrors() {
    var err = getErrors(); var subj = currentErrorSubject;
    for(var k in err) { if((err[k].subj || 'eng') === subj) delete err[k]; }
    localStorage.setItem('zk_errors', JSON.stringify(err)); updateErrorBadge();
    showSubjectErrors(subj);
}

function speakWord(text) { var u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.85; speechSynthesis.cancel(); speechSynthesis.speak(u); }
window.onload = function() { initTextbooks(); showRandomQuote(); updateErrorBadge(); };
</script>
