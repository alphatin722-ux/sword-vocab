<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>剑来 · 音节记词</title>
<style>
/* ============ CSS Variables & Reset ============ */
:root {
  --bg: #E8F0F8;
  --bg-deep: #D8E4F0;
  --bg-card: #D8E4F0;
  --bg-card-hover: #D0DCE8;
  --gold: #E67E22;
  --gold-light: #F39C12;
  --gold-dim: #C0702A;
  --red: #E74C3C;
  --red-light: #E74C3C;
  --jade: #27AE60;
  --jade-light: #27AE60;
  --text: #1A2530;
  --text-dim: #64748B;
  --text-bright: #1A2530;
  --border: #E2E8F0;
  --radius: 2px;
  --radius-lg: 4px;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --font-cn: "Noto Serif SC", "STKaiti", "KaiTi", serif;
  --font-en: "Inter", sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: var(--bg);
  color: var(--text);
  font-family: var(--font-en), -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-weight: 500;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ============ App Container ============ */
#app {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 20px;
}

/* ============ Header ============ */
.header {
  text-align: center;
  padding: 36px 36px 40px;
  position: relative;
  margin: -20px -20px 0;
  background:
    linear-gradient(180deg, rgba(6,6,10,0.0) 0%, rgba(6,6,10,0.6) 60%, #06060a 100%),
    radial-gradient(ellipse at 50% 0%, rgba(201,169,110,0.08) 0%, transparent 60%),
    linear-gradient(180deg, #0c0c18 0%, #0e0e1a 30%, #06060a 100%);
  border-bottom: 1px solid rgba(201,169,110,0.1);
  overflow: hidden;
}

.header-title {
  font-family: var(--font-cn);
  font-size: 48px;
  color: var(--gold);
  letter-spacing: 20px;
  text-shadow: 0 0 40px rgba(201,169,110,0.15);
  position: relative;
  z-index: 2;
}

.header-sub {
  font-family: var(--font-cn);
  font-size: 12px;
  color: rgba(200,200,210,0.25);
  letter-spacing: 10px;
  margin-top: 6px;
  position: relative;
  z-index: 2;
}

.header-sword {
  display: none;
}
.header-logo { display: none; }
.header-logo-img { display: none; }

/* Navigation */
.nav {
  display: flex;
  justify-content: center;
  gap: 4px;
  margin: -80px 0 24px;
  flex-wrap: wrap;
  position: relative;
  z-index: 3;
}

.nav-btn {
  padding: 12px 24px;
  background: linear-gradient(180deg, rgba(20,20,30,0.6) 0%, rgba(10,10,20,0.8) 100%);
  border: 1px solid rgba(201,169,110,0.15);
  color: var(--text-dim);
  border-radius: 4px;
  cursor: pointer;
  touch-action: manipulation;
  font-size: 14px;
  transition: all 0.35s ease;
  font-family: var(--font-cn);
  letter-spacing: 3px;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.nav-btn:hover {
  border-color: rgba(201,169,110,0.4);
  color: var(--text-bright);
  background: linear-gradient(180deg, rgba(30,25,20,0.6) 0%, rgba(15,15,25,0.8) 100%);
  box-shadow: 0 0 20px rgba(201,169,110,0.12), 0 2px 8px rgba(0,0,0,0.4);
}

.nav-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: linear-gradient(180deg, rgba(201,169,110,0.08) 0%, rgba(201,169,110,0.03) 100%);
  box-shadow: 0 0 20px rgba(201,169,110,0.18), 0 2px 12px rgba(0,0,0,0.5);
}

.nav-btn .badge { display: none; }

/* Views */
.view { display: none; }
.view.active { display: block; }

/* ============ Realm Card ============ */
.realm-card {
  background: linear-gradient(135deg, rgba(20,20,30,0.9) 0%, rgba(10,10,20,0.9) 100%);
  border: 1px solid rgba(201,169,110,0.12);
  border-radius: 4px;
  padding: 40px 32px 32px;
  text-align: center;
  position: relative;
  margin-bottom: 20px;
  overflow: hidden;
}
.realm-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3), transparent);
}
.corner-tl, .corner-tr, .corner-bl, .corner-br {
  position: absolute;
  width: 16px; height: 16px;
  border-color: rgba(201,169,110,0.25);
  border-style: solid;
}
.corner-tl { top: 8px; left: 8px; border-width: 1px 0 0 1px; }
.corner-tr { top: 8px; right: 8px; border-width: 1px 1px 0 0; }
.corner-bl { bottom: 8px; left: 8px; border-width: 0 0 1px 1px; }
.corner-br { bottom: 8px; right: 8px; border-width: 0 1px 1px 0; }

.realm-title {
  font-size: 11px;
  color: rgba(201,169,110,0.3);
  letter-spacing: 6px;
  margin-bottom: 12px;
}
.realm-name {
  font-size: 36px;
  color: var(--gold);
  letter-spacing: 12px;
  font-family: var(--font-cn);
  text-shadow: 0 0 30px rgba(201,169,110,0.1);
}
.realm-rank {
  font-size: 12px;
  color: rgba(201,169,110,0.4);
  letter-spacing: 4px;
  margin-top: 4px;
}

.stats-grid {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 24px 0;
}
.stat-item {
  text-align: center;
}
.stat-value {
  font-size: 28px;
  color: var(--gold-light);
  font-weight: 700;
}
.stat-label {
  font-size: 11px;
  color: rgba(200,200,210,0.3);
  letter-spacing: 2px;
  margin-top: 2px;
  font-family: var(--font-cn);
}

.progress-container { margin: 16px 0 8px; }
.progress-bar {
  height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, rgba(201,169,110,0.4), rgba(201,169,110,0.8));
  border-radius: 2px;
  transition: width 0.6s ease;
}
.progress-text {
  font-size: 11px;
  color: rgba(200,200,210,0.2);
  letter-spacing: 2px;
  margin-top: 6px;
  text-align: center;
}

/* ============ Word Card (Learn) ============ */
.word-card {
  background: var(--bg-card);
  border-radius: 8px;
  padding: 28px 24px 24px;
  text-align: center;
  position: relative;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05), 0 8px 24px rgba(0,0,0,0.08);
  border: 1px solid rgba(0,0,0,0.03);
  color: var(--text);
  flex: 1;
  min-width: 0;
}

.card-slider {
  overflow: hidden;
}

.card-inner {
  display: flex;
  width: 500%;
  transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  min-height: 200px;
  align-items: flex-start;
}

.card-inner.p2 { transform: translateX(-20%); }
.card-inner.p3 { transform: translateX(-40%); }
.card-inner.p4 { transform: translateX(-60%); }
.card-inner.p5 { transform: translateX(-80%); }

#card-front, #card-back, #card-page3, #card-page4, #card-page5 {
  width: 20%;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Page edge shadow during slide */
#card-front::after {
  display: none;
}
#card-back::before {
  display: none;
}
/* Page edge shadow during slide — removed */

/* Navigation arrows */
.learn-card-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.nav-arrow {
  position: fixed;
  top: 50%;
  transform: translateY(-50%);
  width: 36px;
  height: 36px;
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  line-height: 36px;
  text-align: center;
  background: rgba(255,255,255,0.5);
  color: var(--text-dim);
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  flex-shrink: 0;
}
.nav-arrow:hover {
  background: rgba(255,255,255,0.7);
  color: var(--text);
  border-color: rgba(0,0,0,0.15);
}
.card-hint {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 20px;
  display: none;
}
.word-full {
  font-size: 38px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: 2px;
}
.phonetic {
  font-size: 18px;
  color: var(--text-dim);
  margin-top: 10px;
}
.syllables {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 10px;
  flex-wrap: wrap;
}
.syllable {
  padding: 8px 18px;
  background: rgba(201,169,110,0.06);
  border: 1px solid rgba(201,169,110,0.12);
  border-radius: 3px;
  font-size: 18px;
  font-weight: 700;
  color: var(--gold-light);
  cursor: pointer;
  transition: all 0.2s;
}
.syllable:hover { background: rgba(201,169,110,0.12); }

.definition-list {
  margin-top: 16px;
  color: var(--text);
  font-size: 16px;
  line-height: 1.4;
  text-align: center;
}
.definition-item { margin: 2px 0; }

.counter {
  text-align: center;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 2px;
  margin-bottom: 12px;
}

/* ============ Page 3: Word Root & Family ============ */
#page3-morph {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  padding: 0 8px;
}
.page3-section-label {
  font-size: 13px;
  color: var(--gold-dim);
  letter-spacing: 3px;
  margin-bottom: 8px;
  font-weight: 700;
  font-family: var(--font-cn);
}
.page3-breakdown-item {
  display: inline-block;
  margin: 2px 4px;
  padding: 5px 14px;
  background: rgba(201,169,110,0.06);
  border: 1px solid rgba(201,169,110,0.12);
  border-radius: 4px;
  font-size: 16px;
  font-weight: 700;
  color: var(--gold-light);
}
.page3-breakdown-meaning {
  font-size: 13px;
  color: var(--text-dim);
  font-family: var(--font-cn);
  margin-top: 2px;
  line-height: 1.4;
  font-weight: 600;
}
.page3-family-word {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin: 4px 6px;
  padding: 5px 12px;
  background: rgba(39,174,96,0.06);
  border: 1px solid rgba(39,174,96,0.12);
  border-radius: 4px;
  font-size: 15px;
  font-weight: 600;
  color: var(--jade);
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.page3-family-word:hover {
  background: rgba(39,174,96,0.12);
  border-color: rgba(39,174,96,0.3);
}
.page3-family-pos {
  font-size: 10px;
  color: var(--text-dim);
  font-weight: 400;
}
.page3-etymology-text {
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.55;
  font-style: italic;
  font-weight: 600;
  padding: 10px 14px;
  background: rgba(0,0,0,0.02);
  border-radius: 6px;
  font-family: var(--font-cn);
}

/* ============ Quiz ============ */
.quiz-card {
  background: linear-gradient(135deg, rgba(20,20,30,0.9) 0%, rgba(10,10,20,0.9) 100%);
  border: 1px solid rgba(201,169,110,0.12);
  border-radius: 4px;
  padding: 32px 24px;
  min-height: 200px;
  text-align: center;
}
.quiz-question {
  font-size: 13px;
  color: rgba(201,169,110,0.4);
  letter-spacing: 3px;
  margin-bottom: 16px;
  font-family: var(--font-cn);
}
.quiz-word {
  font-size: 24px;
  color: var(--gold);
  margin-bottom: 16px;
}
.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-width: 400px;
  margin: 0 auto;
}
.quiz-option {
  padding: 10px 16px;
  background: rgba(20,20,35,0.6);
  border: 1px solid rgba(201,169,110,0.1);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
}
.quiz-option:hover { border-color: rgba(201,169,110,0.3); background: rgba(201,169,110,0.04); }
.quiz-option.correct { border-color: var(--jade); color: var(--jade-light); background: rgba(91,140,90,0.1); }
.quiz-option.wrong { border-color: var(--red); color: var(--red-light); background: rgba(192,57,43,0.1); }
.quiz-feedback {
  margin-top: 14px;
  font-size: 14px;
  font-family: var(--font-cn);
  letter-spacing: 2px;
}
.feedback-correct { color: var(--jade-light); }
.feedback-wrong { color: var(--red-light); }

/* ============ Library / Word List ============ */
.library-header {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.library-search {
  flex: 1;
  min-width: 160px;
  padding: 8px 14px;
  background: rgba(20,20,35,0.8);
  border: 1px solid rgba(201,169,110,0.12);
  color: var(--text);
  border-radius: 4px;
  font-size: 13px;
  outline: none;
}
.library-search:focus { border-color: rgba(201,169,110,0.3); }
.library-list { display: flex; flex-direction: column; gap: 2px; }
.library-item {
  padding: 10px 14px;
  background: rgba(20,20,35,0.5);
  border: 1px solid transparent;
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.2s;
}
.library-item:hover { background: rgba(30,30,45,0.6); border-color: rgba(201,169,110,0.08); }
.lib-word { color: var(--text-bright); font-size: 14px; }
.lib-phonetic { color: var(--text-dim); font-size: 12px; }
.lib-meaning { color: rgba(200,200,210,0.4); font-size: 12px; font-family: var(--font-cn); }
.lib-tag {
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 10px;
}
.lib-tag.mastered { background: rgba(91,140,90,0.15); color: var(--jade-light); }
.lib-tag.learning { background: rgba(201,169,110,0.1); color: var(--gold); }

/* ============ Intro Quote ============ */
.intro-panel {
  background: linear-gradient(135deg, rgba(20,20,30,0.8) 0%, rgba(10,10,20,0.8) 100%);
  border: 1px solid rgba(201,169,110,0.08);
  border-radius: 4px;
  padding: 40px 24px;
  text-align: center;
}

/* ============ Action Buttons ============ */
.action-btn {
  padding: 10px 24px;
  border: 1px solid rgba(201,169,110,0.2);
  background: rgba(201,169,110,0.04);
  color: var(--gold);
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-cn);
  letter-spacing: 2px;
  transition: all 0.3s;
}
.action-btn:hover { background: rgba(201,169,110,0.1); border-color: rgba(201,169,110,0.35); }

/* ============ Typing Practice ============ */
.typing-section { margin-top: 16px; }
.typing-header {
  font-size: 11px;
  color: rgba(200,200,210,0.2);
  letter-spacing: 4px;
  text-align: center;
  margin-bottom: 8px;
  font-family: var(--font-cn);
}
.typing-boxes {
  display: flex;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 16px;
}
#back-typing-boxes {
  margin-top: 0;
}
.typing-box {
  width: 54px; height: 46px;
  background: rgba(240,246,250,0.78);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 4px;
  color: var(--text-bright);
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  outline: none;
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
}
.typing-box:focus { border-color: var(--gold); }
.typing-box.filled { border-color: var(--gold); background: rgba(230,126,34,0.15); }
.typing-box.wrong {
  border-color: #e74c3c !important;
  background: rgba(231,76,60,0.12) !important;
  animation: errorFlash 0.5s ease;
}
@keyframes errorFlash {
  0%, 100% { border-color: #e74c3c; }
  50% { border-color: rgba(231,76,60,0.6); background: rgba(231,76,60,0.25); }
}
.typing-hint {
  font-size: 11px;
  color: rgba(200,200,210,0.12);
  text-align: center;
  margin-top: 6px;
  margin-bottom: 20px;
}

/* ============ Network Panel ============ */
.panel-left, .panel-right {
  margin-bottom: 16px;
  background: #fff;
  border-radius: 8px;
  padding: 24px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05), 0 8px 24px rgba(0,0,0,0.08);
}
.panel-title {
  font-size: 12px;
  color: rgba(201,169,110,0.3);
  letter-spacing: 4px;
  margin-bottom: 8px;
  font-family: var(--font-cn);
  border-bottom: 1px solid rgba(201,169,110,0.06);
  padding-bottom: 6px;
}
.panel-empty {
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  padding: 16px;
  font-family: var(--font-cn);
}

/* ============ Modal ============ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-content {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 4px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px;
}

/* ============ Learn View Layout ============ */
.learn-layout {
  display: grid;
  grid-template-columns: 720px 1fr;
  gap: 24px;
  max-width: 1280px;
  margin: 0 auto;
  padding: 24px 24px 0;
  align-items: start;
  min-height: 600px;
}
.panel-stack {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.learn-container {
  min-width: 0;
  align-self: end;
}
/* Single-component mode: hide side panels */
.learn-layout.single-mode {
  grid-template-columns: 1fr;
  max-width: 720px;
  margin: 0 auto;
}
.learn-layout.single-mode .panel-stack,
.learn-layout.single-mode #panel-network {
  display: none;
}

/* ============ Learn Buttons ============ */
.learn-btn {
  padding: 10px 20px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-family: var(--font-cn);
  letter-spacing: 2px;
  transition: all 0.3s;
  border: 1px solid rgba(201,169,110,0.15);
  background: rgba(20,20,35,0.6);
  color: var(--text);
}
.learn-btn:hover {
  border-color: rgba(201,169,110,0.35);
  background: rgba(30,30,45,0.7);
}
.btn-mastered {
  border-color: rgba(91,140,90,0.3);
  color: var(--jade-light);
}
.btn-mastered:hover {
  background: rgba(91,140,90,0.12);
  border-color: rgba(91,140,90,0.5);
}
.btn-review {
  border-color: rgba(201,169,110,0.3);
  color: var(--gold);
}
.btn-review:hover {
  background: rgba(201,169,110,0.1);
  border-color: rgba(201,169,110,0.5);
}
.btn-skip {
  border-color: rgba(200,200,210,0.1);
  color: var(--text-dim);
}
.btn-skip:hover {
  border-color: rgba(200,200,210,0.25);
  background: rgba(200,200,210,0.04);
}

/* ============ Quick Actions ============ */
.quick-actions {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 16px;
}
.icon {
  display: inline-block;
  margin-right: 4px;
}

/* ============ Home Motto ============ */
.home-motto {
  text-align: center;
  font-size: 11px;
  color: rgba(201,169,110,0.2);
  letter-spacing: 10px;
  margin-top: 20px;
  font-family: var(--font-cn);
}

/* ============ Hub Dashboard ============ */
.hub-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  max-width: 780px;
  margin: 0 auto;
  padding: 20px 0;
}
.hub-card {
  background: rgba(216,228,240,0.55);
  border: 1px solid rgba(200,210,220,0.35);
  border-radius: 12px;
  padding: 32px 20px 24px;

/* ============ Network / Collocation ============ */

}
.colloc-label {

  color: var(--text-dim);

}
.colloc-slot:hover {

.colloc-example-toggle:hover {
  color: rgba(201,169,110,0.5);

.bubble-svg {

  flex-wrap: wrap;
  gap: 4px;
  padding: 4px 0;
}

/* ============ Build Word ============ */
.build-slots {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  justify-content: center;
  margin: 8px 0;
}
.build-slot {

  border-radius: 3px;

  color: var(--gold-light);
}
.slot-keyword {
  font-size: 11px;
  color: var(--text-dim);

  font-family: var(--font-cn);
  text-align: center;
}
.slot-options {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  justify-content: center;
}
.slot-option {
  padding: 3px 8px;

.typing-box-wrapper {

  flex-direction: column;

  gap: 2px;
}

/* ============ New Realm ============ */
.new-realm {

/* ============ Responsive ============ */
@media (max-width: 640px) {

/* ===== Roots Section ===== */
.root-container { max-width: 600px; margin: 0 auto; padding: 16px 20px; }
.root-search { width:100%; padding:8px 14px; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); font-size:14px; outline:none; box-sizing:border-box; }

.root-card-lang { font-size:11px; color:var(--text-dim); margin-top:2px; display:inline-block; background:rgba(100,116,139,0.08); padding:1px 8px; border-radius:4px; }
.root-card-count { font-size:11px; color:var(--gold-dim); float:right; }
/* Root Detail */
.root-detail { max-width:640px; margin:0 auto; padding:16px 20px; }
.root-detail .oWw { font-size:24px; font-weight:800; color:var(--jade); font-family:monospace; margin-bottom:4px; }

/* ===== Writing Section ===== */

.writing-search:focus { border-color:var(--gold); }
.writing-hint { font-size:13px; color:var(--text-dim); margin:12px 0; }

    let meaning = word.meaning || '';

    if (!meaning && word.definition) {
      meaning = word.definition.length > 30 ? '（待翻译）' : word.definition;
    }
    
    // image: ensure valid src + emoji fallback
    let image = word.image || '';

      ...word,

      image: image,

    if (family.length > 0) {

          let label = '';

          if (f === w + 's' || f === w + 'es') label = '复数';

          else if (f.endsWith('ly')) label = '副词';

          return {word: fw, label: label || '相关词'};
        }
        if (typeof fw === 'object' && !fw.label) {
          return {...fw, label: '相关词'};
        }
        return fw;
      });
    }
    
    return {
      ...morph,
      prefixCn: prefixCn,
      rootCn: rootCn,
      suffixCn: suffixCn,
      family: family,
    };
  },
  
  /**
   * Get normalized collocation data.
   * GUARANTEES: uses 'objects' and 'adjectives' field names.
   */
  getCollocData(word) {
    const colloc = word.colloc || {};
    const result = {verbObj: [], adjNoun: [], phrases: []};
    
    if (colloc.verbObj) {
      result.verbObj = colloc.verbObj.map(vo => ({
        verb: vo.verb || '',
        objects: vo.objects || vo.objs || [],
      }));
    }
    
    if (colloc.adjNoun) {
      result.adjNoun = colloc.adjNoun.map(an => ({
        adjectives: an.adjectives || an.adjs || [],
        noun: an.noun || word.word,
      }));
    }
    
    if (colloc.phrases) {
      result.phrases = colloc.phrases;
    }
    
    return result;
  },
};

/**
 * Notebook System — organize words into separate vocabulary notebooks.
 * 
 * Data model (localStorage key: 'sword-vocab-notebooks'):
 * {
 *   active: 'default',     // currently selected notebook ID
 *   notebooks: {
 *     'default': { name: '全部单词', words: [10000,10001,...], createdAt: '...' },
 *     'ket':     { name: 'KET核心词', words: [10000,...], createdAt: '...' },
 *     'custom1': { name: '课堂词汇', words: [], createdAt: '...' },
 *   }
 * }
 * 
 * API:
 *   NoteBook.list()           → [notebook objects]
 *   NoteBook.active()         → current notebook object
 *   NoteBook.switchTo(id)     → switch active notebook
 *   NoteBook.create(name)     → create new notebook
 *   NoteBook.rename(id, name) → rename notebook
 *   NoteBook.delete(id)       → delete notebook (can't delete default)
 *   NoteBook.addWords(ids)    → add word IDs to active notebook
 *   NoteBook.removeWord(id)   → remove word from active notebook
 *   NoteBook.getWordIds()     → word IDs in active notebook
 *   NoteBook.getAllWordIds()  → all word IDs across all notebooks
 */
const NoteBook = (() => {
  const KEY = 'sword-vocab-notebooks';
  
  function _load() {
    try {
      const saved = localStorage.getItem(KEY);
      if (saved) return JSON.parse(saved);
    } catch(e) {}
    return null;
  }
  
  function _save(data) {
    localStorage.setItem(KEY, JSON.stringify(data));
  }
  
  function _init() {
    let data = _load();
    if (!data) {
      data = {
        active: 'default',
        notebooks: {
          'default': { name: '全部单词', words: [], createdAt: new Date().toISOString() }
        }
      };
      _save(data);
    }
    // Ensure default exists
    if (!data.notebooks['default']) {
      data.notebooks['default'] = { name: '全部单词', words: [], createdAt: new Date().toISOString() };
      _save(data);
    }
    return data;
  }
  
  function list() {
    const data = _init();
    return Object.entries(data.notebooks).map(([id, nb]) => ({
      id, name: nb.name, count: nb.words.length, createdAt: nb.createdAt
    }));
  }
  
  function active() {
    const data = _init();
    const activeId = data.active || 'default';
    const nb = data.notebooks[activeId];
    return { id: activeId, name: nb?.name || '全部单词', words: nb?.words || [] };
  }
  
  function switchTo(id) {
    const data = _init();
    if (data.notebooks[id]) {
      data.active = id;
      _save(data);
    }
  }
  
  function create(name) {
    const data = _init();
    const id = 'nb_' + Date.now();
    data.notebooks[id] = { name, words: [], createdAt: new Date().toISOString() };
    _save(data);
    return { id, name };
  }
  
  function rename(id, name) {
    const data = _init();
    if (data.notebooks[id]) {
      data.notebooks[id].name = name;
      _save(data);
    }
  }
  
  function remove(id) {
    if (id === 'default') return false; // can't delete default
    const data = _init();
    if (data.notebooks[id]) {
      delete data.notebooks[id];
      if (data.active === id) {
        data.active = 'default';
      }
      _save(data);
      return true;
    }
    return false;
  }
  
  function addWords(wordIds, targetNotebookId) {
    const data = _init();
    const nbId = targetNotebookId || data.active || 'default';
    const nb = data.notebooks[nbId];
    if (!nb) return;
    
    const existing = new Set(nb.words);
    for (const id of wordIds) {
      if (!existing.has(id)) {
        nb.words.push(id);
        existing.add(id);
      }
    }
    _save(data);
  }
  
  function removeWord(wordId, notebookId) {
    const data = _init();
    const nbId = notebookId || data.active || 'default';
    const nb = data.notebooks[nbId];
    if (!nb) return;
    nb.words = nb.words.filter(id => id !== wordId);
    _save(data);
  }
  
  function getWordIds(notebookId) {
    const data = _init();
    const nbId = notebookId || data.active || 'default';
    return data.notebooks[nbId]?.words || [];
  }
  
  function getAllWordIds() {
    const data = _init();
    const allIds = new Set();
    for (const nb of Object.values(data.notebooks)) {
      for (const id of nb.words) {
        allIds.add(id);
      }
    }
    return [...allIds];
  }
  
  function migrateExisting(wordIds) {
    const data = _init();
    const def = data.notebooks['default'];
    if (!def) return;
    
    const existing = new Set(def.words);
    let added = 0;
    for (const id of wordIds) {
      if (!existing.has(id)) {
        def.words.push(id);
        existing.add(id);
        added++;
      }
    }
    if (added > 0) _save(data);
    return added;
  }
  
  return { list, active, switchTo, create, rename, remove, addWords, removeWord, getWordIds, getAllWordIds, migrateExisting };
})();

const STORAGE_KEY = 'sword-vocab-state';
let state = {
  mastered: {},    // wordId -> true
  learning: {},    // wordId -> true
  lastLearnIndex: 0,
  quizErrors: {},  // wordId -> true (答错过的词)
  wordFreq: {},    // wordId -> {seen: N, wrong: M}
};
function trackQuizSeen(wordId) {
  if (!state.wordFreq[wordId]) state.wordFreq[wordId] = {seen:0, wrong:0};
  state.wordFreq[wordId].seen++;
}
function trackQuizError(wordId) {
  state.quizErrors[wordId] = true;
  if (!state.wordFreq[wordId]) state.wordFreq[wordId] = {seen:0, wrong:0};
  state.wordFreq[wordId].wrong++;
  saveState();
}


function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) Object.assign(state, JSON.parse(saved));
  } catch(e) { /* ignore */ }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) { /* ignore */ }
}

// ============ Helpers ============
function getRealm(count) {
  for (let i = REALMS.length - 1; i >= 0; i--) {
    if (count >= REALMS[i].min) return REALMS[i];
  }
  return REALMS[0];
}

function getNextRealm(count) {
  for (let i = 0; i < REALMS.length; i++) {
    if (count < REALMS[i].min) return REALMS[i];
  }
  return null;
}

function getRealmProgress(count, realm, nextRealm) {
  if (!nextRealm) return 100;
  const range = nextRealm.min - realm.min;
  const progress = count - realm.min;
  return Math.min(100, Math.round((progress / range) * 100));
}

function getWordStatus(id) {
  if (state.mastered[id]) return 'mastered';
  if (state.learning[id]) return 'learning';
  return 'new';
}

function getMasteredCount() {
  return Object.keys(state.mastered).length;
}

function getLearningCount() {
  return Object.keys(state.learning).length;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ============ Speech Synthesis ============
let speechSynth = window.speechSynthesis;
let currentUtterance = null;

// Audio cache for pre-recorded word pronunciations
const AUDIO_BASE = 'assets/audio/words/';
let audioCtx = null;

// Play a short error beep sound
function playErrorBeep() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 220; // low A note — harsh buzzer-like
    osc.type = 'sawtooth';
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.3);
  } catch(e) { /* silent fallback */ }
}

function playLocalAudio(word, wordData) {
  // Priority: word's own audio path > default MP3 directory
  let audioPath;
  if (wordData && wordData.audio && wordData.audio.ame) {
    audioPath = wordData.audio.ame;
  } else {
    audioPath = AUDIO_BASE + word.toLowerCase() + '.mp3';
  }
  const audio = new Audio(audioPath);
  audio.play().catch(() => {
    // If local audio fails, fall back to speech synthesis
    speakViaSynth(word);
  });
  return audio;
}

function speakViaSynth(text, rate = 0.9) {
  if (!speechSynth) return null;
  speechSynth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = rate;
  utter.pitch = 1;
  const voices = speechSynth.getVoices();
  const usVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) ||
                  voices.find(v => v.lang === 'en-US') ||
                  voices.find(v => v.lang.startsWith('en'));
  if (usVoice) utter.voice = usVoice;
  currentUtterance = utter;
  speechSynth.speak(utter);
  return utter;
}

function speak(text, rate = 0.9, wordData) {
  // Single words: try pre-recorded MP3, fall back to synthesis
  if (text.indexOf(' ') === -1 && text.length > 0) {
    const audio = playLocalAudio(text, wordData);
    // Return a fake-utterance that wraps the Audio events
    const fake = { onend: null, onerror: null };
    audio.onended = () => { if (fake.onend) fake.onend(); };
    audio.onerror = () => { if (fake.onerror) fake.onerror(); };
    return fake;
  }
  // Phrases/sentences fall back to speech synthesis
  return speakViaSynth(text, rate) || { onend: null, onerror: null };
}

function speakWord(wordObj) {
  const btn = document.getElementById('play-word-btn');
  if (!btn) return;
  btn.classList.add('playing');
  btn.textContent = '⏸';
  const utter = speak(wordObj.word, 0.85, wordObj);
  utter.onend = () => {
    btn.classList.remove('playing');
    btn.textContent = '▶';
  };
  utter.onerror = () => {
    btn.classList.remove('playing');
    btn.textContent = '▶';
  };
}

function speakSyllable(syllable, el) {
  if (!speechSynth) return;
  speechSynth.cancel();
  
  // Fix common English suffix spellings that TTS mispronounces in isolation
  const sylLower = syllable.toLowerCase();
  const PRONUNCIATION_MAP = {
    'tion': 'shun',
    'sion': 'zhun',
    'ture': 'cher',
    'tial': 'shul',
    'tious': 'shus',
    'cious': 'shus',
    'cian': 'shun',
    'cial': 'shul',
    'geous': 'jus',
    'gue': 'g',
    'que': 'k',
    'ph': 'f',
  };
  let speakText = syllable;
  for (const [pattern, replacement] of Object.entries(PRONUNCIATION_MAP)) {
    if (sylLower.endsWith(pattern)) {
      speakText = syllable.slice(0, -pattern.length) + replacement;
      break;
    }
  }
  
  // Make consonant-only syllables pronounceable by adding a schwa hint
  const vowels = 'aeiouy';
  const hasVowel = [...speakText.toLowerCase()].some(c => vowels.includes(c));
  if (!hasVowel) {
    speakText = speakText + 'uh';
  }
  
  const utter = new SpeechSynthesisUtterance(speakText);
  utter.lang = 'en-US';
  utter.rate = hasVowel ? 0.75 : 0.6;
  utter.pitch = 1.1;
  const voices = speechSynth.getVoices();
  const usVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google')) ||
                  voices.find(v => v.lang === 'en-US') ||
                  voices.find(v => v.lang.startsWith('en'));
  if (usVoice) utter.voice = usVoice;
  el.style.transform = 'scale(1.12)';
  el.style.filter = 'brightness(1.4)';
  utter.onend = () => {
    el.style.transform = '';
    el.style.filter = '';
  };
  utter.onerror = () => {
    el.style.transform = '';
    el.style.filter = '';
  };
  speechSynth.speak(utter);
}

// Ensure voices are loaded

  speechSynth.getVoices();
  speechSynth.onvoiceschanged = () => speechSynth.getVoices();
}

// Parse multi-POS definitions from word data
function parseDefinitions(word) {
  const defs = [];
  
  // If word has a structured definitions array, use it
  if (word.definitions && Array.isArray(word.definitions)) {
    return word.definitions.filter(d => d.definition);
  }
  
  // Parse from the raw definition text: "n.: ...; vt.: ..."
  const raw = word.definition || '';
  const parts = raw.split(/;\s*(?=[a-z]+\.\s*:)/i);
  for (const part of parts) {
    const m = part.match(/^([a-z]+\.?)\s*:?\s*(.+)/i);
    if (m) {
      defs.push({ pos: m[1].toLowerCase().replace(/\.$/,''), definition: m[2].trim() });
    }
  }
  
  if (defs.length === 0 && raw) {
    // Use word.pos as fallback
    defs.push({ pos: (word.pos || 'n').toLowerCase().replace(/\.$/,''), definition: raw });
  }
  
  // Filter to only common POS
  return defs.filter(d => d.definition && d.definition.length > 5);
}

// Parse multi-POS examples from word data
function parseExamples(word) {
  const exs = [];
  
  // If word has a structured examples array, use it
  if (word.examples && Array.isArray(word.examples)) {
    // Support both string[] and {example,exampleCn,pos}[]
    return word.examples.map(e => {
      if (typeof e === 'string') {
        // Parse "English sentence. 中文翻译" into parts
        const cnMatch = e.search(/[\u4e00-\u9fff]/);
        let example = e, exampleCn = '';
        if (cnMatch >= 0) {
          example = e.slice(0, cnMatch).trim();
          exampleCn = e.slice(cnMatch).trim();
        }
        return { pos: (word.pos || 'n').toLowerCase().replace(/\.$/,''), example, exampleCn };
      }
      return e; // already structured
    }).filter(e => e.example);
  }
  
  // Build from single example + Chinese meaning
  const example = word.example || '';
  const exampleCn = word.exampleCn || '';
  const pos = (word.pos || 'n').toLowerCase().replace(/\.$/,'');
  
  if (example && example.length > 10) {
    const cn = exampleCn || (word.meaning ? word.meaning : '');
    exs.push({ pos, example, exampleCn: cn });
  }
  
  return exs.slice(0, 6);
}

  const inner = document.getElementById('card-inner');

  document.getElementById('learn-word').textContent = word.word;
  document.getElementById('learn-phonetic').textContent = word.phonetic;

  // Render star rating
  const starContainer = document.getElementById('learn-stars');
  const stars = word.stars || 3;
  starContainer.innerHTML = '★'.repeat(stars) + '☆'.repeat(5 - stars);
  starContainer.style.color = 'var(--gold)';
  starContainer.style.fontSize = '16px';
  starContainer.style.letterSpacing = '3px';
  starContainer.style.marginBottom = '4px';

  // Build definition display from definitions array (English only, from Longman)
  const defContainer = document.getElementById('learn-definitions');
  const defs = parseDefinitions(word);
  defContainer.innerHTML = defs.length > 0 ? defs.map((d, i) => 
    `<div style="text-align:center;font-size:15px;line-height:1.35;margin-top:3px">
      <span style="color:var(--gold-dim);font-weight:600;margin-right:6px">[${d.pos}]</span>
      <span style="color:var(--text)">${d.definition}</span>
    </div>`
  ).join('') : `<div style="text-align:center;font-size:14px;color:var(--text-dim);margin-top:8px">${word.definition || ''}</div>`;

  // Build syllable display
  const sylContainer = document.getElementById('learn-syllables');
  sylContainer.innerHTML = word.syllables.map((s, i) => {
    const colorIdx = i % 5;
    const stressMark = i === word.stress ? ' stressed' : '';
    return `<span class="syllable syl-c${colorIdx}${stressMark} clickable" data-syl="${s}" data-idx="${i}">${s}</span>`;
  }).join('');

  sylContainer.querySelectorAll('.syllable.clickable').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      speakSyllable(el.dataset.syl, el);
    });
  });

  // Render card-back — multi-definition with examples
  const backPhonetic = document.getElementById('back-phonetic');
  const backDefs = document.getElementById('back-defs');
  const backImg = document.getElementById('back-img');
  if (backPhonetic) backPhonetic.textContent = word.phonetic;
  
  // Render definition blocks (from cnDefs)
  if (backDefs) {
    const cnDefs = raw.cnDefs || [];
    if (cnDefs.length > 0) {
      backDefs.innerHTML = cnDefs.map((def, i) => `
      <div style="margin-bottom:${i < cnDefs.length - 1 ? '14px' : '0'};text-align:center">
        <div style="color:var(--text);font-size:14px;line-height:1.35;font-weight:600">
          ${def.pos}：${def.meaning}
        </div>
        <div style="margin-top:2px;color:var(--text-dim);font-size:13px;line-height:1.3">
          ${def.example}
          <button class="back-ex-play" data-idx="${i}" style="background:none;border:none;color:var(--gold-light);cursor:pointer;font-size:12px;margin-left:4px;padding:0" title="播放例句">▶</button>
        </div>
      </div>
    `).join('');
    
    // Wire up example play buttons
    backDefs.querySelectorAll('.back-ex-play').forEach(btn => {
      btn.onclick = function() {
        const idx = parseInt(this.dataset.idx);
        if (cnDefs[idx] && cnDefs[idx].example) speak(cnDefs[idx].example);
      };
    });
    }
  }

  // Render image — vocabulary.json 'image' field > fallback
  if (backImg && word.word) {
    const imgPath = raw.image || `assets/images/${word.word}.png`;
    if (raw.image) {
      backImg.src = imgPath;
      backImg.style.display = '';
    } else {
      backImg.src = imgPath;
      backImg.style.display = '';
      backImg.onerror = function() {
        this.style.display = 'none';
        this.style.width = '0';
        this.style.height = '0';
      };
    }
    backImg.alt = word.word;
  }

  document.getElementById('learn-index').textContent = learnIndex + 1;
  document.getElementById('learn-total').textContent = learnWords.length;

  setupTyping(word);
  renderPage3(word, raw);
  renderPage4(word, raw);
  renderPage5(word, raw);
  renderPage6(word, raw);
  requestAnimationFrame(() => positionArrows());
}

function speakCurrentWord() {
  const word = learnWords[learnIndex];
  if (word) speakWord(word);
}

function isTypingComplete() {
  const word = learnWords[learnIndex];
  if (!word) return true;
  const wordId = word.id || word.word;
  return window.typingCorrectCounts && window.typingCorrectCounts[wordId] >= 3;
}

function renderPage3(word, raw) {
  const pBreakdown = document.getElementById('page3-breakdown');
  const pFamily = document.getElementById('page3-family');
  const pEty = document.getElementById('page3-etymology');
  if (!pBreakdown) return;

  // Morph breakdown (from vocabulary.json morph)
  const morph = raw.morph || {};
  if (morph.prefix || morph.root || morph.suffix) {
    const flexParts = [];
    if (morph.prefix) flexParts.push(`<div style="flex:1;text-align:center"><span class="page3-breakdown-item">${morph.prefix}</span><div class="page3-breakdown-meaning">${morph.prefixMeaningEn || morph.prefixMeaning || ''}</div></div>`);
    if (morph.root) flexParts.push(`<div style="flex:1;text-align:center"><span class="page3-breakdown-item" style="background:rgba(39,174,96,0.08);border-color:rgba(39,174,96,0.15);color:var(--jade)">${morph.root}</span><div class="page3-breakdown-meaning">${morph.rootMeaningEn || morph.rootMeaning || ''}</div></div>`);
    if (morph.suffix) flexParts.push(`<div style="flex:1;text-align:center"><span class="page3-breakdown-item">${morph.suffix}</span><div class="page3-breakdown-meaning">${morph.suffixMeaningEn || morph.suffixMeaning || ''}</div></div>`);
    const composition = morph.compositionCn ? `<div style="margin-top:10px;color:var(--text);font-size:14px;line-height:1.4;font-weight:600">→ ${morph.compositionCn}</div>` : '';
    pBreakdown.innerHTML = `<div class="page3-section-label">构词拆解</div><div style="display:flex;gap:4px;justify-content:center;align-items:flex-start">${flexParts.join('')}</div>${composition}`;
  } else {
    pBreakdown.innerHTML = '';
  }

  // Word family with Chinese translations
  const family = morph.family || [];
  const familyCn = {
    construct: '建造，构建',
    constructive: '建设性的',
    constructor: '建造者',
    reconstruct: '重建',
    reconstruction: '重建，修复',
    reconstructive: '重建的',
    deconstruct: '解构',
    deconstruction: '解构',
    constructively: '建设性地',
    constructiveness: '建设性',
    constructivism: '建构主义',
    constructivist: '建构主义者',
    unconstructive: '无建设性的',
    unreconstructed: '顽固不化的，未改造的'
  };
  if (family.length > 0) {
    pFamily.innerHTML = '<div class="page3-section-label">词族</div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:4px 12px;justify-items:start;max-width:100%;margin:0 auto">' +
      family.map(w =>
        '<div style="white-space:nowrap;text-align:left;padding:2px 0">' +
          '<span class="page3-family-word" style="cursor:pointer" onclick="speak(\'' + w + '\')">' + w + '</span>' +
          (familyCn[w] ? ' <span style="color:var(--text-dim);font-size:13px;font-family:var(--font-cn)">' + familyCn[w] + '</span>' : '') +
        '</div>'
      ).join('') +
      '</div>';
  } else {
    pFamily.innerHTML = '';
  }

  // Etymology (from vocabulary.json morph or fallback)
  const etyText = morph.etymologyEn || morph.etymology || '';
  if (etyText) {
    pEty.innerHTML = `<div class="page3-section-label">词源</div><div class="page3-etymology-text">${etyText}</div>`;
  } else {
    pEty.innerHTML = '';
  }
}

function starsHtml(stars) {
  // stars = number 1-5
  if (!stars) return '';
  return '<span style="float:right;font-size:11px;color:var(--gold-dim);white-space:nowrap;line-height:inherit;margin-left:6px">' +
    '★'.repeat(stars) + '☆'.repeat(5-stars) + '</span>';
}

function renderPage4(word, raw) {
  const pColloc = document.getElementById('page4-collocations');
  const pPhrases = document.getElementById('page4-phrases');
  if (!pColloc) return;

  const colloc = raw.colloc || {};
  const phrases = raw.phrases || [];

  // Collocations (from 牛津搭配词典)
  let collocHtml = '';
  const collocSections = [
    { key: 'adj', label: '形容词 + 搭配' },
    { key: 'verb', label: '动词 + 搭配' },
    { key: 'noun', label: '搭配 + 名词' },
    { key: 'prep', label: '介词搭配' }
  ];
  for (const section of collocSections) {
    let items = colloc[section.key];
    if (items && items.length > 0) {
      // Sort by stars descending, take top 5
      items = [...items].sort((a, b) => (b.stars || 0) - (a.stars || 0)).slice(0, 5);
      collocHtml += `<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--gold-dim);letter-spacing:2px;margin-bottom:4px;font-weight:700">${section.label}</div>`;
      collocHtml += items.map(item =>
        `<div style="font-size:14px;margin:3px 0;line-height:1.4;overflow:hidden">
          <span style="color:var(--text);font-weight:600">${item.phrase}</span>
          <span style="color:var(--text-dim);font-size:12px"> ${item.cn || ''}</span>
          ${starsHtml(item.stars)}
          ${item.example ? `<div style="font-size:12px;color:var(--text-dim);margin-left:4px;line-height:1.3">${item.example}</div>` : ''}
        </div>`
      ).join('');
      collocHtml += '</div>';
    }
  }
  pColloc.innerHTML = collocHtml ? `<div class="page3-section-label">固定搭配</div>${collocHtml}` : '';

  // Phrases (from 韦氏/LDOCE6) — sort by stars, top 5
  let sortedPhrases = [...phrases].sort((a, b) => (b.stars || 0) - (a.stars || 0)).slice(0, 5);
  if (sortedPhrases.length > 0) {
    pPhrases.innerHTML = `<div class="page3-section-label">常用短语</div>` +
      sortedPhrases.map(p =>
        `<div style="font-size:14px;margin:4px 0;line-height:1.4;overflow:hidden">
          <span style="color:var(--jade);font-weight:600">${p.phrase}</span>
          <span style="color:var(--text-dim);font-size:12px"> ${p.cn || ''}</span>
          ${starsHtml(p.stars)}
          ${p.example ? `<div style="font-size:12px;color:var(--text-dim);margin-left:8px">${p.example}</div>` : ''}
        </div>`
      ).join('');
  } else {
    pPhrases.innerHTML = '';
  }
}

function renderPage5(word, raw) {
  const paradigm = raw.paradigm;
  if (!paradigm) {
    document.getElementById('page5-noun-senses').innerHTML = '';
    document.getElementById('page5-irregular-plural').innerHTML = '';
    document.getElementById('page5-verb-forms').innerHTML = '';
    document.getElementById('page5-irregular-adj').innerHTML = '';
    return;
  }

  // Noun senses — split by [U] and [C] into separate sections
  const uncountable = (paradigm.noun_senses || []).filter(s => s.count === 'U');
  const countable = (paradigm.noun_senses || []).filter(s => s.count === 'C');
  let sensesHtml = '';
  
  if (uncountable.length > 0) {
    sensesHtml += '<div style="font-size:12px;color:var(--gold-dim);font-weight:700;margin:12px 0 6px;letter-spacing:1px">不可数名词 [U]</div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px 12px;justify-items:start;max-width:100%;margin:0 auto">' +
      uncountable.map(s =>
        '<div style="white-space:nowrap;text-align:left;padding:2px 0;font-size:14px;line-height:1.4">' +
          '<span style="color:var(--text);font-weight:600">' + s.cn + '</span>' +
        '</div>'
      ).join('') +
      '</div>';
  }
  if (countable.length > 0) {
    sensesHtml += '<div style="font-size:12px;color:var(--gold-dim);font-weight:700;margin:12px 0 6px;letter-spacing:1px">可数名词 [C]</div>' +
      '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px 12px;justify-items:start;max-width:100%;margin:0 auto">' +
      countable.map(s =>
        '<div style="white-space:nowrap;text-align:left;padding:2px 0;font-size:14px;line-height:1.4">' +
          '<span style="color:var(--text);font-weight:600">' + s.cn + '</span>' +
        '</div>'
      ).join('') +
      '</div>';
  }
  document.getElementById('page5-noun-senses').innerHTML = sensesHtml;

  // Irregular plural
  if (paradigm.irregular_plural) {
    document.getElementById('page5-irregular-plural').innerHTML = 
      `<div style="font-size:14px;color:var(--text);margin-top:12px;padding-top:8px;border-top:1px solid var(--border)">
        不规则复数：<strong>${paradigm.irregular_plural}</strong>
      </div>`;
  } else {
    document.getElementById('page5-irregular-plural').innerHTML = '';
  }

  // Irregular verb forms
  if (paradigm.verb_forms) {
    const vf = paradigm.verb_forms;
    const parts = [];
    if (vf.past) parts.push(`过去式：<strong>${vf.past}</strong>`);
    if (vf.past_participle) parts.push(`过去分词：<strong>${vf.past_participle}</strong>`);
    if (vf.present_participle) parts.push(`现在分词：<strong>${vf.present_participle}</strong>`);
    document.getElementById('page5-verb-forms').innerHTML =
      `<div style="font-size:14px;color:var(--text);margin-top:12px;padding-top:8px;border-top:1px solid var(--border)">
        不规则动词变形：${parts.join(' · ')}
      </div>`;
  } else {
    document.getElementById('page5-verb-forms').innerHTML = '';
  }

  // Irregular adjective forms
  if (paradigm.irregular_adj) {
    const adj = paradigm.irregular_adj;
    document.getElementById('page5-irregular-adj').innerHTML =
      `<div style="font-size:14px;color:var(--text);margin-top:12px;padding-top:8px;border-top:1px solid var(--border)">
        不规则比较级：<strong>${adj.comparative}</strong> · <strong>${adj.superlative}</strong>
      </div>`;
  } else {
    document.getElementById('page5-irregular-adj').innerHTML = '';
  }
}

function renderPage6(word, raw) {
  const pc = document.getElementById('page5-lla-content');
  if (!pc) return;
  
  const tree = raw.lla_tree;
  if (!tree || !tree.concepts || tree.concepts.length === 0) {
    pc.innerHTML = '<div style="color:var(--text-dim);font-size:13px;text-align:center;padding:20px">暂无思维导图数据</div>';
    return;
  }
  
  let html = '';
  
  tree.concepts.forEach((c, ci) => {
    // Concept header — colored badge
    html += '<div style="margin-bottom:24px">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:8px;display:inline-flex;align-items:center;gap:6px;background:rgba(230,126,34,0.08);padding:4px 12px;border-radius:4px;border:1px solid rgba(230,126,34,0.15)">' +
      '<span style="display:inline-block;width:6px;height:6px;background:var(--gold);border-radius:50%"></span>' +
      c.name + ' <span style="font-weight:400;font-size:10px;color:var(--text-dim);margin-left:2px">(' + (tree.concept || '') + ')</span>' +
      '</div>';
    
    // Entries with examples
    c.entries.forEach(e => {
      const isCurrent = e.is_current || e.word.toLowerCase() === word.word.toLowerCase();
      html += '<div style="margin-bottom:8px;padding:6px 8px;border-left:3px solid ' + (isCurrent ? 'var(--jade)' : '#94a3b8') + ';background:' + (isCurrent ? 'rgba(39,174,96,0.03)' : 'rgba(0,0,0,0.01)') + ';border-radius:0 4px 4px 0">';
      
      // Word header
      html += '<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:2px">' +
        '<span style="font-weight:700;font-size:13px;color:' + (isCurrent ? 'var(--jade)' : 'var(--text)') + '">' +
        (isCurrent ? '★ ' : '') + e.word + '</span>' +
        '<span style="font-size:11px;font-family:var(--font-cn);color:var(--text-dim);font-weight:400">' + (e.zh || '') + '</span>' +
        '</div>';
      
      // Examples
      if (e.examples && e.examples.length > 0) {
        html += '<div style="font-size:11px;color:var(--text-dim);line-height:1.5;margin-top:2px">';
        e.examples.slice(0, 3).forEach(ex => {
          html += '<div style="margin:2px 0">' + ex + '</div>';
        });
        html += '</div>';
      }
      
      html += '</div>';
    });
    
    // Distinction note
    if (c.distinction) {
      html += '<div style="font-size:11px;color:var(--gold-dim);line-height:1.5;padding:6px 10px;background:rgba(230,126,34,0.04);border-left:2px solid var(--gold-dim);border-radius:0 4px 4px 0;margin-top:4px">' +
        '💡 ' + c.distinction +
        '</div>';
    }
    
    html += '</div>';
  });
  
  pc.innerHTML = html;
}

/* ===== Roots Section ===== */
var _rootsData = null;
var _rootCnMode = true;

function loadRootsData() {
  if (_rootsData) return Promise.resolve(_rootsData);
  return fetch('roots_data.json?_=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) { _rootsData = data; return data; })
    .catch(function(e) { console.error('Failed to load roots data:', e); return {}; });
}

function renderRoots() {
  loadRootsData().then(function(data) {
    var keys = Object.keys(data).sort();
    // Render alphabet
    var alphabetHtml = '<button class="root-alpha-btn active" onclick="filterRoots(\'all\')">全</button>';
    var letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    letters.forEach(function(l) {
      alphabetHtml += '<button class="root-alpha-btn" onclick="filterRoots(\'' + l + '\')">' + l + '</button>';
    });
    document.getElementById('root-alphabet').innerHTML = alphabetHtml;

    // Render all cards initially
    renderRootCards(keys, data);
    _rootActiveLetter = 'all';
  });
}

var _rootActiveLetter = 'all';

function renderRootCards(keys, data) {
  var list = document.getElementById('root-list');
  if (!list || !data) return;
  if (keys.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:14px">没有匹配的词根</div>';
    return;
  }
  list.innerHTML = keys.map(function(k) {
    var entry = data[k];
    var wordCount = (entry.words ? entry.words.length : 0) + (entry.related ? entry.related.length : 0);
    var meaningParts = [];
    if (entry.meaning) meaningParts.push(entry.meaning);
    if (entry.meaningCn) meaningParts.push('· ' + entry.meaningCn);
    var meaningStr = meaningParts.length > 0 ? meaningParts.join(' ') : '';
    return '<div class="root-card" onclick="renderRootDetail(\'' + k.replace(/'/g, "\\'") + '\')">' +
      '<span class="root-card-count">' + wordCount + ' 词</span>' +
      '<div class="root-card-name">' + k + '</div>' +
      (meaningStr ? '<div class="root-card-meaning">' + meaningStr + '</div>' : '') +
      (entry.lang ? '<span class="root-card-lang">' + entry.lang + '</span>' : '') +
      '</div>';
  }).join('');
}

function filterRoots(letter) {
  _rootActiveLetter = letter;
  // Update active button
  document.querySelectorAll('.root-alpha-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.textContent === letter || (letter === 'all' && btn.textContent === '全'));
  });
  // Clear search
  document.getElementById('root-search').value = '';
  applyRootFilter();
}

function filterRootsBySearch(query) {
  // Clear alphabet highlights
  document.querySelectorAll('.root-alpha-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.textContent === '全');
  });
  _rootActiveLetter = 'all';
  applyRootFilter(query);
}

function applyRootFilter(searchQuery) {
  loadRootsData().then(function(data) {
    var keys = Object.keys(data).sort();
    var search = (searchQuery || document.getElementById('root-search').value || '').toLowerCase().trim();

    if (search) {
      keys = keys.filter(function(k) {
        var entry = data[k];
        var allWords = (entry.words || []).concat(entry.related || []);
        var nameMatch = k.toLowerCase().indexOf(search) !== -1;
        var meaningMatch = (entry.meaning || '').toLowerCase().indexOf(search) !== -1;
        var meaningCnMatch = (entry.meaningCn || '').indexOf(search) !== -1;
        var wordMatch = allWords.some(function(w) { return w.toLowerCase().indexOf(search) !== -1; });
        return nameMatch || meaningMatch || meaningCnMatch || wordMatch;
      });
    } else if (_rootActiveLetter !== 'all') {
      keys = keys.filter(function(k) {
        return k.charAt(0).toUpperCase() === _rootActiveLetter;
      });
    }
    renderRootCards(keys, data);
  });
}

function renderRootDetail(key) {
  loadRootsData().then(function(data) {
    var entry = data[key];
    if (!entry) return;
    navigateTo('root-detail');
    var container = document.getElementById('root-detail-content');
    var html = entry.html || '';

    // Add lang toggle
    if (entry.htmlCn) {
      var langBtn = '<button class="root-lang-toggle" onclick="toggleRootLang(\'' + key.replace(/'/g, "\\'") + '\')">' +
        (_rootCnMode ? '🇬🇧 English' : '🇨🇳 中文') + '</button>';
      container.innerHTML = langBtn + '<div id="root-detail-body">' + (_rootCnMode ? entry.htmlCn : entry.html) + '</div>';
    } else {
      container.innerHTML = '<div id="root-detail-body">' + html + '</div>';
    }

    // Rewrite ctB/Apc links to navigateTo
    container.querySelectorAll('.ctB, .Apc a').forEach(function(el) {
      var w = el.textContent.trim().toLowerCase();
      if (!el.getAttribute('onclick')) {
        el.setAttribute('onclick', 'navigateTo("learn");setTimeout(function(){showLearnWordByStr("' + w + '")},100)');
        el.style.cursor = 'pointer';
      }
    });

    // Add subtitle
    var titleEl = container.querySelector('.oWw');
    if (titleEl && entry.meaningCn) {
      titleEl.insertAdjacentHTML('afterend', '<div class="root-subtitle">' + (entry.meaning || '') + ' · ' + entry.meaningCn + '</div>');
    }
  });
}

function toggleRootLang(key) {
  _rootCnMode = !_rootCnMode;
  renderRootDetail(key);
}

// Navigate event listener for roots
document.addEventListener('viewChanged', function(e) {
  if (e.detail === 'roots') renderRoots();
});

/* ===== Writing Section ===== */
var _writingData = null;

function loadWritingData() {
  if (_writingData) return Promise.resolve(_writingData);
  return fetch('vocabulary.json?_=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      // Build concept-indexed structure
      var concepts = {};
      data.forEach(function(w) {
        if (w.lla_tree && w.lla_tree.concepts && w.lla_tree.concepts.length > 0) {
          w.lla_tree.concepts.forEach(function(c) {
            var key = c.name.toLowerCase().trim();
            if (!concepts[key]) {
              concepts[key] = { name: c.name, entries: [], words: [] };
            }
            c.entries.forEach(function(e) {
              // Deduplicate entries by word
              var exists = concepts[key].entries.some(function(x) {
                return x.word.toLowerCase() === (e.word || '').toLowerCase();
              });
              if (!exists) {
                concepts[key].entries.push({
                  word: e.word || '',
                  zh: e.zh || '',
                  examples: e.examples || []
                });
              }
            });
            if (concepts[key].words.indexOf(w.word) === -1) {
              concepts[key].words.push(w.word);
            }
          });
        }
      });
      _writingData = concepts;
      return concepts;
    })
    .catch(function(e) { console.error('Failed to load writing data:', e); return {}; });
}

function showWritingConcept(key) {
  loadWritingData().then(function(concepts) {
    var c = concepts[key];
    if (!c) return;
    var cnName = _conceptCnNames[key] || key;
    
    // Group entries by annotation tags
    var groups = {};
    var ungrouped = [];
    c.entries.forEach(function(e, idx) {
      var zh = e.zh || '';
      var match = zh.match(/【[^】]*】/);
      if (match) {
        var tag = match[0];
        if (!groups[tag]) groups[tag] = [];
        groups[tag].push({entry: e, index: idx});
      } else {
        ungrouped.push({entry: e, index: idx});
      }
    });

    var html = '<div style="margin-bottom:12px">';
    html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">';
    html += '<span style="font-size:14px;color:var(--gold);cursor:pointer" onclick="renderAllConcepts()">‹ 返回概念列表</span></div>';
    html += '<div style="font-size:20px;font-weight:800;color:var(--text);font-family:var(--font-cn);margin-top:4px">' + cnName + '</div>';
    html += '<div style="font-size:12px;color:var(--gold);font-weight:600">' + c.name + ' · ' + c.entries.length + ' 个表达</div></div>';

    // Render grouped entries
    var groupKeys = Object.keys(groups).sort();
    groupKeys.forEach(function(tag) {
      html += '<div style="font-size:12px;color:var(--jade);font-weight:700;margin:12px 0 6px;padding:4px 8px;background:rgba(39,174,96,0.06);border-radius:4px;display:inline-block">' + tag + '</div>';
      groups[tag].forEach(function(item) {
        html += renderEntryItem(item.entry, key, item.index);
      });
    });

    // Ungrouped entries
    if (ungrouped.length > 0) {
      if (groupKeys.length > 0) {
        html += '<div style="font-size:12px;color:var(--gold-dim);font-weight:700;margin:12px 0 6px">通用</div>';
      }
      ungrouped.forEach(function(item) {
        html += renderEntryItem(item.entry, key, item.index);
      });
    }

    document.getElementById('writing-result').innerHTML = html;
  });
}

function renderEntryItem(entry, key, idx) {
  var zh = entry.zh || '';
  // Detect bad zh: example translation (ends with 。！？, no annotation brackets)
  var isBadZh = /[。！？]$/.test(zh) && !/【/.test(zh) && !/〔/.test(zh);
  var zhMain = zh.replace(/【[^】]*】/g, '').replace(/〔[^〕]*〕/g, '').trim();
  var mainTitle = (isBadZh || !zhMain) ? entry.word : zhMain;
  var subTitle = isBadZh ? '' : entry.word;
  var arrowId = 'writing-ea-' + key.replace(/[^a-z0-9]/g, '') + '-' + idx;
  var entryId = 'writing-ed-' + key.replace(/[^a-z0-9]/g, '') + '-' + idx;
  
  var html = '<div class="writing-entry-item" style="margin-bottom:6px;border-radius:6px;overflow:hidden;border:1px solid var(--border)">';
  // Clickable entry header
  html += '<div style="padding:8px 10px;background:var(--bg-card);cursor:pointer;display:flex;align-items:center;justify-content:space-between" onclick="toggleWritingEntry(\'' + entryId + '\',\'' + arrowId + '\')" onmouseover="this.style.background=\'var(--bg-card-hover)\'" onmouseout="this.style.background=\'var(--bg-card)\'">';
  html += '<div><div style="font-size:14px;font-weight:700;color:var(--text);font-family:var(--font-cn);line-height:1.3">' + mainTitle + '</div>';
  html += '<div style="font-size:12px;color:var(--jade);font-weight:600;margin-top:1px">' + subTitle + '</div></div>';
  html += '<span id="' + arrowId + '" style="font-size:12px;color:var(--text-dim);transition:transform 0.2s">▶</span></div>';
  // Detail content (hidden)
  html += '<div id="' + entryId + '" style="display:none;padding:8px 10px 10px;background:var(--bg)">';
  if (zh) {
    html += '<div style="font-size:12px;color:var(--text-dim);font-family:var(--font-cn);margin-bottom:6px;line-height:1.4">' + zh + '</div>';
  }
  if (entry.examples && entry.examples.length > 0) {
    entry.examples.slice(0, 3).forEach(function(ex) {
      var parts = ex.split('——');
      var en = parts[0] || ex;
      var cn = parts[1] || '';
      html += '<div style="font-size:11px;color:var(--text-dim);line-height:1.5;margin:3px 0;padding:4px 6px;background:rgba(232,240,248,0.5);border-radius:4px">';
      html += '<span style="color:var(--text)">' + en.trim() + '</span>';
      if (cn) html += '<br><span style="color:var(--text-dim);font-family:var(--font-cn)">' + cn.trim() + '</span>';
      html += '</div>';
    });
  }
  html += '</div></div>';
  return html;
}

var _writingEntryExpanded = {};
function toggleWritingEntry(entryId, arrowId) {
  var el = document.getElementById(entryId);
  var arrow = document.getElementById(arrowId);
  if (!el) return;
  if (_writingEntryExpanded[entryId]) {
    el.style.display = 'none';
    if (arrow) arrow.style.transform = 'rotate(0deg)';
    _writingEntryExpanded[entryId] = false;
  } else {
    el.style.display = 'block';
    if (arrow) arrow.style.transform = 'rotate(90deg)';
    _writingEntryExpanded[entryId] = true;
  }
}

function filterWritingConcepts(query) {
  var result = document.getElementById('writing-result');
  query = query.toLowerCase().trim();
  
  loadWritingData().then(function(concepts) {
    if (!query) {
      renderAllConcepts();
      return;
    }
    
    var keys = Object.keys(concepts).filter(function(key) {
      var c = concepts[key];
      var cnName = _conceptCnNames[key] || key;
      if (key.indexOf(query) !== -1) return true;
      if (cnName.indexOf(query) !== -1) return true;
      return c.entries.some(function(e) {
        return (e.word || '').toLowerCase().indexOf(query) !== -1 ||
               (e.zh || '').indexOf(query) !== -1;
      });
    });
    
    if (keys.length === 0) {
      result.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:14px">没有匹配「' + query + '」的概念</div>';
      return;
    }
    
    var html = '';
    keys.forEach(function(key) {
      var c = concepts[key];
      var cnName = _conceptCnNames[key] || key;
      html += '<div class="writing-concept-section" style="margin-bottom:8px;border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer" onclick="showWritingConcept(\'' + key.replace(/'/g,"\\'") + '\')">';
      html += '<div style="padding:12px 14px;background:var(--bg-card);display:flex;align-items:center;justify-content:space-between">';
      html += '<div><div style="font-size:16px;font-weight:800;color:var(--text);font-family:var(--font-cn)">' + cnName + '</div>';
      html += '<div style="font-size:11px;color:var(--gold);font-weight:600;margin-top:1px">' + c.name + ' · ' + c.entries.length + ' 个表达</div></div>';
      html += '<span style="font-size:16px;color:var(--gold)">›</span></div></div>';
    });
    result.innerHTML = html;
  });
}

function goToPrevWord() {
  if (learnWords.length === 0) return;
  const inner = document.getElementById('card-inner');
  if (!inner) return;
  if (onPage5) {
    inner.classList.remove('p5');
    inner.classList.add('p4');
    onPage5 = false;
    onPage4 = true;
    return;
  }
  if (onPage4) {
    inner.classList.remove('p4');
    inner.classList.add('p3');
    onPage4 = false;
    onPage3 = true;
    return;
  }
  if (onPage3) {
    inner.classList.remove('p3');
    inner.classList.add('p2');
    onPage3 = false;
    onPage2 = true;
    return;
  }
  if (onPage2) {
    inner.classList.remove('p2');
    onPage2 = false;
    return;
  }
  if (learnIndex === 0) {
    return;
  }
  learnIndex--;
  state.lastLearnIndex = learnIndex;

function goToNextWord() {
  if (learnWords.length === 0) return;
  const inner = document.getElementById('card-inner');
  if (!inner) return;
  if (!onPage2 && !onPage3 && !onPage4 && !onPage5) {
    inner.classList.add('p2');
    onPage2 = true;
    return;
  }
  if (onPage2 && !onPage3 && !onPage4 && !onPage5) {
    inner.classList.remove('p2');
    inner.classList.add('p3');
    onPage2 = false;
    onPage3 = true;
    return;
  }
  if (!onPage2 && onPage3 && !onPage4 && !onPage5) {
    inner.classList.remove('p3');
    inner.classList.add('p4');
    onPage3 = false;
    onPage4 = true;
    return;
  }
  if (!onPage2 && !onPage3 && onPage4 && !onPage5) {
    inner.classList.remove('p4');
    inner.classList.add('p5');
    onPage4 = false;
    onPage5 = true;
    return;
  }
  if (!onPage2 && !onPage3 && !onPage4 && onPage5) {
    // Last page — go to next word
    if (learnIndex >= learnWords.length - 1) return;
    learnIndex++;
    state.lastLearnIndex = learnIndex;
    showLearnWord();
    return;
  }
}

// ============ Typing Practice ============
let typingInterval = null;

function setupTyping(word) {
  setupTypingForPage(word, '');       // front page
  setupTypingForPage(word, 'back-');  // back page
  setupTypingForPage(word, 'page3-'); // page3 (词根词族)
  setupTypingForPage(word, 'page4-'); // page4 (固定搭配+词族短语)
  setupTypingForPage(word, 'page5-'); // page5 (词形纵览)
}

function setupTypingForPage(word, prefix) {
  const container = document.getElementById(prefix + 'typing-boxes');
  const wordLabel = document.getElementById(prefix + 'word');
  const starRating = document.getElementById('learn-stars');
  const syllablesEl = document.getElementById(prefix + 'syllables');
  const hint = document.getElementById(prefix + 'typing-hint');
  
  if (!container) return;

  // Clear any existing typing interval
  if (typingInterval) {
    clearInterval(typingInterval);
    typingInterval = null;
  }

  // Reset visibility
  if (wordLabel) wordLabel.style.visibility = 'visible';
  if (starRating) starRating.style.opacity = '1';
  
  container.innerHTML = word.syllables.map((syl, i) => {
    return `
      <div class="typing-box-wrapper">
        <input class="typing-box" 
               data-syl="${syl}" 
               data-idx="${i}" 
               data-prefix="${prefix}"
               maxlength="${syl.length + 2}" 
               placeholder=""
               autocomplete="off" autocorrect="off" spellcheck="false">
      </div>
    `;
  }).join('');

  // Add input listeners
  container.querySelectorAll('.typing-box').forEach(box => {
    box.addEventListener('focus', function onFocus() {
      // Hide word label, image, stars, syllables — keep phonetic + definitions
      if (wordLabel) wordLabel.style.visibility = 'hidden';
      if (starRating) starRating.style.opacity = '0.3';
      if (syllablesEl) syllablesEl.style.visibility = 'hidden';
      
      // Start 3-second syllable pronunciation timer
      if (typingInterval) clearInterval(typingInterval);
      const activeSyl = this.dataset.syl;
      // Play immediately
      speakSyllable(activeSyl, this);
      // Then every 3 seconds
      typingInterval = setInterval(() => {
        // Check if this box still has focus
        if (document.activeElement === this) {
          speakSyllable(activeSyl, this);
        }
      }, 3000);
    });

    box.addEventListener('blur', function onBlur() {
      // Show word again when leaving typing area
      if (wordLabel) wordLabel.style.visibility = 'visible';
      if (starRating) starRating.style.opacity = '1';
      if (syllablesEl) syllablesEl.style.visibility = 'visible';
      if (typingInterval) {
        clearInterval(typingInterval);
        typingInterval = null;
      }
    });

    box.addEventListener('input', (e) => {
      const expected = box.dataset.syl;
      const value = box.value.trim();
      
      // Only validate when user has typed enough characters
      if (value.length >= expected.length) {
        if (value.toLowerCase() === expected.toLowerCase()) {
          // Correct — mark green, auto-advance
          box.classList.remove('wrong');
          box.classList.add('correct');
          const next = box.parentElement.nextElementSibling?.querySelector('.typing-box');
          if (next) {
            next.focus();
          } else {
            // Last box done — check round completion
            checkTypingAnswer(word);
          }
        } else {
          // Wrong — don't advance, play beep, mark red
          box.classList.remove('correct');
          box.classList.add('wrong');
          playErrorBeep();
        }
      } else {
        // Still typing, no error yet
        box.classList.remove('wrong', 'correct');
      }
    });

    box.addEventListener('keydown', (e) => {
      // Backspace on empty: just stop (don't navigate to previous box)
      if (e.key === 'Backspace' && box.value === '') {
        e.preventDefault();
      }
      if (e.key === 'Enter') {
        speakWord(word);
      }
    });
  });
}

function checkTypingAnswer(word) {
  // Figure out which page: find which typing-boxes container has content
  const frontBoxes = document.querySelectorAll('#typing-boxes .typing-box');
  const backBoxes = document.querySelectorAll('#back-typing-boxes .typing-box');
  const page3Boxes = document.querySelectorAll('#page3-typing-boxes .typing-box');
  const page4Boxes = document.querySelectorAll('#page4-typing-boxes .typing-box');
  const page5Boxes = document.querySelectorAll('#page5-typing-boxes .typing-box');
  const onFrontPage = frontBoxes.length > 0 && frontBoxes[0].value !== '';
  const onBackPage = backBoxes.length > 0 && backBoxes[0].value !== '';
  const onPage3Typing = page3Boxes.length > 0 && page3Boxes[0].value !== '';
  const onPage4Typing = page4Boxes.length > 0 && page4Boxes[0].value !== '';
  const onPage5Typing = page5Boxes.length > 0 && page5Boxes[0].value !== '';
  
  let boxes, prefix;
  if (onPage5Typing) { boxes = page5Boxes; prefix = 'page5-'; }
  else if (onPage4Typing) { boxes = page4Boxes; prefix = 'page4-'; }
  else if (onPage3Typing) { boxes = page3Boxes; prefix = 'page3-'; }
  else if (onBackPage) { boxes = backBoxes; prefix = 'back-'; }
  else { boxes = frontBoxes; prefix = ''; }
  const wordId = word.id || word.word;
  
  if (!window.typingCorrectCounts) window.typingCorrectCounts = {};
  if (window.typingCorrectCounts[wordId] === undefined) window.typingCorrectCounts[wordId] = 0;
  
  let allCorrect = true;
  let allFilled = true;
  let hasError = false;

  boxes.forEach((box, i) => {
    const expected = word.syllables[i] || '';
    const value = box.value.trim().toLowerCase();
    box.classList.remove('correct', 'wrong', 'filled');

    if (value === '') {
      allFilled = false;
    } else if (value === expected.toLowerCase()) {
      box.classList.add('correct');
    } else {
      box.classList.add('wrong');
      allCorrect = false;
      hasError = true;
    }

    if (value !== '') box.classList.add('filled');
  });

  // Play error beep if any box is wrong
  if (hasError) playErrorBeep();

  const hint = document.getElementById(prefix + 'typing-hint');
  const wl = document.getElementById(prefix === '' ? 'learn-word' : prefix + 'word');
  const sr = document.getElementById('learn-stars');
  const se = document.getElementById(prefix === '' ? 'learn-syllables' : prefix + 'syllables');
  
  if (allFilled && allCorrect) {
    window.typingCorrectCounts[wordId]++;
    const round = window.typingCorrectCounts[wordId];
    
    if (round < 3) {
      hint.textContent = `✓ 第 ${round}/3 次正确，再来！`;
      hint.style.color = 'var(--jade-light)';
      // Clear boxes and re-enable
      setTimeout(() => {
        boxes.forEach(b => { b.value = ''; b.classList.remove('correct', 'wrong', 'filled'); b.disabled = false; });
        if (wl) wl.style.visibility = 'hidden';
        if (sr) sr.style.opacity = '0.3';
        if (se) se.style.visibility = 'hidden';
        // Restart 3-second timer
        if (typingInterval) { clearInterval(typingInterval); typingInterval = null; }
        // Focus first box
        const firstBox = boxes[0];
        if (firstBox) { firstBox.focus(); speakSyllable(firstBox.dataset.syl, firstBox);
          typingInterval = setInterval(() => {
            if (document.activeElement && document.activeElement.classList.contains('typing-box')) {
              speakSyllable(document.activeElement.dataset.syl, document.activeElement);
            }
          }, 3000);
        }
      }, 800);
    } else {
      hint.textContent = '✨ 剑气贯通！此剑已入心 ✨';
      hint.style.color = 'var(--jade-light)';
      if (wl) wl.style.visibility = 'visible';
      if (sr) sr.style.opacity = '1';
      if (se) se.style.visibility = 'visible';
      if (typingInterval) { clearInterval(typingInterval); typingInterval = null; }
      boxes.forEach(b => b.disabled = true);
      speakWord(word);
    }
    
  } else if (allFilled && !allCorrect) {
    hint.textContent = '部分音节有误，请修正后重试';
    hint.style.color = 'var(--red-light)';
  } else {
    hint.textContent = '输入后自动检测对错';
    hint.style.color = 'var(--text-dim)';
  }
}

function markWord(status) {
  const word = learnWords[learnIndex];
  if (!word) return;

  const prevMastered = getMasteredCount();
  const prevRealm = getRealm(prevMastered);

  if (status === 'mastered') {
    state.mastered[word.id] = true;
    delete state.learning[word.id];
    showToast(`「${word.word}」已刻入剑心`, 'success');
    showSwordSlash(window.innerWidth/2, window.innerHeight/2);
  } else if (status === 'learning') {
    state.learning[word.id] = true;
    delete state.mastered[word.id];
  }

  saveState();
  state.lastLearnIndex = (learnIndex + 1) % learnWords.length;

  // Check realm upgrade
  const newMastered = getMasteredCount();
  const newRealm = getRealm(newMastered);
  if (newRealm.name !== prevRealm.name) {
    showLevelUp(newRealm);
  }

  if (status === 'skip') {
    state.lastLearnIndex = (learnIndex + 1) % learnWords.length;
    learnIndex = state.lastLearnIndex;
    showLearnWord();
    return;
  }

  learnIndex = state.lastLearnIndex;
  showLearnWord();
  renderHome(); // Update stats in background
}

function startQuiz() {
  const allWords = getAllWords();
  const pool = [...allWords];
  const masteredPool = allWords.filter(w => state.learning[w.id] || !state.mastered[w.id]);
  const source = masteredPool.length >= 5 ? masteredPool : pool;
  quizWords = shuffle(source).slice(0, 10);
  quizIndex = 0;
  quizScore = 0;
  document.getElementById('quiz-score').textContent = '0';
  document.getElementById('quiz-round').textContent = '1/10';
  document.getElementById('quiz-progress-fill').style.width = '0%';
  showQuizQuestion();
}

function showQuizQuestion() {
  if (quizIndex >= quizWords.length) {
    finishQuiz();
    return;
  }

  quizAnswered = false;
  document.getElementById('quiz-score').textContent = quizScore;
  document.getElementById('quiz-round').textContent = `${quizIndex + 1}/${quizWords.length}`;
  document.getElementById('quiz-progress-fill').style.width = `${(quizIndex / quizWords.length) * 100}%`;

  // Track word frequency: seen++
  if (quizMode === 'meaning' || quizMode === 'syllable') {
    const word = quizWords[quizIndex];
    if (!state.wordFreq[word.id]) state.wordFreq[word.id] = {seen: 0, wrong: 0};
    state.wordFreq[word.id].seen++;
  } else if (quizMode === 'textbook') {
    const entry = textbookEntries[textbookEntryIndex];
    if (entry && entry.cn) {
      if (!state.wordFreq[entry.cn]) state.wordFreq[entry.cn] = {seen: 0, wrong: 0};
      state.wordFreq[entry.cn].seen++;
    }
  }

  if (quizMode === 'meaning') {
    showMeaningQuestion();
  } else if (quizMode === 'syllable') {
    showSyllableQuestion();
  } else if (quizMode === 'textbook') {
    showTextbookQuestion();
  }
  // Track question seen
  if (quizMode !== 'textbook' && quizWords[quizIndex]) {
    trackQuizSeen(quizWords[quizIndex].id);
  }
}

// ============ 化剑为词 (Textbook Quiz) ============
let textbookEntries = [];
let textbookEntryIndex = 0;

function switchTextbook() {
  const sel = document.getElementById('textbook-select');
  const unitsDiv = document.getElementById('textbook-units');
  const startBtn = document.getElementById('textbook-start');
  const tid = sel.value;
  
  unitsDiv.innerHTML = '';
  startBtn.style.display = 'none';
  if (!tid) return;
  
  const tb = (window.TEXTBOOKS || []).find(t => t.id === tid);
  if (!tb) return;
  
  tb.units.forEach((u, i) => {
    const label = document.createElement('label');
    label.style.cssText = 'padding:4px 12px;background:rgba(20,20,35,0.6);border:1px solid rgba(255,178,102,0.15);border-radius:4px;cursor:pointer;font-size:12px;color:var(--text);font-family:var(--font-cn);user-select:none;display:flex;align-items:center;gap:6px';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = i;
    cb.dataset.unit = i;
    label.appendChild(cb);
    label.appendChild(document.createTextNode(u.name));
    label.addEventListener('click', () => {
      cb.checked = !cb.checked;
      startBtn.style.display = getSelectedUnitIndices().length > 0 ? 'inline-block' : 'none';
    });
    unitsDiv.appendChild(label);
  });
  
  startBtn.style.display = 'none';
}

function getSelectedUnitIndices() {
  const cbs = document.querySelectorAll('#textbook-units input[type=checkbox]');
  return Array.from(cbs).filter(cb => cb.checked).map(cb => parseInt(cb.value));
}

function loadSelectedUnits() {
  const sel = document.getElementById('textbook-select');
  const tb = (window.TEXTBOOKS || []).find(t => t.id === sel.value);
  if (!tb) return;
  
  const indices = getSelectedUnitIndices();
  if (indices.length === 0) return;
  
  // Merge entries from all selected units
  textbookEntries = [];
  indices.forEach(i => {
    if (tb.units[i]) {
      textbookEntries = textbookEntries.concat(tb.units[i].entries);
    }
  });
  
  // Shuffle
  textbookEntries = shuffle(textbookEntries);
  textbookEntryIndex = 0;
  startQuiz();
}
