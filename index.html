function handleTextbookAnswer() {
  if (quizAnswered) return;
  quizAnswered = true;
  
  const entry = textbookEntries[textbookEntryIndex];
  const input = document.getElementById('textbook-answer');
  const userAnswer = input.value.trim();
  
  // Check: case-insensitive, trim spaces, accept alternatives
  const acceptable = [entry.en, ...(entry.alt || [])].map(a => a.toLowerCase().replace(/\s+/g,' ').trim());
  const user = userAnswer.toLowerCase().replace(/\s+/g,' ').trim();
  const correct = acceptable.includes(user);
  
  // Hide Chinese word, show English word + play button
  document.getElementById('tq-word').style.display = 'none';
  const answerRow = document.getElementById('tq-answer-row');
  const answerWord = document.getElementById('tq-answer-word');
  const playBtn = document.getElementById('tq-play-btn');
  answerWord.textContent = entry.en;
  answerWord.style.color = correct ? 'var(--gold)' : 'var(--red-light)';
  answerRow.style.display = 'flex';
  answerRow.style.alignItems = 'center';
  answerRow.style.justifyContent = 'center';
  playBtn.style.display = 'inline-block';
  
  // Auto-speak the answer
  setTimeout(() => speak(entry.en), 300);
  
  if (correct) {
    quizScore++;
    document.getElementById('quiz-feedback').innerHTML = `<span class="feedback-correct">剑气破空 · 命中！</span>`;
  } else {
    // Show the correct answer
    document.getElementById('quiz-feedback').innerHTML = '<span class="feedback-wrong">剑势未至 · 答案：' + entry.en + '</span>';
    // Track textbook quiz error + frequency (use entry.cn as key)
    if (entry.cn) {
      state.quizErrors[entry.cn] = true;
      if (!state.wordFreq[entry.cn]) state.wordFreq[entry.cn] = {seen: 0, wrong: 0};
      state.wordFreq[entry.cn].wrong++;
      saveState();
    }
  }
  
  document.getElementById('quiz-score').textContent = quizScore;
  
  // Don't auto-advance — user clicks 上一个/下一个 manually
}

function goToPrevTextbook() {
  if (textbookEntryIndex > 0) {
    textbookEntryIndex--;
    quizAnswered = false;
    showTextbookQuestion();
  }
}

function goToNextTextbook() {
  quizAnswered = false;
  textbookEntryIndex++;
  if (textbookEntryIndex >= textbookEntries.length) {
    finishQuiz();
  } else {
    showTextbookQuestion();
  }
}

function showMeaningQuestion() {
  const word = quizWords[quizIndex];
  const card = document.getElementById('quiz-card');

  // Generate 4 options including the correct one
  const allWords = getAllWords();
  const others = allWords.filter(w => w.id !== word.id);
  const distractors = shuffle(others).slice(0, 3);
  const options = shuffle([word, ...distractors]);

  card.innerHTML = `
    <div class="quiz-question">以下哪个是此单词的含义？</div>
    <div class="quiz-word">${word.word}</div>
    <div class="quiz-options">
      ${options.map((o, i) => `
        <div class="quiz-option" data-id="${o.id}" data-idx="${i}">
          ${o.definition || o.meaning}
        </div>
      `).join('')}
    </div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
  `;

  card.querySelectorAll('.quiz-option').forEach(opt => {
    opt.addEventListener('click', () => handleMeaningAnswer(opt, word));
  });
}

function handleMeaningAnswer(el, word) {
  if (quizAnswered) return;
  quizAnswered = true;

  const selectedId = parseInt(el.dataset.id);
  const correct = selectedId === word.id;

  if (correct) {
    el.classList.add('correct');
    quizScore++;
    document.getElementById('quiz-feedback').innerHTML = `<span class="feedback-correct">剑气破空 · 命中！</span>`;
    showSwordSlash(
      el.getBoundingClientRect().left + el.offsetWidth/2,
      el.getBoundingClientRect().top
    );
  } else {
    el.classList.add('wrong');
    document.getElementById('quiz-feedback').innerHTML = '<span class="feedback-wrong">剑势未至 · 答案：' + (word.definition || word.meaning) + '</span>';
    // Highlight correct
    const correctEl = document.querySelector('.quiz-option[data-id="' + word.id + '"]');
    if (correctEl) correctEl.classList.add('correct');
    // Track quiz error + word frequency
    state.quizErrors[word.id] = true;
    if (!state.wordFreq[word.id]) state.wordFreq[word.id] = {seen: 0, wrong: 0};
    state.wordFreq[word.id].wrong++;
    saveState();
  }

  setTimeout(() => {
    quizIndex++;
    showQuizQuestion();
  }, 1500);
}

function showSyllableQuestion() {
  const word = quizWords[quizIndex];
  const card = document.getElementById('quiz-card');
  syllableBuildAnswer = []
  syllableBuildChunks = shuffle([...word.syllables]);

  card.innerHTML = `
    <div class="quiz-question">按正确顺序点击音节拼出单词</div>
    <div class="quiz-word">${word.meaning}</div>
    <div class="build-slots" id="build-slots">
      ${word.syllables.map(() => '<div class="build-slot">?</div>').join('')}
    </div>
    <div class="syllable-chunks" id="syllable-chunks">
      ${syllableBuildChunks.map((s, i) => `
        <div class="syllable-chunk" data-syl="${s}" data-idx="${i}">${s}</div>
      `).join('')}
    </div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <div style="margin-top:12px">
      <button class="learn-btn btn-skip" id="btn-syl-clear" style="font-size:12px;padding:6px 14px;">清除重选</button>
    </div>
  `;

  // Click handlers for chunks
  card.querySelectorAll('.syllable-chunk').forEach(chunk => {
    chunk.addEventListener('click', () => {
      if (quizAnswered) return;
      if (chunk.classList.contains('used')) return;
      speakSyllable(chunk.dataset.syl, chunk);
      syllableBuildAnswer.push(chunk.dataset.syl);
      chunk.classList.add('used');
      updateSyllableSlots();
      checkSyllableAnswer(word);
    });
  });

  document.getElementById('btn-syl-clear').addEventListener('click', () => {
    if (quizAnswered) return;
    syllableBuildAnswer = []
    card.querySelectorAll('.syllable-chunk').forEach(c => c.classList.remove('used'));
    updateSyllableSlots();
  });
}

function updateSyllableSlots() {
  const slots = document.querySelectorAll('.build-slot');
  slots.forEach((slot, i) => {
    if (i < syllableBuildAnswer.length) {
      slot.textContent = syllableBuildAnswer[i];
      slot.classList.add('filled');
    } else {
      slot.textContent = '?';
      slot.classList.remove('filled');
    }
  });
}

function checkSyllableAnswer(word) {
  if (syllableBuildAnswer.length !== word.syllables.length) return;
  
  quizAnswered = true;
  const correct = syllableBuildAnswer.every((s, i) => s === word.syllables[i]);

  if (correct) {
    quizScore++;
    document.getElementById('quiz-feedback').innerHTML = `<span class="feedback-correct">剑骨重塑 · 准确！</span>`;
    showSwordSlash(window.innerWidth/2, window.innerHeight/2);
    speakWord(word);
  } else {
    document.getElementById('quiz-feedback').innerHTML = 
      '<span class="feedback-wrong">次序有误 · 正确：' + word.syllables.join('·') + '</span>';
    // Track quiz error + word frequency
    state.quizErrors[word.id] = true;
    if (!state.wordFreq[word.id]) state.wordFreq[word.id] = {seen: 0, wrong: 0};
    state.wordFreq[word.id].wrong++;
    saveState();
  }

  setTimeout(() => {
    quizIndex++;
    showQuizQuestion();
  }, 1800);
}

function finishQuiz() {
  const card = document.getElementById('quiz-card');
  const pct = Math.round((quizScore / quizWords.length) * 100);
  let acclamation = '';
  if (pct >= 90) acclamation = '剑心通明，所向披靡！';
  else if (pct >= 70) acclamation = '剑气纵横，继续精进！';
  else if (pct >= 50) acclamation = '剑招尚需打磨。';
  else acclamation = '初学乍练，来日方长。';

  card.innerHTML = `
    <div style="text-align:center;padding:20px;">
      <div style="font-size:48px;margin-bottom:12px;">${pct >= 70 ? '' : ''}</div>
      <div class="quiz-question">试炼结束</div>
      <div style="font-size:36px;color:var(--gold);margin:12px 0;">${quizScore} / ${quizWords.length}</div>
      <div style="color:var(--text-dim);margin-bottom:16px;">剑招命中 ${pct}%</div>
      <div style="font-family:var(--font-cn);font-size:18px;color:var(--gold-light);margin-bottom:20px;">${acclamation}</div>
      <button class="action-btn" onclick="startQuiz()" style="display:inline-block;width:auto;padding:12px 32px;">
        再来一战
      </button>
    </div>
  `;

  document.getElementById('quiz-progress-fill').style.width = '100%';
  document.getElementById('quiz-score').textContent = quizScore;
  document.getElementById('quiz-round').textContent = `${quizWords.length}/${quizWords.length}`;

  // Mark quizzed words as learning
  quizWords.forEach(w => {
    if (!state.mastered[w.id]) {
      state.learning[w.id] = true;
    }
  });
  saveState();
  renderHome();
}

function getDictationUnitIndices() {
  return Array.from(document.querySelectorAll('.d-unit-cb:checked')).map(cb => parseInt(cb.value)).sort((a,b)=>a-b);

function loadDictationUnits() {
  const sel = document.getElementById('d-textbook-select');
  const tb = (window.TEXTBOOKS || []).find(t => t.id === sel.value);
  if (!tb) return;
  const indices = getDictationUnitIndices();
  if (indices.length === 0) return;
  dictationWords = [];
  indices.forEach(i => { if(tb.units[i]) dictationWords = dictationWords.concat(tb.units[i].entries); });

  dictationIndex = 0; dictationScore = 0;
  document.getElementById('d-score').textContent = '0';
  document.getElementById('d-round').textContent = '1/' + dictationWords.length;
  document.getElementById('d-progress-fill').style.width = '0%';
  showDictationQuestion();
}

function startDictationQuiz() {
  const allWords = getAllWords();
  const pool = [...allWords];
  const masteredPool = allWords.filter(w => state.learning[w.id] || !state.mastered[w.id]);
  dictationWords = shuffle(masteredPool.length >= 5 ? masteredPool : pool).slice(0, 10);

function checkDictationAnswer() {
  const inp = document.getElementById('d-answer-input');
  const result = document.getElementById('d-result');
  const word = dictationWords[dictationIndex];
  if (!inp || !word) return;
  const answer = inp.value.trim().toLowerCase();
  let correct = false;
  if (dictationMode === 'meaning') {
    const cnMeanings = (word.cnDefs || []).map(d => d.meaning).join(' ') + ' ' + (word.meaning || '');
    correct = cnMeanings.toLowerCase().includes(answer) && answer.length > 0;
    if (correct) dictationScore++;
  } else {
    correct = answer === word.word.toLowerCase();
    if (correct) dictationScore++;
  }
  result.innerHTML = correct
    ? '<span style="color:var(--jade);font-weight:600">✓ 正确！' + (dictationMode === 'meaning' ? '' : (word.meaning || '')) + '</span>'
    : '<span style="color:var(--red);font-weight:600">✗ ' + word.word + ' : ' + (word.meaning || '') + '</span>';
  setTimeout(() => {
    dictationIndex++;
    document.getElementById('d-round').textContent = (dictationIndex+1) + '/' + dictationWords.length;
    document.getElementById('d-progress-fill').style.width = (dictationIndex / dictationWords.length * 100) + '%';
    showDictationQuestion();
  }, 1200);
}

let libraryFilter = 'all';

function renderLibrary() {
  let debugMsg = '';
  try {
  const searchEl = document.getElementById('library-search');
  const search = searchEl ? searchEl.value.toLowerCase() : '';
  const all = getAllWords();
  let filtered = all;
  
  // ONLY filter by mastery status, NOT by notebook
  if (libraryFilter === 'mastered') filtered = filtered.filter(w => state.mastered[w.id]);
  else if (libraryFilter === 'learning') filtered = filtered.filter(w => state.learning[w.id]);
  else if (libraryFilter === 'new') filtered = filtered.filter(w => !state.mastered[w.id] && !state.learning[w.id]);
  
  if (search) {
    filtered = filtered.filter(w =>
      w.word.toLowerCase().includes(search) ||
      (w.meaning && w.meaning.includes(search))
    );
  }
  
  const list = document.getElementById('word-list');
  const empty = document.getElementById('empty-state');
  
  // Update notebook dropdown
  const nbSelect = document.getElementById('notebook-select');
  if (nbSelect) {
    try {
      const nbs = NoteBook.list();
      const activeNb = NoteBook.active();
      while (nbSelect.options.length > 5) nbSelect.remove(5);
      for (const n of nbs) {
        const opt = document.createElement('option');
        opt.value = 'nb:' + n.id;
        opt.textContent = '📒 ' + n.name + ' (' + n.count + ')';
        if (n.id === activeNb.id) opt.selected = true;
        nbSelect.appendChild(opt);
      }
      const newOpt = document.createElement('option');
      newOpt.value = 'new';
      newOpt.textContent = '+ 新剑匣';
      nbSelect.appendChild(newOpt);
    } catch(e) { console.log('NB dropdown error:', e); }
  }
  
  if (filtered.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    empty.innerHTML = '<div class="icon">📭</div><div>剑谱无此剑</div><div style="font-size:10px;color:var(--text-dim);margin-top:8px">DBG: total=' + all.length + ' WORDS=' + (typeof WORDS!=='undefined'?WORDS.length:'?') + ' imp=' + importedWords.length + ' filter=' + libraryFilter + '</div>';
    return;
  }

  empty.style.display = 'none';
  
  const items = filtered.map(w => {
    const status = getWordStatus(w.id);
    const statusText = status === 'mastered' ? '已悟' : status === 'learning' ? '悟剑中' : '未悟';
        const freq = state.wordFreq && state.wordFreq[w.id] ? state.wordFreq[w.id] : {seen:0, wrong:0};
        const freqText = freq.seen > 0 ? ('<span style="color:rgba(255,178,102,0.5);font-size:10px;margin-left:4px">' + freq.wrong + '/' + freq.seen + '</span>') : '';
    const statusColor = status === 'mastered' ? '#7ec87b' : status === 'learning' ? '#e8a0c0' : '#6a6a7a';
    const sylText = w.syllables && Array.isArray(w.syllables) ? w.syllables.join(' · ') : '';
    const cleanMeaning = (w.meaning || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return '<div onclick="navigateToWord(' + w.id + ')" style="display:flex;align-items:center;padding:12px 16px;margin:3px 0;background:#14141f;border:1px solid #2a2a3a;border-radius:8px;cursor:pointer">'
      + '<b style="font-size:16px;color:#e8e8f0;min-width:120px">' + w.word + '</b>'
      + '<span style="font-size:12px;color:#8b7355;flex:1">' + sylText + '</span>'
      + '<span style="font-size:13px;color:#6a6a7a;font-family:var(--font-cn)">' + cleanMeaning + '</span>'
      + '<span style="font-size:11px;padding:3px 8px;border-radius:10px;background:' + statusColor + '22;color:' + statusColor + '">' + statusText + '</span>'
      + '</div>';
  }).join('');
  
  list.innerHTML = items;
  } catch(e) { 
    debugMsg = 'JS ERROR: ' + e.message;
    list.innerHTML = ''; 
    empty.style.display = 'block';
    empty.innerHTML = '<div class="icon">⚠️</div><div>剑意紊乱</div><div style="font-size:10px;color:#e74c3c;margin-top:8px">' + debugMsg + '</div>';
  }
}

// ============ Word Navigation ============
function navigateToWord(wordId) {
  pendingWordId = wordId;
  navigateTo('learn');
}

function navigateOrImport(wordStr) {
  if (!wordStr || wordStr.length < 2) return;
  const allWords = getAllWords();
  const target = allWords.find(w => w.word.toLowerCase() === wordStr.toLowerCase());
  if (target) {
    pendingWordId = target.id;
    navigateTo('learn');
    return;
  }
  // Word not found — submit to pipeline
  showToast('⏳ 「' + wordStr + '」已提交待审查队列...', 'info');
  try {
    fetch('http://localhost:8765/api/staging/add', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({words: [wordStr]})
    }).then(function(r) { return r.json(); }).then(function(d) {
      if (d.results && d.results[0]) {
        showToast('「' + wordStr + '」已加入待审查，检验通过后将自动纳入词库', 'success');
      }
    }).catch(function() {
      showToast('⚠️ API 未连接，「' + wordStr + '」已暂存', 'info');
    });
  } catch(e) {
    showToast('⚠️ 「' + wordStr + '」已暂存（后台服务未启动）', 'info');
  }
}

// ============ Clickable Word Helper ============
function clickableWord(word, color, size) {
  if (!word || word.length < 2) return word || '';
  color = color || 'var(--gold-light)';
  size = size || 'inherit';
  return '<span onclick="event.stopPropagation();navigateOrImport(\'' + word + '\')" style="color:' + color + ';cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px;font-size:' + size + '" title="点击查看「' + word + '」">' + word + '</span>';
}

// ============ Render Collocation Panel ============
function renderCollocPanel(raw) {
  const colloc = PanelAdapter.getCollocData(raw);
  const word = raw;
  const forms = raw.wordForms;
  const container = document.getElementById('colloc-content');

  let html = '';
  let hasContent = false;

  // Verb + Object
  if (colloc && colloc.verbObj && colloc.verbObj.length > 0) {
    html += '<div class="colloc-group"><div class="colloc-label">动宾搭配</div>';
    for (const vo of colloc.verbObj) {
      html += '<div class="colloc-slot"><span class="slot-keyword">' + clickableWord(vo.verb, 'var(--gold-light)') + ' <span style="font-size:10px;opacity:0.6">v.</span></span>';
      html += '<span style="color:var(--text-dim);margin:0 2px">+</span>';
      html += '<div class="slot-options">';
      const objs = vo.objects || vo.objs || [];
      for (const obj of objs) {
        html += '<span class="slot-option highlight">' + clickableWord(obj, 'var(--text-bright)') + ' <span style="font-size:10px;opacity:0.6">n.</span></span>';
      }
      html += '</div>';
      if (vo.meaningCn) html += '<span style="color:#8ec8a0;font-size:11px;margin-left:8px;font-family:var(--font-cn)">' + vo.meaningCn + '</span>';
      html += '</div>';
    }
    html += '</div>';
    hasContent = true;
  }

  // Phrases from Collegiate wildcard search
  if (colloc && colloc.phrases && colloc.phrases.length > 0) {
    html += '<div class="colloc-group"><div class="colloc-label">固定短语 · 习语</div>';
    for (const ph of colloc.phrases) {
      html += '<div style="padding:6px 10px;margin:3px 0;background:rgba(255,178,102,0.06);border-left:2px solid rgba(255,178,102,0.35);border-radius:0 6px 6px 0">';
      // Line 1: Phrase
      html += '<div style="font-weight:600;font-size:14px;color:#FFE2A8;line-height:1.5">' + clickableWord(ph.phrase, '#FFE2A8', '14px') + (ph.pos ? ' <span style="font-size:10px;opacity:0.5;color:var(--text-dim)">' + ph.pos + '</span>' : '') + '</div>';
      // Line 2: Chinese meaning
      const meaning = ph.definition || '';
      html += '<div style="color:#8ec8a0;font-size:12px;line-height:1.5;font-family:var(--font-cn);margin-top:1px">' + (meaning || '') + '</div>';
      // Line 3: Example sentence
      if (ph.example) {
        html += '<div style="color:#c0c0d8;font-size:12px;line-height:1.6;margin-top:2px;font-style:italic">"' + ph.example + '"</div>';
      }
      html += '</div>';
    }
    html += '</div>';
    hasContent = true;
  }

  // Adjective + Noun
  if (colloc && colloc.adjNoun && colloc.adjNoun.length > 0) {
    html += '<div class="colloc-group"><div class="colloc-label">形容词搭配</div>';
    for (const an of colloc.adjNoun) {
      html += '<div class="colloc-slot">';
      html += '<div class="slot-options">';
      const adjs = an.adjectives || an.adjs || [];
      for (const adj of adjs) {
        html += '<span class="slot-option highlight">' + clickableWord(adj, 'var(--text-bright)') + ' <span style="font-size:10px;opacity:0.6">adj.</span></span>';
      }
      html += '</div>';
      html += '<span style="color:var(--text-dim);margin:0 2px">+</span>';
      html += '<span class="slot-keyword">' + clickableWord((an.noun || ''), 'var(--gold-light)') + ' <span style="font-size:10px;opacity:0.6">n.</span></span>';
      if (an.meaningCn) html += '<span style="color:#8ec8a0;font-size:11px;margin-left:8px;font-family:var(--font-cn)">' + an.meaningCn + '</span>';
      html += '</div>';
    }
    html += '</div>';
    hasContent = true;
  }

  // Example sentences (collapsed)
  if (colloc && colloc.examples && colloc.examples.length > 0) {
    const exId = 'colloc-ex-' + word.id;
    html += '<div class="colloc-examples">'
      + '<div class="colloc-example-toggle" onclick="var e=document.getElementById(\'' + exId + '\');e.classList.toggle(\'open\');this.textContent=e.classList.contains(\'open\')?\'▼ 收起例句\':\'▶ 展开例句 (' + colloc.examples.length + ')\'">▶ 展开例句 (' + colloc.examples.length + ')</div>'
      + '<div class="colloc-example-list" id="' + exId + '">';
    for (const ex of colloc.examples) {
      html += '<div class="colloc-example-item">"' + ex.replace(/"/g, '&quot;') + '"</div>';
    }
    html += '</div></div>';
    hasContent = true;
  }

  if (!hasContent) {
    container.innerHTML = '<div class="panel-empty">该词暂无搭配数据<br><small style="color:var(--text-dim)">字典 API 不提供搭配数据，后续可手动补充</small></div>';
    return;
  }

  container.innerHTML = html;
}

// ============ Family Word Navigation ============
function navigateToFamilyWord(wordStr) {
  const allWords = getAllWords();
  const target = allWords.find(w => w.word.toLowerCase() === wordStr.toLowerCase());
  if (target) {
    pendingWordId = target.id;
    navigateTo('learn');
  } else {
    // Word not in database — auto-import via smart fetch, then navigate
    showToast(`⏳ 正在添加「${wordStr}」…`, 'info');
    smartImport(wordStr).then(() => {
      const allWords = getAllWords();
      const target = allWords.find(w => w.word.toLowerCase() === wordStr.toLowerCase());
      if (target) {
        let idx = learnWords.findIndex(w => w.id === target.id);
        if (idx === -1) { learnWords.push(target); idx = learnWords.length - 1; }
        learnIndex = idx; state.lastLearnIndex = idx;
        showLearnWord();
        showToast(`✅ 已添加「${wordStr}」`, 'success');
      }
    });
  }
}

function renderNetworkPanel(raw) {
  const word = raw.word;
  const forms = raw.wordForms;
  const container = document.getElementById('network-content');
  
  if (!forms || (!forms.plural && !forms.relatedWords && !forms.synonyms && !forms.antonyms)) {
    container.innerHTML = '<div class="panel-empty">该词暂无形态变化数据</div>';
    return;
  }
  
  let html = '';
  
  if (forms.plural) {
    html += '<div class="colloc-group"><div class="colloc-label">📝 复数形式</div>';
    html += '<div style="padding:4px 8px"><span class="slot-option highlight">' + forms.plural + '</span> <span style="color:var(--text-dim);font-size:10px">n.</span></div>';
    html += '</div>';
  }
  
  if (forms.relatedWords && forms.relatedWords.length > 0) {
    html += '<div class="colloc-group"><div class="colloc-label">🌿 形态变化</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 0">';
    for (const rw of forms.relatedWords) {
      html += '<span style="display:inline-block;padding:4px 10px;background:rgba(255,178,102,0.08);border:1px solid rgba(255,178,102,0.2);border-radius:12px;font-size:12px">' +

        '<span style="color:var(--text-dim);font-size:10px">' + (rw.pos || '') + '</span> ' +
        '<span style="color:#8ec8a0;font-size:10px;font-family:var(--font-cn)">' + (rw.relation || '') + '</span>' +
      '</span>';
    }
    html += '</div></div>';
  }
  
  if (forms.synonyms && forms.synonyms.length > 0) {
    html += '<div class="colloc-group"><div class="colloc-label">🟢 近义词</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 0">';
    for (const s of forms.synonyms) {
      html += '<span style="display:inline-block;padding:4px 10px;background:rgba(142,200,160,0.08);border:1px solid rgba(142,200,160,0.2);border-radius:12px;font-size:12px">' +

        (s.meaning ? '<span style="color:var(--text-dim);font-size:10px;font-family:var(--font-cn)">' + s.meaning + '</span>' : '') +
      '</span>';
    }
    html += '</div></div>';
  }
  
  if (forms.antonyms && forms.antonyms.length > 0) {
    html += '<div class="colloc-group"><div class="colloc-label">🔴 反义词</div>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;padding:4px 0">';
    for (const a of forms.antonyms) {
      html += '<span style="display:inline-block;padding:4px 10px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);border-radius:12px;font-size:12px">' +
        clickableWord(a.word, '#e74c3c', '12px') + ' ' +
        (a.meaning ? '<span style="color:var(--text-dim);font-size:10px;font-family:var(--font-cn)">' + a.meaning + '</span>' : '') +
      '</span>';
    }
    html += '</div></div>';
  }
  
  container.innerHTML = html;
}

// ============ Render Ancestral Tree (祖宗槐) ============
function renderTreeView(word) {
  const container = document.getElementById('network-content');
  const assoc = WORD_ASSOC[word.id] || word.assoc;
  const morph = MORPH_DATA[word.id] || word.morph;
  const colloc = COLLOC_DATA[word.id] || word.colloc;
  
  // Build branches from available data
  let branches = []
  
  if (assoc) {
    branches = assoc.branches;
  } else {
    // Auto-generate branches from morph + colloc data
    if (morph && morph.family) {
      branches.push({ name: '词族', color: '#7ec87b', items: morph.family.filter(f => f.toLowerCase() !== word.word.toLowerCase()) });
    }
    if (colloc) {
      const collocItems = []
      if (colloc.verbObj) collocItems.push(...colloc.verbObj.flatMap(v => (v.objects || v.objs || [])));
      if (colloc.adjNoun) collocItems.push(...colloc.adjNoun.flatMap(a => (a.adjectives || a.adjs || [])));
      if (collocItems.length) branches.push({ name: '搭配', color: '#e8a0c0', items: collocItems.slice(0,5) });
    }
  }
  
  if (branches.length === 0) {
    container.innerHTML = '<div class="panel-empty" style="padding:40px 0">🌳 该词暂无树形数据<br><small style="color:var(--text-dim)">可由 writer 补充</small></div>';
    return;
  }
  
  // Trunk label
  let trunkLabel = word.word;
  let trunkParts = [word.word];
  if (assoc && assoc.trunk) {
    trunkParts = assoc.trunk;
    trunkLabel = assoc.trunkLabel || trunkParts.join('·');
  } else if (morph) {
    trunkParts = []
    if (morph.prefix) trunkParts.push(morph.prefix);
    trunkParts.push(morph.root);
    if (morph.suffix) trunkParts.push(morph.suffix);
    trunkLabel = trunkParts.join('·');
  }
  
  // Draw organic tree SVG
  const w = 280, h = 340;
  const trunkX = w/2, trunkY = h - 30;
  const trunkH = 60;
  const canopyY = trunkY - trunkH;
  
  let svg = `<svg class="bubble-svg" viewBox="0 0 ${w} ${h}" style="height:${h}px">`;
  
  // === Ground / roots ===
  svg += `<ellipse cx="${trunkX}" cy="${trunkY+8}" rx="55" ry="8" fill="rgba(107,76,59,0.15)"/>`;
  svg += `<path d="M${trunkX-15},${trunkY} Q${trunkX-30},${trunkY+15} ${trunkX-25},${trunkY+25}" stroke="#6b4c3b" stroke-width="1.5" fill="none" opacity="0.4"/>`;
  svg += `<path d="M${trunkX+10},${trunkY} Q${trunkX+25},${trunkY+15} ${trunkX+20},${trunkY+25}" stroke="#6b4c3b" stroke-width="1.5" fill="none" opacity="0.4"/>`;
  
  // === Trunk ===
  const trunkTop = canopyY + 30;
  svg += `<path d="M${trunkX-8},${trunkY} Q${trunkX-6},${trunkTop+20} ${trunkX-3},${trunkTop}" 
    stroke="#6b4c3b" stroke-width="7" fill="none" stroke-linecap="round"/>`;
  svg += `<path d="M${trunkX+5},${trunkY} Q${trunkX+4},${trunkTop+20} ${trunkX+2},${trunkTop}" 
    stroke="#5a3d2e" stroke-width="5" fill="none" stroke-linecap="round"/>`;
  
  // Trunk label
  svg += `<text x="${trunkX}" y="${trunkY-15}" text-anchor="middle" fill="var(--gold-light)" font-size="13" font-weight="600">${word.word}</text>`;
  svg += `<text x="${trunkX}" y="${trunkY-2}" text-anchor="middle" fill="var(--gold-dim)" font-size="9">${trunkLabel}</text>`;
  
  // === Branches ===
  const numBranches = branches.length;
  const branchAngles = []
  
  if (numBranches === 1) {
    branchAngles.push({ angle: -Math.PI/2, labelOffset: 0 });
  } else if (numBranches === 2) {
    branchAngles.push({ angle: -Math.PI/2 - 0.5, labelOffset: -30 });
    branchAngles.push({ angle: -Math.PI/2 + 0.5, labelOffset: 30 });
  } else {
    const spread = Math.PI * 0.7;
    const start = -Math.PI/2 - spread/2;
    for (let i = 0; i < numBranches; i++) {
      const angle = start + (spread / (numBranches - 1)) * i;
      branchAngles.push({ angle, labelOffset: (i - (numBranches-1)/2) * (100 / numBranches) });
    }
  }
  
  branches.forEach((branch, bi) => {
    const { angle, labelOffset } = branchAngles[bi];
    const brLen = 90;
    const bx = trunkX + brLen * Math.cos(angle);
    const by = trunkTop + brLen * Math.sin(angle);
    
    // Branch curve
    const cp1x = trunkX + brLen * 0.3 * Math.cos(angle);
    const cp1y = trunkTop + brLen * 0.3 * Math.sin(angle) - 10;
    const cp2x = trunkX + brLen * 0.7 * Math.cos(angle);
    const cp2y = trunkTop + brLen * 0.7 * Math.sin(angle) - 5;
    
    svg += `<path d="M${trunkX},${trunkTop} C${cp1x},${cp1y} ${cp2x},${cp2y} ${bx},${by}" 
      stroke="${branch.color}" stroke-width="2" fill="none" opacity="0.7"/>`;
    
    // Branch label
    const lx = trunkX + (brLen + 20) * Math.cos(angle);
    const ly = trunkTop + (brLen + 20) * Math.sin(angle);
    svg += `<rect x="${lx-18}" y="${ly-9}" width="36" height="16" rx="8" fill="rgba(0,0,0,0.5)" stroke="${branch.color}" stroke-width="1"/>
      <text x="${lx}" y="${ly+2}" text-anchor="middle" fill="${branch.color}" font-size="9">${branch.name}</text>`;
    
    // Leaf nodes
    const leafStartAngle = angle - 0.4;
    const leafSpread = 0.8;
    branch.items.slice(0, 4).forEach((item, li) => {
      const la = leafStartAngle + (leafSpread / Math.min(branch.items.length, 4)) * li;
      const leafDist = brLen + 35 + li * 12;
      const leafX = trunkX + leafDist * Math.cos(la);
      const leafY = trunkTop + leafDist * Math.sin(la);
      
      // Twig
      svg += `<line x1="${bx}" y1="${by}" x2="${leafX}" y2="${leafY}" stroke="${branch.color}" stroke-width="0.8" opacity="0.5"/>`;
      
      // Leaf
      const leafW = Math.min(60, item.length * 7 + 10);
      svg += `<ellipse cx="${leafX}" cy="${leafY}" rx="${leafW/2}" ry="9" fill="rgba(0,0,0,0.4)" stroke="${branch.color}" stroke-width="1" opacity="0.8"/>
        <text x="${leafX}" y="${leafY+3}" text-anchor="middle" fill="${branch.color}" font-size="8">${item.length > 12 ? item.substring(0,11)+'…' : item}</text>`;
    });
  });
  
  svg += '</svg>';
  container.innerHTML = svg;
}

// ============ Import Words ============
let importedWords = []
const IMPORT_STORAGE_KEY = 'sword-vocab-imported';

function loadImportedWords() {
  try {
    const saved = localStorage.getItem(IMPORT_STORAGE_KEY);
    if (saved) importedWords = JSON.parse(saved);
  } catch(e) { importedWords = []; }
  
  // Dedup: remove words that already exist in WORDS
  const staticWords = new Set();
  WORDS.forEach(w => staticWords.add(w.word.toLowerCase()));
  const before = importedWords.length;
  importedWords = importedWords.filter(w => !staticWords.has(w.word.toLowerCase()));
  if (importedWords.length < before) {
    saveImportedWords();
  }
}
function saveImportedWords() {
  try {
    localStorage.setItem(IMPORT_STORAGE_KEY, JSON.stringify(importedWords));
  } catch(e) {}
}

function getAllWords() {
  return [...WORDS, ...importedWords];
}

function getNextWordId() {
  const all = getAllWords();
  return all.length > 0 ? Math.max(...all.map(w => w.id)) + 1 : 1;
}

function parseImportText(text) {
  const lines = text.split('\n').filter(l => l.trim() && !l.trim().startsWith('#'));
  const words = []
  const errors = []
  
  for (let i = 0; i < lines.length; i++) {
    const parts = lines[i].split('|').map(s => s.trim());
    if (parts.length < 3) {
      errors.push(`第${i+1}行：字段不足（至少需要 单词|音节|中文释义）`);
      continue;
    }
    const [word, sylStr, phonetic, definition, meaning, example, pos, diffStr] = parts;
    const syllables = sylStr.split('·').map(s => s.trim()).filter(Boolean);
    if (syllables.length === 0) {
      errors.push(`第${i+1}行：音节格式错误`);
      continue;
    }
    const difficulty = parseInt(diffStr) || 1;
    const emoji = word.slice(0, 2).split('').map(c => 
      String.fromCodePoint(0x1F1E6 + c.toUpperCase().charCodeAt(0) - 65)
    ).join('') || '📝';
    
    words.push({
      id: getNextWordId() + words.length,
      word, syllables,
      stress: 0,
      phonetic: phonetic || '',
      definition: definition || '',
      meaning: meaning || '',
      example: example || '',
      pos: pos || '',
      emoji: emoji,
      image: word ? `https://source.unsplash.com/400x300/?${encodeURIComponent(word)}` : '',
      difficulty: Math.min(5, Math.max(1, difficulty)),
      imported: true
    });
  }
  return { words, errors };
}

function doImport(text) {
  const { words, errors } = parseImportText(text);
  if (words.length === 0) {
    showImportResult(`❌ 无可纳之剑。${errors.length ? ' 瑕疵：' + errors.join('；') : ''}`, 'error');
    return;
  }
  // Merge: skip duplicates by word
  const all = getAllWords();
  const existing = new Set(all.map(w => w.word.toLowerCase()));
  const newWords = words.filter(w => !existing.has(w.word.toLowerCase()));
  const skipped = words.length - newWords.length;
  
  importedWords = [...importedWords, ...newWords];
  saveImportedWords();
  
  // Add to active notebook
  NoteBook.addWords(newWords.map(w => w.id));
  NoteBook.migrateExisting(newWords.map(w => w.id));
  
  let msg = `✅ 成功导入 ${newWords.length} 个单词`;
  if (skipped > 0) msg += `，略过 ${skipped} 个重复`;
  if (errors.length > 0) msg += `。⚠️ ${errors.length} 剑诀格式有瑕`;
  showImportResult(msg, 'success');
  
  // Refresh library if open
  if (document.getElementById('view-library').classList.contains('active')) {
    renderLibrary();
  }
  renderHome();
}

function showImportResult(msg, type) {
  const el = document.getElementById('import-result');
  el.textContent = msg;
  el.className = 'import-result ' + (type || '');
  el.style.display = 'block';
}

function handleNotebookOrFilter(value) {
  if (!value) return;
  if (value.startsWith('filter:')) {

    renderLibrary();
  } else if (value.startsWith('nb:')) {
    const nbId = value.split(':')[1];

// Simple syllable split (fallback when API fails)
function splitSyllables(word) {
  const w = word.toLowerCase();
  // Rule-based: split before consonant clusters between vowels
  const vowels = 'aeiouy';
  const parts = []
  let cur = '';
  for (let i = 0; i < w.length; i++) {
    cur += w[i];
    const next = w[i+1];
    const next2 = w[i+2];
    if (next && vowels.includes(next) && !vowels.includes(w[i]) && cur.length >= 2) {
      // Consonant-vowel boundary
      if (vowels.includes(w[i]) || (next2 && !vowels.includes(next2))) {
        parts.push(cur);
        cur = '';
      }
    }
  }
  if (cur) parts.push(cur);
  // Ensure minimum: if only 1 part, try to split
  if (parts.length <= 1 && w.length >= 4) {
    const mid = Math.floor(w.length / 2);
    return [w.slice(0, mid), w.slice(mid)];
  }
  return parts.length >= 1 ? parts : [w];
}

  try {
    const resp = await fetch('http://localhost:8765/api/enrich', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({words: [word]})
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    if (!data.results || !data.results[0]) return null;
    const r = data.results[0];
    if (r.error) return null;
    return {
      phonetic: r.phonetic || '',
      definition: r.definition || '',
      example: r.example || '',
      pos: r.pos || '',
      meaning: r.meaning || '',
      morph: r.morph || null,
      colloc: r.colloc || null,
      issues: r.issues || [],
      valid: r.valid || false,
    };
  } catch(e) {
    console.log('API fetch failed, using fallback:', e.message);
    return null;
  }
}

async function smartImport(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
  if (lines.length === 0) {
    showImportResult('❌ 请输入至少一个单词', 'error');
    return;
  }
  
  const validWords = lines.filter(w => /^[a-zA-Z]+$/.test(w));
  if (validWords.length === 0) {
    showImportResult('❌ 请输入有效英文单词', 'error');
    return;
  }
  
  // Check duplicates
  const allWords = getAllWords();
  const existing = new Set(allWords.map(w => w.word.toLowerCase()));
  const newWords = validWords.filter(w => !existing.has(w.toLowerCase()));
  
  if (newWords.length === 0) {
    showImportResult('❌ 所有单词已存在于词库中', 'error');
    return;
  }
  
  // Step 1: Submit to staging pipeline
  showImportResult(`⏳ 已提交 ${newWords.length} 个单词到检验队列...`, '');
  
  try {
    await submitToPipeline(newWords);
  } catch(e) {
    showImportResult('⚠️ API 服务器未运行，请确认后台服务已启动', 'error');
    return;
  }
  
  // Step 2: Add minimal entries to localStorage immediately (will be updated on refresh)
  const fallbackWords = newWords.map((word, i) => ({
    id: getNextWordId() + i,
    word,
    syllables: splitSyllables(word),
    stress: 0,
    phonetic: '',
    definition: '检验中...',
    meaning: '',
    example: '',
    pos: '',
    emoji: word.slice(0,2).toUpperCase(),
    image: `https://source.unsplash.com/400x300/?${encodeURIComponent(word)}`,
    difficulty: 1,
    imported: true,
    _staging: true,
  }));
  
  importedWords = [...importedWords, ...fallbackWords];
  saveImportedWords();
  
  // Add to active notebook
  NoteBook.addWords(fallbackWords.map(w => w.id));
  NoteBook.migrateExisting(fallbackWords.map(w => w.id));
  
  // Step 3: Poll for pipeline completion
  showImportResult(`⏳ 已提交 ${newWords.length} 个单词，等待 MW 词典补全 + 校验...`, '');
  
  let attempts = 0;
  const maxAttempts = 20; // ~60 seconds total
  const pollInterval = 3000;
  
  const checkAndPromote = async () => {
    attempts++;
    try {
      const statuses = await checkPipelineStatus(newWords);
      
      let allDone = true;
      let passedCount = 0;
      let failedCount = 0;
      
      for (const word of newWords) {
        const s = statuses[word.toLowerCase()] || {status: 'pending'};
        if (s.status === 'pending') {
          allDone = false;
        } else if (s.status === 'passed') {
          passedCount++;
        } else if (s.status === 'failed') {
          failedCount++;
        }
      }
      
      if (allDone || attempts >= maxAttempts) {
        // Fetch enriched data for passed words
        let enrichedCount = 0;
        for (const word of newWords) {
          const s = statuses[word.toLowerCase()] || {};
          if (s.status === 'passed') {
            const enriched = await fetchEnrichedData(word);
            if (enriched) {
              // Update the word in importedWords
              const idx = importedWords.findIndex(w => w.word.toLowerCase() === word.toLowerCase());
              if (idx >= 0) {
                importedWords[idx] = {
                  ...importedWords[idx],
                  syllables: enriched.syllables || importedWords[idx].syllables,
                  phonetic: enriched.phonetic || '',
                  definition: enriched.definition || '',
                  meaning: enriched.meaning || '',
                  example: enriched.example || '',
                  pos: enriched.pos || '',
                  morph: enriched.morph || null,
                  colloc: enriched.colloc || null,
                  _staging: false,
                  _validation: {
                    score: s.score,
                    issues: s.issues || [],
                  }
                };
                enrichedCount++;
              }
            }
          }
        }
        
        saveImportedWords();
        
        // Show final report
        let msg = '';
        if (passedCount > 0 && failedCount === 0) {
          msg = `✅ ${passedCount} 个单词全部通过检验！数据已补全`;
        } else if (passedCount > 0) {
          msg = `⚠️ ${passedCount} 通过，${failedCount} 未通过`;
        } else if (failedCount > 0) {
          msg = `❌ ${failedCount} 个单词未通过检验，已保留在 failed/ 中`;
        } else {
          msg = `⏳ 检验超时，${newWords.length} 个单词仍在处理中`;
        }
        showImportResult(msg, passedCount > 0 ? 'success' : 'error');
        
        if (document.getElementById('view-library').classList.contains('active')) {
          renderLibrary();
        }
        renderHome();
        return;
      }
      
      // Update progress
      showImportResult(`⏳ 检验中... (${passedCount} 通过, ${failedCount} 未通过, 剩余 ${newWords.length - passedCount - failedCount} 等待) [${attempts}/${maxAttempts}]`, '');
      setTimeout(checkAndPromote, pollInterval);
      
    } catch(e) {
      console.log('Poll error:', e);
      setTimeout(checkAndPromote, pollInterval);
    }
  };
  
  setTimeout(checkAndPromote, pollInterval);
}

// Position nav arrows at card edges, fixed to viewport center
function positionArrows() {
  const card = document.getElementById('word-card');
  const prev = document.querySelector('.nav-arrow.prev');
  const next = document.querySelector('.nav-arrow.next');
  if (!card || !prev || !next) return;
  const r = card.getBoundingClientRect();
  prev.style.left = (r.left - 40) + 'px';
  next.style.left = (r.right + 4) + 'px';
}
